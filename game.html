<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточная Битва</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .logo {
      font-size: 42px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #3498db, #926eae);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .subtitle { color: #888; margin-bottom: 40px; font-size: 16px; }
    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3498db, #926eae);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }
    .player-name { font-size: 16px; font-weight: 600; }
    .player-rating { font-size: 13px; color: #f1c40f; }
    .menu-btn {
      width: 100%;
      max-width: 350px;
      padding: 18px 30px;
      margin: 10px 0;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.1s;
    }
    .menu-btn:active { transform: scale(0.98); }
    .btn-search { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
    .btn-bot { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-deck { background: linear-gradient(135deg, #f39c12, #d68910); color: white; }
    .btn-saved { background: linear-gradient(135deg, #926eae, #8e44ad); color: white; }
    .btn-factions { background: linear-gradient(135deg, #e67e22, #d35400); color: white; }
    .btn-leaderboard { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .faction-select {
      display: none;
      margin-top: 30px;
      text-align: center;
    }
    .faction-select h3 { margin-bottom: 20px; }
    .faction-btn {
      width: 100%;
      max-width: 350px;
      padding: 15px 25px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: rgba(44, 62, 80, 0.6);
      color: white;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .faction-btn.knights { border-left: 4px solid #3498db; }
    .faction-btn.mages { border-left: 4px solid #926eae; }
    .faction-btn.cultists { border-left: 4px solid #555; }
    .faction-btn.dryads { border-left: 4px solid #2ecc71; }
    .faction-btn:active { transform: scale(0.98); }
    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      padding: 12px 25px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="logo">⚔️ Карточная Битва</div>
  <p class="subtitle">Собирай колоду и сражайся!</p>
  
  <div class="player-info" id="playerInfo">
    <div class="avatar" id="playerAvatar">👤</div>
    <div>
      <div class="player-name" id="playerName">Гость</div>
      <div class="player-rating">⭐ <span id="playerRating">0</span> очков</div>
    </div>
  </div>
  
  <div id="mainMenu">
    <button class="menu-btn btn-search" onclick="findMatch()">🔍 Поиск матча</button>
    <button class="menu-btn btn-bot" onclick="startBotGame()">🤖 Игра с ботом</button>
    <button class="menu-btn btn-deck" onclick="goToDeckBuilder()">🃏 Собрать колоду</button>
    <button class="menu-btn btn-saved" onclick="goToSavedDecks()">📁 Сохранённые колоды</button>
    <button class="menu-btn btn-factions" onclick="showFactions()">🎭 Фракции</button>
    <button class="menu-btn btn-leaderboard" onclick="showLeaderboard()">🏆 Рейтинг</button>
  </div>
  
  <div class="faction-select" id="factionSelect">
    <h3>Выберите фракцию:</h3>
    <button class="faction-btn knights" onclick="selectFaction('knights')">🔵 Рыцари Цветка Лилии</button>
    <button class="faction-btn mages" onclick="selectFaction('mages')">🟣 Орден Чародеев</button>
    <button class="faction-btn cultists" onclick="selectFaction('cultists')">⚫ Прислужники Черной Лилии</button>
    <button class="faction-btn dryads" onclick="selectFaction('dryads')">🟢 Дриады леса Нидолион</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let currentUser = tg.initDataUnsafe?.user || { first_name: 'Гость' };
    let userStats = { rating: 0, faction: null };
    
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('playerAvatar').textContent = currentUser.first_name.charAt(0).toUpperCase();
      document.getElementById('playerName').textContent = currentUser.first_name;
      
      const savedFaction = localStorage.getItem('selectedFaction');
      if (savedFaction) userStats.faction = savedFaction;
      else document.getElementById('factionSelect').style.display = 'block';
      
      const savedRating = localStorage.getItem('playerRating');
      if (savedRating) {
        userStats.rating = parseInt(savedRating);
        document.getElementById('playerRating').textContent = userStats.rating;
      }
    });
    
    function findMatch() {
      if (!userStats.faction) { showToast('⚠️ Сначала выберите фракцию!'); return; }
      window.location.href = 'multiplayer.html';
    }
    
    function startBotGame() {
      if (!userStats.faction) { showToast('⚠️ Сначала выберите фракцию!'); return; }
      window.location.href = 'battle.html';
    }
    
    function goToDeckBuilder() {
      if (!userStats.faction) { showToast('⚠️ Сначала выберите фракцию!'); return; }
      window.location.href = 'deckbuilder.html';
    }
    
    function goToSavedDecks() {
      if (!userStats.faction) { showToast('⚠️ Сначала выберите фракцию!'); return; }
      window.location.href = 'saved-decks.html';
    }
    
    function showFactions() {
      document.getElementById('mainMenu').style.display = 'none';
      document.getElementById('factionSelect').style.display = 'block';
    }
    
    function selectFaction(faction) {
      userStats.faction = faction;
      localStorage.setItem('selectedFaction', faction);
      showToast(`✅ Фракция выбрана: ${FACTIONS[faction].name}`);
      setTimeout(() => {
        document.getElementById('factionSelect').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'block';
      }, 1000);
    }
    
    function showLeaderboard() {
      showToast('🏆 Таблица лидеров будет доступна скоро!');
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
