<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва Карт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #2c3e50;
            --slot-bg: rgba(255,255,255,0.05);
            --p1-color: #3498db;
            --p2-color: #e74c3c;
            --highlight: #f1c40f;
        }
        body { margin: 0; padding: 0; background: var(--bg-color); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* --- ЭКРАН МИЛЛИГАНА (ЗАМЕНА КАРТ) --- */
        #mulligan-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .mulligan-info { font-size: 18px; margin-bottom: 20px; text-align: center; }
        .mulligan-hand {
            display: flex; gap: 10px; overflow-x: auto; padding: 20px;
            max-width: 100%; min-height: 140px; align-items: center;
        }
        .mulligan-card {
            width: 80px; height: 110px; background: var(--card-bg); border: 2px solid #555;
            border-radius: 8px; flex-shrink: 0; cursor: pointer; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .mulligan-card.selected { border-color: var(--highlight); transform: translateY(-15px); box-shadow: 0 0 15px var(--highlight); }
        .mulligan-card .name { font-size: 10px; text-align: center; padding: 2px; }
        .mulligan-btn {
            margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: bold;
            background: var(--p1-color); color: white; border: none; border-radius: 8px; cursor: pointer;
        }

        /* --- ИГРОВОЙ ИНТЕРФЕЙС --- */
        .game-layout {
            display: grid;
            grid-template-rows: 60px 1fr 60px; /* Верх, Поле, Низ */
            height: 100%;
            width: 100%;
        }

        /* ВЕРХ (Противник) */
        .top-zone {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 10px; background: rgba(231, 76, 60, 0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .enemy-info { display: flex; align-items: center; gap: 10px; }
        .leader-avatar { width: 40px; height: 40px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid var(--p2-color); }
        .enemy-stats { display: flex; gap: 8px; font-size: 11px; }
        .stat-pill { background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }
        
        .enemy-hand-preview { display: flex; gap: -5px; }
        .card-back-mini { width: 20px; height: 28px; background: #444; border: 1px solid #666; border-radius: 3px; }

        /* ПОЛЕ БОЯ */
        .battle-field {
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            overflow: hidden;
        }
        
        .row-section {
            display: flex; justify-content: center; gap: 10px;
            height: 48%; /* Половина высоты */
            position: relative;
        }
        
        .lane-container {
            display: flex; gap: 5px;
        }
        
        .lane {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            grid-template-rows: repeat(2, 1fr);    /* 2 ряда */
            gap: 4px;
            width: 140px;
            background: var(--slot-bg);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 4px;
        }
        .lane.enemy { border-color: rgba(231, 76, 60, 0.3); }
        .lane.player { border-color: rgba(52, 152, 219, 0.3); }
        
        .slot {
            background: rgba(0,0,0,0.2); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.highlight { border: 2px dashed var(--highlight); animation: pulse 1s infinite; }

        /* ЦЕНТР (Счет и Пас) */
        .center-bar {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; pointer-events: none; /* Чтобы клики проходили сквозь */
        }
        .score-board {
            background: rgba(0,0,0,0.8); padding: 5px 15px;
            border-radius: 20px; font-weight: bold; font-size: 18px;
            border: 1px solid #444; pointer-events: auto;
        }
        .pass-btn {
            margin-top: 5px; padding: 5px 15px; background: #e67e22;
            color: white; border: none; border-radius: 15px;
            font-weight: bold; font-size: 12px; pointer-events: auto;
            cursor: pointer;
        }
        .pass-btn:disabled { background: #555; opacity: 0.5; }

        /* НИЗ (Игрок) */
        .bottom-zone {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 5px 10px; background: rgba(52, 152, 219, 0.1);
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .player-info { display: flex; flex-direction: column; gap: 5px; margin-bottom: 5px; }
        .my-leader { width: 40px; height: 40px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid var(--p1-color); cursor: pointer; }
        
        .my-hand-container {
            flex-grow: 1;
            height: 120px;
            display: flex;
            align-items: center;
            overflow-x: auto; /* Горизонтальная прокрутка */
            padding: 0 10px;
            gap: 5px;
            margin-bottom: 5px;
            scrollbar-width: thin;
        }
        /* Скрываем скроллбар для красоты */
        .my-hand-container::-webkit-scrollbar { height: 4px; }
        .my-hand-container::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

        .card {
            width: 70px; height: 95px;
            background: var(--card-bg);
            border: 1px solid #777;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .card:hover { transform: translateY(-5px); z-index: 5; }
        .card-cost { position: absolute; top: -3px; left: -3px; background: #926eae; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
        .card-name { text-align: center; font-weight: bold; margin: 2px 0; line-height: 1.1; }
        .card-stats { display: flex; gap: 4px; font-weight: bold; }
        .atk { color: #e74c3c; }
        .hp { color: #2ecc71; }
        
        .card-on-board { width: 100%; height: 100%; border: none; background: transparent; cursor: default; }
        .card-on-board:hover { transform: none; }

        /* МОДАЛКИ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #2c3e50; padding: 20px; border-radius: 10px; width: 80%; max-width: 300px; text-align: center; }
        .row-select-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; background: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .close-modal { margin-top: 10px; background: #e74c3c; color: white; border: none; padding: 8px; width: 100%; border-radius: 5px; cursor: pointer; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<!-- ЭКРАН ЗАМЕНЫ КАРТ (МИЛЛИГАН) -->
<div id="mulligan-screen">
    <div class="mulligan-info">
        Выберите до 3 карт для замены<br>
        <span style="font-size:14px; color:#aaa" id="mulligan-count">Осталось замен: 3</span>
    </div>
    <div class="mulligan-hand" id="mulligan-hand-container"></div>
    <button class="mulligan-btn" onclick="game.finishMulligan()">Начать игру</button>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div class="game-layout" id="game-ui" style="filter: blur(5px);">
    
    <!-- ВЕРХ: ПРОТИВНИК -->
    <div class="top-zone">
        <div class="enemy-info">
            <div class="leader-avatar" ondblclick="game.showLeader('enemy')">🤖</div>
            <div class="enemy-stats">
                <div class="stat-pill">💰 <span id="enemy-coins">0</span></div>
                <div class="stat-pill">❤️ <span id="enemy-score">0</span></div>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="enemy-hand-preview" id="enemy-hand-vis"></div>
            <div style="text-align:right; font-size:10px;">
                <div>Колода: <span id="enemy-deck-count">0</span></div>
                <div>Сброс: <span id="enemy-discard-count">0</span></div>
            </div>
        </div>
    </div>

    <!-- ПОЛЕ БОЯ -->
    <div class="battle-field">
        <!-- Ряды Противника -->
        <div class="row-section">
            <div class="lane-container">
                <div class="lane enemy" id="enemy-left"></div>
                <div class="lane enemy" id="enemy-right"></div>
            </div>
        </div>

        <!-- Центр -->
        <div class="center-bar">
            <div class="score-board">
                <span style="color:var(--p1-color)" id="my-score-display">0</span> : 
                <span style="color:var(--p2-color)" id="enemy-score-display">0</span>
                <div style="font-size:10px; text-align:center; margin-top:2px;">Раунд <span id="round-display">1</span></div>
            </div>
            <button class="pass-btn" id="pass-btn" onclick="game.passTurn()">ПАСС</button>
        </div>

        <!-- Ряды Игрока -->
        <div class="row-section">
            <div class="lane-container">
                <div class="lane player" id="my-left"></div>
                <div class="lane player" id="my-right"></div>
            </div>
        </div>
    </div>

    <!-- НИЗ: ИГРОК -->
    <div class="bottom-zone">
        <div class="player-info">
            <div class="my-leader" onclick="game.useLeaderAbility()">🛡️</div>
            <div style="font-size:10px; text-align:center;">
                <div>Колода: <span id="my-deck-count">0</span></div>
                <div>Сброс: <span id="my-discard-count">0</span></div>
            </div>
        </div>

        <!-- Рука с прокруткой -->
        <div class="my-hand-container" id="my-hand-container"></div>

        <div style="font-size:10px; color:#aaa; margin-bottom:5px;">
            💰 <span id="my-coins">0</span>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ВЫБОРА РЯДА -->
<div class="modal-overlay" id="row-modal">
    <div class="modal-box">
        <h3>Выберите ряд</h3>
        <div id="row-options"></div>
        <button class="close-modal" onclick="document.getElementById('row-modal').style.display='none'">Отмена</button>
    </div>
</div>

<script src="config.js"></script>
<script>
class GameEngine {
    constructor() {
        this.tg = window.Telegram.WebApp;
        this.tg.expand();
        this.tg.ready();

        this.socket = null;
        this.isOnline = false;
        this.roomId = null;
        this.mySide = 'p1'; // 'p1' или 'p2'

        // Состояние
        this.state = {
            myHand: [], myDeck: [], myDiscard: [],
            myBoard: { left: [], right: [] },
            enemyHand: [], enemyDeck: [], enemyDiscard: [],
            enemyBoard: { left: [], right: [] },
            myScore: 0, enemyScore: 0,
            myCoins: 0, enemyCoins: 0,
            round: 1, turn: 'my', gameOver: false,
            canPass: false,
            mulliganCount: 3
        };

        this.initMode();
    }

    initMode() {
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        this.roomId = params.get('room');

        if (mode === 'online' && this.roomId) {
            this.isOnline = true;
            this.connectSocket();
        } else {
            this.startBotGame();
        }
    }

    // === СОКЕТЫ (ОНЛАЙН) ===
    connectSocket() {
        this.socket = io('http://193.148.59.127:3000', {
            transports: ['websocket', 'polling'],
            reconnection: true
        });

        this.socket.on('connect', () => {
            console.log('Connected to server');
            // Важно: сообщаем серверу, что мы хотим играть в этой комнате
            if (this.roomId) {
                // Эмуляция готовности или запрос состояния
                // В реальном коде сервер должен сам пушить состояние при реконнекте
            }
        });

        this.socket.on('game-start', (data) => {
            console.log('Game Start Data:', data);
            this.mySide = data.side;
            this.setupGame(data.config);
        });

        this.socket.on('opponent-action', (data) => {
            this.handleOpponentAction(data);
        });

        this.socket.on('turn-changed', (data) => {
            this.state.turn = (data.turn === this.mySide) ? 'my' : 'enemy';
            this.updateUI();
        });
        
        this.socket.on('disconnect', () => {
            alert('Связь с сервером потеряна');
        });
    }

    sendAction(action, payload) {
        if (!this.isOnline) return;
        this.socket.emit('game-action', {
            roomId: this.roomId,
            side: this.mySide,
            action: action,
            ...payload
        });
    }

    // === ЛОГИКА ИГРЫ (БОТ И ОНЛАЙН) ===
    startBotGame() {
        // 1. ЗАГРУЗКА КОЛОДЫ ИЗ localStorage
        let deckData = [];
        const savedDeckStr = localStorage.getItem('myDeck');
        
        if (savedDeckStr) {
            try {
                deckData = JSON.parse(savedDeckStr);
                console.log('Загружена пользовательская колода:', deckData.length, 'карт');
            } catch (e) {
                console.error('Ошибка парсинга колоды', e);
                deckData = FACTIONS.knights.cards.slice(0, 25);
            }
        } else {
            // Дефолтная колода если нет сохраненной
            deckData = FACTIONS.knights.cards.slice(0, 25);
        }

        const config = { maxRounds: 3, startHand: 10 };
        this.setupGame(config, deckData);
    }

    setupGame(config, userDeckData = null) {
        // Инициализация колод
        const baseDeck = userDeckData || FACTIONS.knights.cards.slice(0, 25);
        this.state.myDeck = baseDeck.map(c => ({...c, uid: Math.random()}));
        
        // Колода бота (случайная)
        const allCards = [...FACTIONS.cultists.cards, ...FACTIONS.mages.cards];
        this.state.enemyDeck = allCards.sort(() => 0.5-Math.random()).slice(0, 25).map(c => ({...c, uid: Math.random()}));

        this.shuffle(this.state.myDeck);
        this.shuffle(this.state.enemyDeck);

        // Раздача руки
        this.drawCards('my', config.startHand);
        this.drawCards('enemy', config.startHand);

        // Запуск Миллигана
        this.startMulligan();
    }

    shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    drawCards(who, count) {
        const deck = who === 'my' ? this.state.myDeck : this.state.enemyDeck;
        const hand = who === 'my' ? this.state.myHand : this.state.enemyHand;
        for(let i=0; i<count; i++) {
            if(deck.length > 0) hand.push(deck.pop());
        }
    }

    // === МИЛЛИГАН (ЗАМЕНА КАРТ) ===
    startMulligan() {
        const screen = document.getElementById('mulligan-screen');
        const container = document.getElementById('mulligan-hand-container');
        const countLabel = document.getElementById('mulligan-count');
        
        screen.style.display = 'flex';
        container.innerHTML = '';
        this.state.mulliganCount = 3;
        countLabel.innerText = `Осталось замен: ${this.state.mulliganCount}`;

        this.state.myHand.forEach((card, idx) => {
            const el = document.createElement('div');
            el.className = 'mulligan-card';
            el.innerHTML = `<div class="name">${card.name}</div>`;
            el.onclick = () => {
                if (this.state.mulliganCount <= 0 && !el.classList.contains('selected')) return;
                
                el.classList.toggle('selected');
                const count = document.querySelectorAll('.mulligan-card.selected').length;
                
                if (count > 3) {
                    el.classList.remove('selected');
                    this.tg.HapticFeedback.notificationOccurred('error');
                } else {
                    this.state.mulliganCount = 3 - count;
                    countLabel.innerText = `Осталось замен: ${this.state.mulliganCount}`;
                    this.tg.HapticFeedback.selectionChanged();
                }
            };
            container.appendChild(el);
        });
    }

    finishMulligan() {
        const selected = document.querySelectorAll('.mulligan-card.selected');
        const indicesToReplace = [];
        
        // Находим индексы выбранных карт в руке
        // (упрощенно: пересоздаем руку, убирая выбранные и добирая новые)
        // В реальном коде нужно сопоставлять DOM элементы с объектами карт
        
        // Простая реализация: удаляем первые N карт из руки и добираем
        // Для точности лучше помечать карты флагом isReplacing
        let newHand = [];
        let replacedCount = 0;
        
        // Так как у нас нет прямой связи DOM-объект в этом простом цикле,
        // сделаем хак: просто перемешаем те, что не выбрали, и доберем.
        // Но лучше так:
        
        const cardsToKeep = [];
        const cardsToDiscard = [];
        
        // Восстанавливаем порядок выбора (DOM порядок совпадает с массивом myHand)
        const domCards = document.querySelectorAll('.mulligan-card');
        domCards.forEach((el, idx) => {
            if (el.classList.contains('selected')) {
                cardsToDiscard.push(this.state.myHand[idx]);
            } else {
                cardsToKeep.push(this.state.myHand[idx]);
            }
        });

        // Возвращаем замененные в колоду (вниз) и мешаем
        cardsToDiscard.forEach(c => this.state.myDeck.push(c));
        this.shuffle(this.state.myDeck);

        // Добираем новые
        while(cardsToKeep.length < 10 && this.state.myDeck.length > 0) {
            cardsToKeep.push(this.state.myDeck.pop());
        }

        this.state.myHand = cardsToKeep;
        
        // Скрыть экран
        document.getElementById('mulligan-screen').style.display = 'none';
        document.getElementById('game-ui').style.filter = 'none';
        
        this.updateUI();
        this.tg.HapticFeedback.notificationOccurred('success');

        if (this.isOnline) {
            this.sendAction('mulligan-end', {});
        } else {
            // Ход бота или начало
            if (Math.random() > 0.5) {
                this.state.turn = 'enemy';
                setTimeout(() => this.botTurn(), 1000);
            }
        }
    }

    // === ИГРОВОЙ ПРОЦЕСС ===
    selectCard(idx) {
        if (this.state.turn !== 'my' || this.state.gameOver) return;
        const card = this.state.myHand[idx];
        
        // Определение доступных рядов
        const allowed = [];
        if (card.row === 'left' || card.row === 'any') allowed.push('left');
        if (card.row === 'right' || card.row === 'any') allowed.push('right');

        // Проверка места (макс 4 карты в ряду = 2x2 слота)
        const validRows = allowed.filter(r => this.state.myBoard[r].length < 4);

        if (validRows.length === 0) {
            this.showToast('Нет места в доступных рядах!');
            return;
        }

        this.showRowSelector(validRows, idx);
    }

    showRowSelector(rows, cardIdx) {
        const modal = document.getElementById('row-modal');
        const container = document.getElementById('row-options');
        container.innerHTML = '';
        
        rows.forEach(row => {
            const btn = document.createElement('button');
            btn.className = 'row-select-btn';
            btn.innerText = row === 'left' ? 'Левый ряд' : 'Правый ряд';
            btn.onclick = () => {
                this.placeCard(cardIdx, row);
                modal.style.display = 'none';
            };
            container.appendChild(btn);
        });
        
        modal.style.display = 'flex';
    }

    placeCard(handIdx, row) {
        const card = this.state.myHand.splice(handIdx, 1)[0];
        this.state.myBoard[row].push({ ...card, currentHp: card.health, currentPower: card.power });
        
        this.triggerEffect(card, 'my');
        this.endTurn();
    }

    triggerEffect(card, who) {
        // Базовая логика эффектов
        if (!card.effect) return;
        const eff = card.effect;
        
        if (eff.action === 'damage') {
            const targetBoard = who === 'my' ? this.state.enemyBoard : this.state.myBoard;
            const allUnits = [...targetBoard.left, ...targetBoard.right];
            if (allUnits.length > 0) {
                const target = allUnits[Math.floor(Math.random() * allUnits.length)];
                if(target) {
                    target.currentHp -= eff.value;
                    this.showToast(`${card.name} нанес урон!`);
                }
            }
        }
        // Добавить другие эффекты по аналогии
    }

    endTurn() {
        this.calculateScore();
        this.updateUI();
        
        if (this.isOnline) {
            this.sendAction('end-turn', {});
        } else {
            this.state.turn = 'enemy';
            setTimeout(() => this.botTurn(), 1000);
        }
    }

    botTurn() {
        if (this.state.gameOver) return;
        // Простой ИИ: сыграть случайную карту
        if (this.state.enemyHand.length > 0) {
            const idx = Math.floor(Math.random() * this.state.enemyHand.length);
            const card = this.state.enemyHand[idx];
            const row = (card.row === 'any') ? (Math.random()>0.5?'left':'right') : card.row;
            
            if (this.state.enemyBoard[row].length < 4) {
                this.state.enemyHand.splice(idx, 1);
                this.state.enemyBoard[row].push({ ...card, currentHp: card.health, currentPower: card.power });
                this.showToast('Противник сделал ход');
            }
        }
        
        this.state.turn = 'my';
        this.calculateScore();
        this.updateUI();
    }

    handleOpponentAction(data) {
        if (data.action === 'place-card') {
            // Логика получения карты от сервера
            // data.card, data.row
        }
        if (data.action === 'end-turn') {
            this.state.turn = 'my';
            this.updateUI();
        }
    }

    calculateScore() {
        const sum = (board) => [...board.left, ...board.right].reduce((acc, c) => acc + (c ? c.currentPower : 0), 0);
        this.state.myScore = sum(this.state.myBoard);
        this.state.enemyScore = sum(this.state.enemyBoard);
    }

    passTurn() {
        if (this.state.turn !== 'my') return;
        this.showToast('Вы пропустили ход');
        this.endTurn();
    }

    useLeaderAbility() {
        if (this.state.turn !== 'my') return;
        this.showToast('Умение лидера использовано! (+2 силы слева)');
        this.state.myBoard.left.forEach(c => { if(c) c.currentPower += 2; });
        this.calculateScore();
        this.updateUI();
        this.endTurn();
    }

    // === UI ===
    updateUI() {
        // Счет
        document.getElementById('my-score-display').innerText = this.state.myScore;
        document.getElementById('enemy-score-display').innerText = this.state.enemyScore;
        document.getElementById('round-display').innerText = this.state.round;
        document.getElementById('my-coins').innerText = this.state.myCoins;
        document.getElementById('enemy-coins').innerText = this.state.enemyCoins;

        // Статистика
        document.getElementById('my-deck-count').innerText = this.state.myDeck.length;
        document.getElementById('my-discard-count').innerText = this.state.myDiscard.length;
        document.getElementById('enemy-deck-count').innerText = this.state.enemyDeck.length;
        document.getElementById('enemy-discard-count').innerText = this.state.enemyDiscard.length;
        
        // Визуал руки врага (рубашки)
        const handVis = document.getElementById('enemy-hand-vis');
        handVis.innerHTML = '';
        for(let i=0; i<this.state.enemyHand.length; i++) {
            const back = document.createElement('div');
            back.className = 'card-back-mini';
            handVis.appendChild(back);
        }

        // Отрисовка доски
        ['left', 'right'].forEach(side => {
            ['my', 'enemy'].forEach(who) {
                const board = who === 'my' ? this.state.myBoard : this.state.enemyBoard;
                const container = document.getElementById(`${who}-${side}`);
                if(!container) return;
                container.innerHTML = '';
                
                board[side].forEach(card => {
                    const el = document.createElement('div');
                    el.className = 'card card-on-board';
                    el.style.background = who === 'my' ? 'rgba(52,152,219,0.2)' : 'rgba(231,76,60,0.2)';
                    el.innerHTML = `
                        <div class="card-name">${card.name}</div>
                        <div class="card-stats"><span class="atk">⚔️${card.currentPower}</span><span class="hp">❤️${card.currentHp}</span></div>
                    `;
                    container.appendChild(el);
                });
            }
        });

        // Отрисовка руки игрока
        const handContainer = document.getElementById('my-hand-container');
        handContainer.innerHTML = '';
        if (this.state.turn === 'my') {
            this.state.myHand.forEach((card, idx) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.innerHTML = `
                    <div class="card-cost">${card.influence}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-stats"><span class="atk">⚔️${card.power}</span><span class="hp">❤️${card.health}</span></div>
                `;
                el.onclick = () => this.selectCard(idx);
                handContainer.appendChild(el);
            });
        }

        // Кнопка паса
        const passBtn = document.getElementById('pass-btn');
        passBtn.disabled = (this.state.turn !== 'my');
    }

    showToast(msg) {
        // Простой тост через alert или создание элемента
        // Для краткости используем консоль или TG alert если важно
        console.log(msg);
    }
    
    showLeader(who) {
        alert(who === 'my' ? 'Ваш лидер: Восстановление' : 'Лидер врага: Атака');
    }
}

const game = new GameEngine();
</script>
