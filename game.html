<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; background: #222; color: white; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: #333; font-size: 14px; }
        .scores { display: flex; gap: 15px; justify-content: center; padding: 5px; background: #444; font-weight: bold; }
        .battle-field { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; gap: 10px; overflow-y: auto; }
        .lane { min-height: 100px; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 5px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .lane.enemy { border-bottom: 2px solid #e74c3c; }
        .lane.player { border-top: 2px solid #3498db; }
        .hand-area { height: 140px; background: #333; overflow-x: auto; display: flex; padding: 10px; gap: 10px; align-items: center; }
        .card { 
            width: 90px; height: 120px; background: #fff; color: #000; border-radius: 6px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 11px; position: relative; flex-shrink: 0; cursor: pointer; border: 2px solid #ccc;
        }
        .card.small { width: 70px; height: 90px; font-size: 10px; }
        .card-cost { position: absolute; top: -5px; left: -5px; background: #926eae; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; font-weight: bold; border: 1px solid #fff; }
        .card-name { font-weight: bold; margin-bottom: 5px; text-align: center; }
        .card-stats { font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div id="round-display">Раунд: 1/3</div>
            <div>
                <span id="coins-p1">🪙 0</span> | <span id="coins-p2">🪙 0</span>
            </div>
        </div>
        <div class="scores">
            <div id="score-p1" style="color:#3498db">Сила: 0</div>
            <div id="score-p2" style="color:#e74c3c">Сила: 0</div>
        </div>

        <div class="battle-field">
            <div class="lane enemy" id="enemy-lane"></div>
            <div class="lane player" id="player-lane"></div>
        </div>

        <div class="hand-area" id="player-hand">
            <!-- Карты -->
        </div>
    </div>

    <script src="config.js"></script>
    <script src="battle.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Загрузка колоды
        const savedDeck = localStorage.getItem('myDeck');
        let playerDeck = [];
        
        if (savedDeck) {
            playerDeck = JSON.parse(savedDeck);
        } else {
            // Дефолтная колода (первые 25 карт рыцарей для теста)
            playerDeck = FACTIONS.knights.cards.slice(0, 25);
        }

        // Колода бота (случайные карты)
        const allCards = [...FACTIONS.cultists.cards, ...FACTIONS.dryads.cards];
        const botDeck = allCards.sort(() => 0.5 - Math.random()).slice(0, 25);

        battle.initGame(playerDeck, botDeck);
    </script>
</body>
</html>
