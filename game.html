<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва Карт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #2c3e50;
            --slot-bg: rgba(255,255,255,0.05);
            --p1-color: #3498db; /* Игрок */
            --p2-color: #e74c3c; /* Противник */
            --highlight: #f1c40f;
        }
        body { margin: 0; padding: 0; background: var(--bg-color); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* --- ГЛАВНЫЙ КОНТЕЙНЕР (СХЕМА) --- */
        .game-layout {
            display: grid;
            grid-template-rows: 1fr 1.2fr 1fr; /* Верх | Бой | Низ */
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* ВЕРХНЯЯ ЗОНА (ПРОТИВНИК) */
        .top-zone {
            display: grid;
            grid-template-columns: 60px 1fr 60px; /* Лидер | Рука | Колода/Сброс */
            grid-template-rows: 40px 1fr;
            padding: 5px;
            gap: 5px;
            background: rgba(231, 76, 60, 0.1);
        }
        .enemy-leader { grid-row: 1 / 3; grid-column: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .enemy-hand { grid-row: 1; grid-column: 2; display: flex; justify-content: center; align-items: center; gap: 2px; overflow: hidden; }
        .enemy-stats { grid-row: 1 / 3; grid-column: 3; display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        
        /* НИЖНЯЯ ЗОНА (ИГРОК) */
        .bottom-zone {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            grid-template-rows: 1fr 40px;
            padding: 5px;
            gap: 5px;
            background: rgba(52, 152, 219, 0.1);
        }
        .player-leader { grid-row: 1 / 3; grid-column: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .player-hand { grid-row: 2; grid-column: 2; display: flex; justify-content: center; align-items: center; gap: 2px; overflow-x: auto; }
        .player-stats { grid-row: 1 / 3; grid-column: 3; display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: center; font-size: 10px; text-align: center; }

        /* ЦЕНТРАЛЬНАЯ ЗОНА (БОЙ) */
        .battle-zone {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            position: relative;
        }
        
        /* ПОЛЯ (ЛЕВЫЙ / ПРАВЫЙ) */
        .field-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            height: 48%;
        }
        .lane-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            grid-template-rows: repeat(2, 1fr);    /* 2 ряда */
            gap: 4px;
            width: 45%;
            background: var(--slot-bg);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .lane-label {
            position: absolute;
            top: -18px;
            left: 0;
            font-size: 10px;
            opacity: 0.5;
            width: 100%;
            text-align: center;
        }
        .slot {
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .slot.highlight { border: 2px dashed var(--highlight); animation: pulse 1s infinite; }

        /* ЦЕНТР (СЧЕТ И ПАСС) */
        .center-controls {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 8px;
        }
        .score-board { font-size: 18px; font-weight: bold; }
        .pass-btn {
            background: #e67e22; color: white; border: none;
            padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold;
            cursor: pointer;
        }
        .pass-btn:disabled { background: #555; opacity: 0.5; }

        /* КАРТЫ */
        .card {
            width: 100%; height: 100%;
            background: var(--card-bg);
            border-radius: 4px;
            border: 1px solid #555;
            font-size: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .card.in-hand {
            width: 50px; height: 70px;
            flex-shrink: 0;
            border: 2px solid #fff;
        }
        .card.in-hand:active { transform: translateY(-10px); z-index: 100; }
        
        .card-cost { position: absolute; top: -2px; left: -2px; background: #926eae; color: white; border-radius: 50%; width: 14px; height: 14px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
        .card-stats { display: flex; gap: 3px; font-weight: bold; font-size: 10px; margin-top: 2px; }
        .stat-atk { color: #e74c3c; }
        .stat-hp { color: #2ecc71; }
        .card-name { text-align: center; font-weight: 600; line-height: 1; margin-bottom: 2px; }

        /* ЛИДЕРЫ И СТАТИСТИКА */
        .leader-icon {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #444;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            cursor: pointer;
            position: relative;
        }
        .leader-coins {
            position: absolute; top: -5px; right: -5px;
            background: var(--highlight); color: #000;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .stat-box {
            background: rgba(0,0,0,0.5);
            padding: 4px; border-radius: 4px;
            min-width: 40px;
            cursor: pointer;
        }
        .stat-val { font-size: 14px; font-weight: bold; display: block; }
        .stat-lbl { font-size: 8px; opacity: 0.7; }

        /* МОДАЛКИ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #2c3e50; padding: 15px; border-radius: 8px;
            width: 80%; max-width: 250px; text-align: center;
        }
        .row-btn {
            background: #34495e; border: 1px solid #555; color: white;
            padding: 8px 12px; border-radius: 4px; margin: 5px; cursor: pointer;
        }
        .close-btn { background: #e74c3c; border: none; color: white; padding: 5px 10px; border-radius: 4px; margin-top: 10px; width: 100%; cursor: pointer; }
        
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="game-layout">
    <!-- === ВЕРХ (ПРОТИВНИК) === -->
    <div class="top-zone">
        <!-- Лидер Врага -->
        <div class="enemy-leader">
            <div class="leader-icon" style="border-color: var(--p2-color);" ondblclick="game.showLeaderInfo('enemy')" onclick="game.activateLeader('enemy')">
                🤖
                <div class="leader-coins" id="enemy-coins">0</div>
            </div>
        </div>
        
        <!-- Рука Врага (видны только рубашки) -->
        <div class="enemy-hand" id="enemy-hand-zone"></div>
        
        <!-- Статистика Врага (Колода / Сброс) -->
        <div class="enemy-stats">
            <div class="stat-box" ondblclick="game.showList('enemy-deck')">
                <span class="stat-val" id="enemy-deck-count">0</span>
                <span class="stat-lbl">Колода</span>
            </div>
            <div class="stat-box" ondblclick="game.showList('enemy-discard')">
                <span class="stat-val" id="enemy-discard-count">0</span>
                <span class="stat-lbl">Сброс</span>
            </div>
        </div>
    </div>

    <!-- === ЦЕНТР (ПОЛЕ БОЯ) === -->
    <div class="battle-zone">
        <!-- Ряды Противника -->
        <div class="field-row">
            <div class="lane-container" id="enemy-left">
                <div class="lane-label">ЛЕВЫЙ РЯД</div>
                <div class="slot" data-pos="0"></div><div class="slot" data-pos="1"></div>
                <div class="slot" data-pos="2"></div><div class="slot" data-pos="3"></div>
            </div>
            <div class="lane-container" id="enemy-right">
                <div class="lane-label">ПРАВЫЙ РЯД</div>
                <div class="slot" data-pos="0"></div><div class="slot" data-pos="1"></div>
                <div class="slot" data-pos="2"></div><div class="slot" data-pos="3"></div>
            </div>
        </div>

        <!-- Управление (Счет + Пасс) -->
        <div class="center-controls">
            <div class="score-board">
                <span style="color:var(--p1-color)" id="score-p1">0</span> : <span style="color:var(--p2-color)" id="score-p2">0</span>
            </div>
            <div style="font-size:10px;">Раунд <span id="round-num">1</span></div>
            <button class="pass-btn" id="pass-btn" onclick="game.passTurn()">ПАСС</button>
        </div>

        <!-- Ряды Игрока -->
        <div class="field-row">
            <div class="lane-container" id="player-left">
                <div class="lane-label">ЛЕВЫЙ РЯД</div>
                <div class="slot" data-pos="0"></div><div class="slot" data-pos="1"></div>
                <div class="slot" data-pos="2"></div><div class="slot" data-pos="3"></div>
            </div>
            <div class="lane-container" id="player-right">
                <div class="lane-label">ПРАВЫЙ РЯД</div>
                <div class="slot" data-pos="0"></div><div class="slot" data-pos="1"></div>
                <div class="slot" data-pos="2"></div><div class="slot" data-pos="3"></div>
            </div>
        </div>
    </div>

    <!-- === НИЗ (ИГРОК) === -->
    <div class="bottom-zone">
        <!-- Лидер Игрока -->
        <div class="player-leader">
            <div class="leader-icon" style="border-color: var(--p1-color);" ondblclick="game.showLeaderInfo('my')" onclick="game.activateLeader('my')">
                🛡️
                <div class="leader-coins" id="my-coins">0</div>
            </div>
        </div>

        <!-- Рука Игрока -->
        <div class="player-hand" id="player-hand-zone"></div>

        <!-- Статистика Игрока (Колода / Сброс) -->
        <div class="player-stats">
            <div class="stat-box" ondblclick="game.showList('my-discard')">
                <span class="stat-val" id="my-discard-count">0</span>
                <span class="stat-lbl">Сброс</span>
            </div>
            <div class="stat-box" ondblclick="game.showList('my-deck')">
                <span class="stat-val" id="my-deck-count">0</span>
                <span class="stat-lbl">Колода</span>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО -->
<div class="modal-overlay" id="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script src="config.js"></script>
<script>
class GameEngine {
    constructor() {
        this.tg = window.Telegram.WebApp;
        this.tg.expand();
        this.tg.ready();

        // Проверка режима игры
        const urlParams = new URLSearchParams(window.location.search);
        this.isOnline = urlParams.get('mode') === 'online';
        this.roomId = urlParams.get('room');
        this.mySide = urlParams.get('side') || 'p1'; // p1 или p2

        this.socket = null;
        if (this.isOnline) this.initSocket();

        this.state = {
            round: 1, myCoins: 0, enemyCoins: 0,
            myScore: 0, enemyScore: 0,
            turn: 'my', gameOver: false,
            myHand: [], myDeck: [], myDiscard: [],
            myBoard: { left: [null,null,null,null], right: [null,null,null,null] },
            enemyHand: [], enemyDeck: [], enemyDiscard: [],
            enemyBoard: { left: [null,null,null,null], right: [null,null,null,null] },
            selectedCardIdx: null,
            leaderUsed: false
        };

        this.initGame();
    }

    initSocket() {
        this.socket = io('http://193.148.59.127:3000');
        this.socket.on('connect', () => console.log('Connected to game server'));
        
        // Слушаем ход противника
        this.socket.on('opponent-move', (data) => {
            this.handleOpponentMove(data);
        });

        this.socket.on('game-over', (data) => {
            alert(data.winner === this.mySide ? "ПОБЕДА!" : "ПОРАЖЕНИЕ!");
            window.location.href = 'index.html';
        });
    }

    sendMove(action, payload) {
        if (this.isOnline && this.socket) {
            this.socket.emit('player-move', { room: this.roomId, action, payload });
        }
    }

    initGame() {
        // Загрузка колоды
        let deckData = [];
        if (localStorage.getItem('tempMatchDeck')) {
            deckData = JSON.parse(localStorage.getItem('tempMatchDeck'));
        } else {
            deckData = FACTIONS.knights.cards.slice(0, 25);
        }

        this.state.myDeck = deckData.map(c => ({...c, uid: Math.random()}));
        // Для бота или противника берем случайную фракцию
        const enemyFaction = Object.keys(FACTIONS)[Math.floor(Math.random()*Object.keys(FACTIONS).length)];
        this.state.enemyDeck = [...FACTIONS[enemyFaction].cards].sort(()=>0.5-Math.random()).slice(0,25).map(c => ({...c, uid: Math.random()}));

        this.shuffle(this.state.myDeck);
        this.shuffle(this.state.enemyDeck);

        this.drawCards('my', 10);
        this.drawCards('enemy', 10);
        this.updateUI();
    }

    shuffle(arr) { for(let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
    
    drawCards(who, count) {
        const deck = who==='my'?this.state.myDeck:this.state.enemyDeck;
        const hand = who==='my'?this.state.myHand:this.state.enemyHand;
        for(let i=0;i<count;i++) if(deck.length && hand.length<10) hand.push(deck.pop());
    }

    selectCard(idx) {
        if (this.state.turn !== 'my' || this.state.gameOver) return;
        const card = this.state.myHand[idx];
        this.state.selectedCardIdx = idx;

        // Определение доступных рядов
        let rows = [];
        if (card.row === 'any' || card.row === 'left') rows.push('left');
        if (card.row === 'any' || card.row === 'right') rows.push('right');

        // Фильтр полных рядов
        rows = rows.filter(r => this.state.myBoard[r].filter(c=>c!==null).length < 4);

        if (!rows.length) { alert("Нет места!"); return; }

        this.showRowModal(rows, card);
    }

    showRowModal(rows, card) {
        const modal = document.getElementById('modal');
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <h3>Куда поставить ${card.name}?</h3>
            <p style="font-size:10px; opacity:0.7">${card.effect?.description || ''}</p>
            <div>${rows.map(r => `<button class="row-btn" onclick="game.placeCard('${r}')">${r==='left'?'Левый ряд':'Правый ряд'}</button>`).join('')}</div>
            <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">Отмена</button>
        `;
        modal.style.display = 'flex';
    }

    placeCard(row) {
        const idx = this.state.selectedCardIdx;
        if (idx === null) return;
        const card = this.state.myHand.splice(idx, 1)[0];
        
        // Находим первый пустой слот
        const boardRow = this.state.myBoard[row];
        const pos = boardRow.findIndex(c => c === null);
        if (pos !== -1) {
            boardRow[pos] = { ...card, curHp: card.health, curPow: card.power };
            this.triggerEffect(card, 'my');
            this.state.selectedCardIdx = null;
            document.getElementById('modal').style.display = 'none';
            
            this.sendMove('play', { card, row, pos });
            this.endTurn();
        }
    }

    triggerEffect(card, who) {
        if (!card.effect) return;
        const eff = card.effect;
        // Упрощенная логика эффектов для примера
        if (eff.action === 'damage') {
            const targetBoard = who==='my' ? this.state.enemyBoard : this.state.myBoard;
            const units = [...targetBoard.left, ...targetBoard.right].filter(c=>c);
            if (units.length) {
                const t = units[Math.floor(Math.random()*units.length)];
                t.curHp -= eff.value;
                if (t.curHp <= 0) this.killUnit(t, who==='my'?'enemy':'my');
            }
        }
        // Добавить другие эффекты по аналогии
    }

    killUnit(unit, owner) {
        const board = owner==='my' ? this.state.myBoard : this.state.enemyBoard;
        const discard = owner==='my' ? this.state.myDiscard : this.state.enemyDiscard;
        ['left','right'].forEach(r => {
            const idx = board[r].indexOf(unit);
            if (idx !== -1) { board[r][idx] = null; discard.push(unit); }
        });
    }

    endTurn() {
        this.calcScore();
        this.state.turn = 'enemy';
        this.updateUI();
        
        if (this.isOnline) {
            // Ждем ответа сервера
        } else {
            setTimeout(() => this.botTurn(), 1500);
        }
    }

    botTurn() {
        if (this.state.gameOver) return;
        // Простой ИИ: играет случайную карту в случайный ряд
        const hand = this.state.enemyHand;
        if (hand.length) {
            const idx = Math.floor(Math.random()*hand.length);
            const card = hand[idx];
            const row = (card.row==='any') ? (Math.random()>0.5?'left':'right') : card.row;
            
            if (this.state.enemyBoard[row].filter(c=>c).length < 4) {
                hand.splice(idx, 1);
                const pos = this.state.enemyBoard[row].findIndex(c=>c===null);
                this.state.enemyBoard[row][pos] = { ...card, curHp: card.health, curPow: card.power };
                this.triggerEffect(card, 'enemy');
            }
        }
        this.state.turn = 'my';
        this.calcScore();
        this.checkRoundEnd();
        this.updateUI();
    }

    handleOpponentMove(data) {
        // Логика получения хода от сервера (аналогично botTurn, но с данными из сети)
        this.state.turn = 'my';
        this.calcScore();
        this.checkRoundEnd();
        this.updateUI();
    }

    passTurn() {
        if (this.state.turn !== 'my') return;
        this.sendMove('pass', {});
        this.endTurn();
    }

    calcScore() {
        const sum = (b) => [...b.left, ...b.right].reduce((a,c)=>a+(c?c.curPow:0),0);
        this.state.myScore = sum(this.state.myBoard);
        this.state.enemyScore = sum(this.state.enemyBoard);
    }

    checkRoundEnd() {
        if (this.state.myHand.length===0 && this.state.enemyHand.length===0) {
            this.finishRound();
        }
    }

    finishRound() {
        let msg = "";
        if (this.state.myScore > this.state.enemyScore) { this.state.myCoins++; msg="Победа!"; }
        else if (this.state.enemyScore > this.state.myScore) { this.state.enemyCoins++; msg="Поражение"; }
        else msg="Ничья";
        
        alert(`Раунд завершен: ${msg}`);
        
        if (this.state.myCoins >= 2) return this.endGame(true);
        if (this.state.enemyCoins >= 2) return this.endGame(false);
        
        if (this.state.round < 3) {
            this.state.round++;
            this.resetRound();
        } else {
            this.endGame(this.state.myCoins > this.state.enemyCoins);
        }
    }

    resetRound() {
        [...this.state.myBoard.left, ...this.state.myBoard.right].forEach(c=>{if(c)this.state.myDiscard.push(c)});
        [...this.state.enemyBoard.left, ...this.state.enemyBoard.right].forEach(c=>{if(c)this.state.enemyDiscard.push(c)});
        this.state.myBoard = {left:[null,null,null,null], right:[null,null,null,null]};
        this.state.enemyBoard = {left:[null,null,null,null], right:[null,null,null,null]};
        this.drawCards('my', 3); this.drawCards('enemy', 3);
        this.updateUI();
    }

    endGame(win) {
        this.state.gameOver = true;
        alert(win ? "ВЫ ВЫИГРАЛИ МАТЧ!" : "ВЫ ПРОИГРАЛИ МАТЧ");
        window.location.href = 'index.html';
    }

    activateLeader(who) {
        if (who !== 'my' || this.state.turn !== 'my' || this.state.leaderUsed) return;
        this.state.leaderUsed = true;
        alert("Лидер активирован! (+2 силы левому ряду)");
        this.state.myBoard.left.forEach(c => { if(c) c.curPow += 2; });
        this.calcScore();
        this.updateUI();
    }

    showLeaderInfo(who) {
        alert(who==='my' ? "Ваш лидер: Бафф левого ряда" : "Лидер врага: Урон по случайной цели");
    }

    showList(type) {
        let list = [];
        if (type==='my-deck') list=this.state.myDeck;
        if (type==='my-discard') list=this.state.myDiscard;
        if (type==='enemy-deck') list=this.state.enemyDeck;
        if (type==='enemy-discard') list=this.state.enemyDiscard;
        
        const names = list.map(c=>c.name).join('\n') || "Пусто";
        alert(`${type}:\n${names}`);
    }

    updateUI() {
        // Счет и монеты
        document.getElementById('score-p1').innerText = this.state.myScore;
        document.getElementById('score-p2').innerText = this.state.enemyScore;
        document.getElementById('round-num').innerText = this.state.round;
        document.getElementById('my-coins').innerText = this.state.myCoins;
        document.getElementById('enemy-coins').innerText = this.state.enemyCoins;
        
        // Счетчики
        document.getElementById('my-deck-count').innerText = this.state.myDeck.length;
        document.getElementById('my-discard-count').innerText = this.state.myDiscard.length;
        document.getElementById('enemy-deck-count').innerText = this.state.enemyDeck.length;
        document.getElementById('enemy-discard-count').innerText = this.state.enemyDiscard.length;

        // Рука игрока
        const handZone = document.getElementById('player-hand-zone');
        handZone.innerHTML = '';
        if (this.state.turn === 'my') {
            this.state.myHand.forEach((c, i) => {
                const el = document.createElement('div');
                el.className = 'card in-hand';
                el.innerHTML = `<div class="card-cost">${c.influence}</div><div class="card-name">${c.name}</div><div class="card-stats"><span class="stat-atk">⚔️${c.power}</span><span class="stat-hp">❤️${c.health}</span></div>`;
                el.onclick = () => this.selectCard(i);
                el.ondblclick = (e) => { e.stopPropagation(); alert(`${c.name}\n${c.effect?.description||''}`); };
                handZone.appendChild(el);
            });
        }

        // Рука врага (рубашки)
        const enemyHandZone = document.getElementById('enemy-hand-zone');
        enemyHandZone.innerHTML = '';
        this.state.enemyHand.forEach(() => {
            const el = document.createElement('div');
            el.style.width='40px'; el.style.height='60px'; el.style.background='#555'; el.style.borderRadius='4px'; el.style.border='1px solid #fff';
            enemyHandZone.appendChild(el);
        });

        // Отрисовка поля
        ['my', 'enemy'].forEach(who => {
            const board = who==='my' ? this.state.myBoard : this.state.enemyBoard;
            ['left', 'right'].forEach(row => {
                const container = document.getElementById(`${who}-${row}`);
                if(!container) return;
                const slots = container.querySelectorAll('.slot');
                slots.forEach((slot, i) => {
                    slot.innerHTML = '';
                    const card = board[row][i];
                    if (card) {
                        const el = document.createElement('div');
                        el.className = 'card';
                        el.style.background = who==='my' ? 'rgba(52,152,219,0.3)' : 'rgba(231,76,60,0.3)';
                        el.innerHTML = `<div class="card-name">${card.name}</div><div class="card-stats"><span class="stat-atk">⚔️${card.curPow}</span><span class="stat-hp">❤️${card.curHp}</span></div>`;
                        slot.appendChild(el);
                    }
                });
            });
        });

        // Кнопка пасс
        const btn = document.getElementById('pass-btn');
        btn.disabled = this.state.turn !== 'my';
    }
}

const game = new GameEngine();
</script>
</body>
</html>
