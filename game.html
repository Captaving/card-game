<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Битва</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 10px; padding-bottom: 100px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 10px; }
    .rating-display { font-size: 12px; color: #f1c40f; font-weight: 700; }
    .online-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #2ecc71; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }
    .opponent-zone { display: flex; align-items: flex-start; margin-bottom: 10px; }
    .leader-opponent { width: 45px; height: 45px; border-radius: 8px; background: linear-gradient(135deg, #666, #333); border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 8px; cursor: pointer; }
    .hand-opponent { flex: 1; display: flex; gap: 4px; overflow-x: auto; padding: 5px 0; height: 55px; }
    .card-back { width: 38px; height: 52px; border-radius: 6px; background: linear-gradient(135deg, #2c3e50, #1a252f); border: 2px solid #34495e; flex-shrink: 0; }
    .deck-zone { display: flex; flex-direction: column; gap: 5px; margin-left: 10px; cursor: pointer; }
    .deck-pile, .discard-pile { width: 45px; height: 45px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; }
    .deck-pile::before { content: '📚'; font-size: 18px; }
    .discard-pile::before { content: '🗑️'; font-size: 18px; }
    .pile-count { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; color: #888; }
    .battlefield { display: flex; justify-content: center; gap: 15px; margin: 10px 0; padding: 10px 0; }
    .player-field { display: flex; flex-direction: column; gap: 8px; }
    .rows-container { display: flex; gap: 6px; }
    .row { display: flex; flex-direction: column; gap: 6px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); min-width: 85px; }
    .row-label { font-size: 9px; text-align: center; color: #666; margin-bottom: 3px; text-transform: uppercase; font-weight: 600; }
    .field-card { width: 75px; min-height: 100px; border-radius: 8px; background: #2c3e50; border: 2px solid rgba(255,255,255,0.3); display: flex; flex-direction: column; padding: 6px; position: relative; }
    .field-card-type { font-size: 7px; padding: 2px 4px; border-radius: 3px; text-align: center; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .field-card-type.white { background: #fff; color: #333; }
    .field-card-type.gray { background: #95a5a6; color: #fff; }
    .field-card-type.purple { background: #a233ff; color: #fff; }
    .field-card-type.gold { background: #f1c40f; color: #333; }
    .field-card-type.special { background: #e74c3c; color: #fff; }
    .field-card-name { font-size: 9px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; text-align: center; min-height: 22px; }
    .field-card-power { font-size: 16px; font-weight: 700; color: #fff; text-align: center; margin: 4px 0; }
    .field-card-stats { display: flex; gap: 4px; justify-content: center; font-size: 9px; margin-bottom: 4px; }
    .field-card-effect { font-size: 8px; color: #888; line-height: 1.2; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 4px; margin-top: auto; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .score-pass-zone { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; margin: 8px 0; }
    .score { display: flex; flex-direction: column; gap: 12px; }
    .score-box { padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.1); text-align: center; min-width: 65px; }
    .score-label { font-size: 9px; color: #888; margin-bottom: 2px; }
    .score-value { font-size: 18px; font-weight: 700; }
    .score-value.win { color: #2ecc71; }
    .score-value.lose { color: #e74c3c; }
    .action-buttons { display: flex; gap: 8px; flex-direction: column; }
    .pass-btn { padding: 12px 25px; border-radius: 8px; background: linear-gradient(135deg, #e74c3c, #c0392b); border: none; color: white; font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
    .pass-btn:active { transform: scale(0.95); }
    .pass-btn.used { background: #555; cursor: not-allowed; opacity: 0.5; }
    .surrender-btn { padding: 10px 20px; border-radius: 8px; background: linear-gradient(135deg, #555, #333); border: none; color: white; font-size: 12px; font-weight: 600; cursor: pointer; }
    .player-zone { display: flex; align-items: flex-end; margin-top: 8px; }
    .leader-player { width: 45px; height: 45px; border-radius: 8px; background: linear-gradient(135deg, #3498db, #2980b9); border: 2px solid #3498db; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 8px; cursor: pointer; position: relative; }
    .leader-player::after { content: '⚡'; position: absolute; top: -4px; right: -4px; background: #f1c40f; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    .hand-player { flex: 1; display: flex; gap: 5px; overflow-x: auto; padding: 8px 0; height: 80px; }
    .hand-card { width: 50px; height: 68px; border-radius: 6px; background: #2c3e50; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; }
    .hand-card-type { font-size: 6px; padding: 2px 3px; border-radius: 2px; margin-bottom: 2px; }
    .hand-card-name { font-size: 7px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .hand-card-power { font-size: 12px; font-weight: 700; color: #fff; margin-top: 2px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: #1a1a2e; border-radius: 15px; padding: 20px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; text-align: center; color: #3498db; }
    .modal-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    .modal-card { padding: 8px; border-radius: 8px; background: #2c3e50; border: 2px solid transparent; cursor: pointer; text-align: center; font-size: 12px; }
    .modal-card:active { background: rgba(52, 152, 219, 0.3); }
    .modal-close { margin-top: 15px; padding: 12px; background: #e74c3c; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; width: 100%; font-size: 13px; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 12px 20px; border-radius: 20px; font-size: 12px; z-index: 2000; opacity: 0; transition: opacity 0.2s; max-width: 85%; text-align: center; pointer-events: none; }
    .toast.show { opacity: 1; }
    .info-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1500; display: none; align-items: center; justify-content: center; padding: 20px; }
    .info-overlay.active { display: flex; }
    .info-content { background: #1a1a2e; border-radius: 15px; padding: 25px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; border: 2px solid #3498db; }
    .info-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; color: #3498db; }
    .info-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .info-card { padding: 10px; background: #2c3e50; border-radius: 8px; font-size: 11px; }
    .info-close { margin-top: 20px; padding: 12px; background: #3498db; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; width: 100%; font-size: 14px; }
    .leader-info { background: rgba(52, 152, 219, 0.1); border: 1px solid #3498db; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
    .leader-name { font-size: 16px; font-weight: 700; color: #3498db; margin-bottom: 8px; }
    .leader-ability { font-size: 12px; color: #aaa; line-height: 1.4; }
    @media (max-width: 480px) { .field-card { width: 70px; min-height: 95px; } .row { min-width: 75px; } }
  </style>
</head>
<body>
  <div class="top-bar">
    <div style="display: flex; align-items: center; gap: 10px;">
      <div style="font-size: 12px; color: #888;">Рейтинг:</div>
      <div class="rating-display" id="playerRatingDisplay">⭐ 0</div>
    </div>
    <div class="online-indicator" id="onlineIndicator" style="display:none;">
      <div class="online-dot"></div>
      <span>Онлайн</span>
    </div>
  </div>
  
  <div class="opponent-zone">
    <div class="leader-opponent" id="leaderOpponent" ondblclick="showLeaderInfo('opponent')">👤</div>
    <div class="hand-opponent" id="handOpponent"></div>
    <div class="deck-zone">
      <div class="deck-pile" ondblclick="showDeckInfo('opponent')"><span class="pile-count" id="deckOpponentCount">0</span></div>
      <div class="discard-pile" ondblclick="showDiscardInfo('opponent')"><span class="pile-count" id="discardOpponentCount">0</span></div>
    </div>
  </div>
  
  <div class="battlefield">
    <div class="player-field" id="fieldOpponent">
      <div class="rows-container">
        <div class="row" id="opponentLeftRow"><div class="row-label">Левый</div></div>
        <div class="row" id="opponentRightRow"><div class="row-label">Правый</div></div>
      </div>
    </div>
  </div>
  
  <div class="score-pass-zone">
    <div class="score">
      <div class="score-box">
        <div class="score-label">ПРОТИВНИК</div>
        <div class="score-value" id="scoreOpponent">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">ИГРОК</div>
        <div class="score-value" id="scorePlayer">0</div>
      </div>
    </div>
    <div class="action-buttons">
      <button class="pass-btn" id="passBtn" onclick="passTurn()">PASS</button>
      <button class="surrender-btn" onclick="surrenderGame()">🏳️ Сдаться</button>
    </div>
  </div>
  
  <div class="battlefield">
    <div class="player-field" id="fieldPlayer">
      <div class="rows-container">
        <div class="row" id="playerLeftRow"><div class="row-label">Левый</div></div>
        <div class="row" id="playerRightRow"><div class="row-label">Правый</div></div>
      </div>
    </div>
  </div>
  
  <div class="player-zone">
    <div class="leader-player" id="leaderPlayer" ondblclick="showLeaderInfo('player')" onclick="useLeaderAbility()">👑</div>
    <div class="hand-player" id="handPlayer"></div>
    <div class="deck-zone">
      <div class="deck-pile" ondblclick="showDeckInfo('player')"><span class="pile-count" id="deckPlayerCount">0</span></div>
      <div class="discard-pile" ondblclick="showDiscardInfo('player')"><span class="pile-count" id="discardPlayerCount">0</span></div>
    </div>
  </div>
  
  <div class="modal" id="cardModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">Выберите ряд</div>
      <div class="modal-cards" id="modalCards"></div>
      <button class="modal-close" onclick="closeModal()">Закрыть</button>
    </div>
  </div>
  
  <div class="info-overlay" id="infoOverlay" onclick="closeInfoOverlay(event)">
    <div class="info-content" onclick="event.stopPropagation()">
      <div class="info-title" id="infoTitle">Информация</div>
      <div id="infoContent"></div>
      <button class="info-close" onclick="closeInfoOverlay()">Закрыть</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const SERVER_URL = 'http://193.148.59.127:3000';
    const socket = io(SERVER_URL, { transports: ['websocket', 'polling'], reconnection: true, reconnectionAttempts: 3 });
    
    let roomId = null;
    let isOnlineGame = false;
    let playerId = null;
    
    socket.on('connect', () => { console.log('✅ Connected'); playerId = socket.id; document.getElementById('onlineIndicator').style.display = 'flex'; });
    socket.on('disconnect', () => { console.log('❌ Disconnected'); document.getElementById('onlineIndicator').style.display = 'none'; });
    socket.on('room-created', (data) => { roomId = data.roomId; showToast(`🏠 Комната: ${roomId}`); });
    socket.on('game-start', () => { showToast('🎮 Игра началась!'); isOnlineGame = true; });
    socket.on('opponent-move', (data) => { renderAll(); });
    socket.on('opponent-pass', () => { showToast('⏭️ Противник пропустил ход'); gameState.opponentPass = true; if (gameState.playerPass) endRound(); renderAll(); });
    socket.on('opponent-disconnected', () => { showToast('❌ Противник вышел'); setTimeout(() => window.location.href = 'index.html', 2000); });
    
    let gameState = {
      playerFaction: localStorage.getItem('selectedFaction') || 'knights',
      playerLeader: localStorage.getItem('playerLeader') || null,
      playerHand: [], playerDeck: [], playerDiscard: [],
      playerField: { left: [], right: [] },
      opponentHand: [], opponentDeck: [], opponentDiscard: [],
      opponentField: { left: [], right: [] },
      playerScore: 0, opponentScore: 0,
      playerPass: false, opponentPass: false,
      round: 1, leaderUsed: false, currentPlayer: 'player', gameOver: false
    };
    
    let playerRating = parseInt(localStorage.getItem('playerRating') || '0');
    let clickTimer = null;
    let lastClickTarget = null;
    
    // === ЭФФЕКТЫ КАРТ ===
    const CardEffects = {
      damage: (target, value) => { if (!target) return {ok:false}; target.health = (target.health||1) - value; return {ok:true, destroyed:target.health<=0, msg:`${target.name} получил ${value} урона`}; },
      heal: (target, value) => { if (!target) return {ok:false}; target.health = (target.health||0) + value; return {ok:true, msg:`${target.name} исцелён на ${value}`}; },
      buff: (target, value, stat) => { if (!target||!stat) return {ok:false}; target[stat] = (target[stat]||0) + value; return {ok:true, msg:`${target.name}: +${value} ${stat}`}; },
      summon: (cardId, count, row) => {
        const faction = FACTIONS[gameState.playerFaction];
        const template = faction?.cards?.find(c => c.id === cardId);
        if (!template) return {ok:false, msg:'Карта не найдена'};
        let summoned = 0;
        for (let i=0; i<count; i++) {
          if (gameState.playerField[row]?.length < 4) {
            gameState.playerField[row].push({...template, instanceId: Date.now()+i});
            summoned++;
          }
        }
        return {ok:true, msg:`Призвано ${summoned} карт`};
      },
      draw: (count) => {
        const draw = Math.min(count, gameState.playerDeck.length);
        if (draw > 0) {
          gameState.playerHand.push(...gameState.playerDeck.splice(0, draw));
          return {ok:true, msg:`Взято ${draw} карт`};
        }
        return {ok:false, msg:'Колода пуста'};
      },
      returnToHand: (target) => {
        if (!target) return {ok:false};
        ['left','right'].forEach(row => {
          const idx = gameState.playerField[row].findIndex(c => c.id === target.id);
          if (idx > -1) {
            gameState.playerField[row].splice(idx, 1);
            gameState.playerHand.push(target);
            return {ok:true, msg:`${target.name} возвращён в руку`};
          }
        });
        return {ok:false};
      },
      destroy: (target) => {
        if (!target) return {ok:false};
        ['left','right'].forEach(row => {
          const idx = gameState.playerField[row].findIndex(c => c.id === target.id);
          if (idx > -1) {
            const card = gameState.playerField[row].splice(idx, 1)[0];
            gameState.playerDiscard.push(card);
            return {ok:true, msg:`${target.name} уничтожен`};
          }
        });
        return {ok:false};
      }
    };
    
    // === ОБРАБОТКА ЭФФЕКТОВ ===
    function handleCardEffect(card, context={}) {
      if (!card?.effect) return {ok:true, msg:'Нет эффекта'};
      const eff = card.effect;
      
      if (eff.action === 'damage') {
        const enemies = [...gameState.opponentField.left, ...gameState.opponentField.right];
        if (enemies[0]) return CardEffects.damage(enemies[0], eff.value||1);
      }
      else if (eff.action === 'heal') {
        const allies = [...gameState.playerField.left, ...gameState.playerField.right];
        if (allies[0]) return CardEffects.heal(allies[0], eff.value||2);
      }
      else if (eff.action === 'buff' && eff.stat) {
        const allies = gameState.playerField[context.row]?.filter(c => c.id !== card.id) || [];
        if (allies[0]) return CardEffects.buff(allies[0], eff.value||2, eff.stat);
      }
      else if (eff.action === 'summon' && eff.card) {
        return CardEffects.summon(eff.card, eff.count||1, eff.position==='adjacent'?(context.row||'left'):'left');
      }
      else if (eff.action === 'draw') {
        return CardEffects.draw(eff.value||1);
      }
      
      return {ok:true, msg:'Эффект активирован'};
    }
    
    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('DOMContentLoaded', () => {
      // Проверка выбора лидера
      if (!gameState.playerLeader) {
        alert('⚠️ Выберите лидера в конструкторе колоды!\n\nПеренаправление...');
        window.location.href = 'deckbuilder.html';
        return;
      }
      
      document.getElementById('playerRatingDisplay').textContent = '⭐ ' + playerRating;
      loadDeck();
      initGame();
      renderAll();
    });
    
    function loadDeck() {
      const faction = gameState.playerFaction;
      const saved = localStorage.getItem(`deck_${faction}`);
      if (saved) {
        const ids = JSON.parse(saved);
        gameState.playerDeck = ids.map(id => getCardById(id));
      } else {
        const data = FACTIONS[faction];
        gameState.playerDeck = data.cards.slice(0, 25);
      }
      shuffle(gameState.playerDeck);
      gameState.playerHand = gameState.playerDeck.splice(0, 10);
    }
    
    function initGame() {
      const factions = ['mages', 'cultists', 'dryads'];
      const enemy = FACTIONS[factions[Math.floor(Math.random() * factions.length)]];
      gameState.opponentDeck = enemy.cards.slice(0, 25);
      shuffle(gameState.opponentDeck);
      gameState.opponentHand = gameState.opponentDeck.splice(0, 10);
    }
    
    // === ОТРИСОВКА ===
    function renderAll() {
      renderHand('player'); renderHand('opponent');
      renderField('player'); renderField('opponent');
      renderScores(); renderDeckCounts(); renderLeader(); updatePassBtn();
    }
    
    function renderHand(who) {
      const container = document.getElementById(`hand${who==='player'?'Player':'Opponent'}`);
      const hand = gameState[who==='player'?'playerHand':'opponentHand'];
      container.innerHTML = '';
      hand.forEach((card, idx) => {
        const el = document.createElement('div');
        if (who === 'opponent') {
          el.className = 'card-back';
        } else {
          const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
          el.className = 'hand-card';
          el.innerHTML = `<div class="hand-card-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div><div class="hand-card-name">${card.name}</div><div class="hand-card-power">⚔️${card.power}</div>`;
          setupDoubleClick(el, () => playCard(idx), () => showCardEffect(card));
        }
        container.appendChild(el);
      });
    }
    
    function renderField(who) {
      ['left','right'].forEach(row => {
        const el = document.getElementById(`${who}${row==='left'?'Left':'Right'}Row`);
        el.querySelectorAll('.field-card').forEach(c => c.remove());
        gameState[who==='player'?'playerField':'opponentField'][row].forEach((card, idx) => {
          const cardEl = createFieldCard(card, who, row, idx);
          if (who === 'player') setupDoubleClick(cardEl, () => selectCard(who,row,idx), () => showCardEffect(card));
          el.appendChild(cardEl);
        });
      });
    }
    
    function createFieldCard(card, who, row, idx) {
      const el = document.createElement('div');
      el.className = 'field-card';
      el.style.borderColor = who==='player' ? FACTIONS[gameState.playerFaction].color : '#666';
      const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
      const eff = card.effect ? (card.effect.description||'Есть эффект') : 'Нет эффекта';
      el.innerHTML = `<div class="field-card-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div><div class="field-card-name">${card.name}</div><div class="field-card-power">⚔️${card.power}</div><div class="field-card-stats"><span>🛡️${card.armor}</span><span>❤️${card.health}</span></div><div class="field-card-effect">${eff.substring(0,30)}${eff.length>30?'...':''}</div>`;
      return el;
    }
    
    // === ДВОЙНОЕ НАЖАТИЕ ===
    function setupDoubleClick(el, singleClickHandler, doubleClickHandler) {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        if (clickTimer && lastClickTarget === el) {
          clearTimeout(clickTimer);
          clickTimer = null;
          lastClickTarget = null;
          doubleClickHandler();
        } else {
          clickTimer = setTimeout(() => {
            singleClickHandler();
            clickTimer = null;
            lastClickTarget = null;
          }, 250);
          lastClickTarget = el;
        }
      });
    }
    
    // === ПОКАЗ ИНФОРМАЦИИ ===
    function showCardEffect(card) {
      const eff = card.effect ? (card.effect.description || 'Есть эффект') : 'Нет эффекта';
      const html = `
        <div class="leader-info">
          <div class="leader-name">${card.name}</div>
          <div style="margin:10px 0; font-size:13px;">
            <div>⚔️ Сила: ${card.power}</div>
            <div>🛡️ Броня: ${card.armor}</div>
            <div>❤️ Здоровье: ${card.health}</div>
            <div>💫 Влияние: ${card.influence}</div>
          </div>
          <div style="font-size:12px; color:#aaa; margin-top:10px;">
            <strong>Эффект:</strong><br>
            ${eff}
          </div>
        </div>
      `;
      showInfoOverlay('Карта', html);
    }
    
    function showLeaderInfo(who) {
      const faction = who === 'player' ? gameState.playerFaction : 'mages';
      const leaderIdx = who === 'player' ? (gameState.playerLeader || 0) : 0;
      const leader = FACTIONS[faction]?.leaders?.[leaderIdx];
      
      if (!leader) {
        showToast('Информация о лидере недоступна');
        return;
      }
      
      const html = `
        <div class="leader-info">
          <div class="leader-name">${leader.name}</div>
          <div class="leader-ability">
            <strong>Способность:</strong><br>
            ${leader.ability?.description || leader.ability?.type || 'Уникальная способность'}
          </div>
        </div>
      `;
      showInfoOverlay(`${who==='player'?'Ваш':'Противника'} лидер`, html);
    }
    
    function showDeckInfo(who) {
      const deck = who === 'player' ? gameState.playerDeck : gameState.opponentDeck;
      const html = `<div style="text-align:center; padding:20px; font-size:16px;">📚 Карт в колоде: <strong>${deck.length}</strong></div>`;
      showInfoOverlay(`${who==='player'?'Ваша':'Противника'} колода`, html);
    }
    
    function showDiscardInfo(who) {
      const discard = who === 'player' ? gameState.playerDiscard : gameState.opponentDiscard;
      let html = `<div style="text-align:center; padding:10px; font-size:14px;">🗑️ Карт в отбое: <strong>${discard.length}</strong></div>`;
      if (discard.length > 0) {
        html += '<div class="info-cards">';
        discard.slice(-10).forEach(card => {
          html += `<div class="info-card"><strong>${card.name}</strong><br>⚔️${card.power}</div>`;
        });
        html += '</div>';
      }
      showInfoOverlay(`${who==='player'?'Ваш':'Противника'} отбой`, html);
    }
    
    function showInfoOverlay(title, content) {
      document.getElementById('infoTitle').textContent = title;
      document.getElementById('infoContent').innerHTML = content;
      document.getElementById('infoOverlay').classList.add('active');
    }
    
    function closeInfoOverlay(e) {
      if (!e || e.target.id === 'infoOverlay') {
        document.getElementById('infoOverlay').classList.remove('active');
      }
    }
    
    function renderScores() {
      document.getElementById('scorePlayer').textContent = gameState.playerScore;
      document.getElementById('scoreOpponent').textContent = gameState.opponentScore;
      if (gameState.playerScore > gameState.opponentScore) { document.getElementById('scorePlayer').classList.add('win'); document.getElementById('scoreOpponent').classList.add('lose'); }
      else if (gameState.playerScore < gameState.opponentScore) { document.getElementById('scorePlayer').classList.add('lose'); document.getElementById('scoreOpponent').classList.add('win'); }
    }
    
    function renderDeckCounts() {
      document.getElementById('deckPlayerCount').textContent = gameState.playerDeck.length;
      document.getElementById('discardPlayerCount').textContent = gameState.playerDiscard.length;
      document.getElementById('deckOpponentCount').textContent = gameState.opponentDeck.length;
      document.getElementById('discardOpponentCount').textContent = gameState.opponentDiscard.length;
    }
    
    function renderLeader() {
      const el = document.getElementById('leaderPlayer');
      if (gameState.leaderUsed) { el.style.opacity = '0.5'; el.style.cursor = 'not-allowed'; }
    }
    
    function updatePassBtn() {
      const btn = document.getElementById('passBtn');
      if (gameState.playerPass) { btn.classList.add('used'); btn.textContent = 'PASS ✓'; btn.disabled = true; }
      else { btn.classList.remove('used'); btn.textContent = 'PASS'; btn.disabled = false; }
    }
    
    // === ИГРОВАЯ ЛОГИКА ===
    function playCard(idx) {
      if (gameState.currentPlayer !== 'player' || gameState.gameOver) { showToast('Не ваш ход!'); return; }
      const card = gameState.playerHand[idx];
      if (isOnlineGame && roomId) socket.emit('play-card', { roomId, card: {id:card.id,name:card.name}, idx });
      showModal('Выберите ряд', [
        { label: 'Левый ряд', action: () => placeCard(card, idx, 'left') },
        { label: 'Правый ряд', action: () => placeCard(card, idx, 'right') }
      ]);
    }
    
    function placeCard(card, idx, row) {
      if (gameState.playerField[row].length >= 4) { showToast('Ряд заполнен!'); return; }
      gameState.playerField[row].push(card);
      gameState.playerHand.splice(idx, 1);
      
      // Обработка эффекта карты
      if (card.effect) {
        const result = handleCardEffect(card, {row});
        if (result?.msg) showToast(result.msg);
      }
      
      if (card.type === 'special' || card.discardAfterUse) { gameState.playerDiscard.push(card); gameState.playerField[row].pop(); }
      
      calcScore(); endTurn(); renderAll(); closeModal();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
    
    function calcScore() {
      gameState.playerScore = [...gameState.playerField.left, ...gameState.playerField.right].reduce((s,c)=>s+(c.power||0),0);
      gameState.opponentScore = [...gameState.opponentField.left, ...gameState.opponentField.right].reduce((s,c)=>s+(c.power||0),0);
    }
    
    function endTurn() {
      if (gameState.gameOver) return;
      gameState.currentPlayer = 'opponent';
      setTimeout(opponentTurn, 1500);
    }
    
    function opponentTurn() {
      if (gameState.gameOver) return;
      
      // Бот играет карту или пасует
      const shouldPass = Math.random() > 0.7 || (gameState.opponentField.left.length+gameState.opponentField.right.length >= 7);
      
      if (shouldPass && !gameState.opponentPass) {
        gameState.opponentPass = true;
        showToast('⏭️ Противник пропустил ход!');
        if (gameState.playerPass) setTimeout(endRound, 1000);
      } else if (gameState.opponentHand.length > 0) {
        const idx = Math.floor(Math.random()*gameState.opponentHand.length);
        const card = gameState.opponentHand[idx];
        const row = gameState.opponentField.left.length <= gameState.opponentField.right.length ? 'left' : 'right';
        if (gameState.opponentField[row].length < 4) {
          gameState.opponentField[row].push(card);
          gameState.opponentHand.splice(idx, 1);
          if (card.type === 'special' || card.discardAfterUse) { gameState.opponentDiscard.push(card); gameState.opponentField[row].pop(); }
          calcScore();
          showToast('🤖 Противник сыграл карту');
        }
      }
      
      gameState.currentPlayer = 'player';
      renderAll();
    }
    
    function passTurn() {
      if (gameState.playerPass || gameState.gameOver) return;
      gameState.playerPass = true;
      showToast('✅ Вы пропустили ход!');
      
      if (isOnlineGame && roomId) socket.emit('pass-turn', { roomId });
      
      // Бот сразу делает ход
      gameState.currentPlayer = 'opponent';
      setTimeout(() => {
        opponentTurn();
        // Если оба пасанули - конец раунда
        if (gameState.opponentPass) {
          setTimeout(endRound, 1000);
        }
      }, 1000);
      
      renderAll();
    }
    
    function endRound() {
      if (gameState.gameOver) return;
      showToast(`🔄 Раунд ${gameState.round} завершён!`);
      
      // Все карты в отбой
      gameState.playerDiscard.push(...gameState.playerField.left, ...gameState.playerField.right);
      gameState.opponentDiscard.push(...gameState.opponentField.left, ...gameState.opponentField.right);
      
      gameState.playerField.left = [];
      gameState.playerField.right = [];
      gameState.opponentField.left = [];
      gameState.opponentField.right = [];
      
      // Добор карт
      const draw = Math.min(2, gameState.playerDeck.length);
      if (draw > 0) gameState.playerHand.push(...gameState.playerDeck.splice(0, draw));
      
      const oppDraw = Math.min(2, gameState.opponentDeck.length);
      if (oppDraw > 0) gameState.opponentHand.push(...gameState.opponentDeck.splice(0, oppDraw));
      
      gameState.playerPass = false;
      gameState.opponentPass = false;
      gameState.round++;
      
      setTimeout(() => {
        if (gameState.round > 3 || (gameState.playerDeck.length === 0 && gameState.opponentDeck.length === 0)) {
          endGame();
        } else {
          showToast(`🎮 Раунд ${gameState.round} начался!`);
          updatePassBtn();
          renderAll();
        }
      }, 2000);
    }
    
    function surrenderGame() {
      if (gameState.gameOver) return;
      if (confirm('Сдаться?\n\n⚠️ -4 очка рейтинга')) {
        gameState.gameOver = true;
        showToast('Вы сдались: -4 очка рейтинга');
        if (window.opener?.updateRating) window.opener.updateRating('surrender');
        else { let r = parseInt(localStorage.getItem('playerRating')||'0'); localStorage.setItem('playerRating', String(Math.max(0, r-4))); }
        setTimeout(() => { localStorage.removeItem('selectedFaction'); localStorage.removeItem('roomId'); window.location.href = 'index.html'; }, 1500);
      }
    }
    
    function endGame() {
      gameState.gameOver = true;
      let msg='', emoji='', result='';
      if (gameState.playerScore > gameState.opponentScore) { msg='🏆 ПОБЕДА!'; result='win'; showToast('+10 очков рейтинга'); }
      else if (gameState.playerScore < gameState.opponentScore) { msg='💀 ПОРАЖЕНИЕ!'; result='loss'; showToast('-5 очков рейтинга'); }
      else { msg='🤝 НИЧЬЯ!'; result='draw'; showToast('Рейтинг не изменён'); }
      
      if (window.opener?.updateRating && result!=='draw') window.opener.updateRating(result);
      else {
        let r = parseInt(localStorage.getItem('playerRating')||'0');
        if (result==='win') r+=10; else if (result==='loss') r=Math.max(0,r-5);
        localStorage.setItem('playerRating', String(r));
      }
      
      alert(`${emoji||''} ${msg}\n\nВаш счёт: ${gameState.playerScore}\nСчёт противника: ${gameState.opponentScore}\n\nРаундов: ${gameState.round-1}`);
      localStorage.removeItem('selectedFaction'); localStorage.removeItem('roomId');
      window.location.href = 'index.html';
    }
    
    function useLeaderAbility() {
      if (gameState.leaderUsed || gameState.gameOver) { showToast('Способность уже использована!'); return; }
      
      const faction = gameState.playerFaction;
      const leaderIdx = gameState.playerLeader || 0;
      const leader = FACTIONS[faction]?.leaders?.[leaderIdx];
      
      if (!leader?.ability) { showToast('Способность не найдена'); return; }
      
      let result;
      const abil = leader.ability;
      
      if (abil.type === 'damage') {
        const enemies = [...gameState.opponentField.left, ...gameState.opponentField.right];
        if (enemies[0]) result = CardEffects.damage(enemies[0], abil.value||3);
      }
      else if (abil.type === 'heal') {
        const allies = [...gameState.playerField.left, ...gameState.playerField.right];
        if (allies[0]) result = CardEffects.heal(allies[0], 5);
      }
      else if (abil.type === 'copy' || abil.type === 'counter') {
        gameState.playerField.left.forEach(c=>{c.power+=2;c.armor+=1;});
        gameState.playerField.right.forEach(c=>{c.power+=2;c.armor+=1;});
        result = { ok: true, msg: 'Способность скопирована!' };
      }
      else { result = { ok: true, msg: abil.description || 'Способность активирована!' }; }
      
      if (result?.ok) {
        showToast(result.msg); gameState.leaderUsed = true; renderLeader(); renderAll();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        if (isOnlineGame && roomId) socket.emit('use-leader', { roomId, ability: abil, result });
      } else { showToast(result?.msg || 'Ошибка'); }
    }
    
    function selectCard(who, row, idx) {
      const card = gameState.playerField[row][idx];
      showToast(`${card.name}\n⚔️${card.power} 🛡️${card.armor} ❤️${card.health}`);
    }
    
    function showModal(title, options) {
      document.getElementById('modalTitle').textContent = title;
      const container = document.getElementById('modalCards');
      container.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'modal-card';
        btn.textContent = opt.label;
        btn.onclick = () => { opt.action(); closeModal(); };
        container.appendChild(btn);
      });
      document.getElementById('cardModal').classList.add('active');
    }
    
    function closeModal() { document.getElementById('cardModal').classList.remove('active'); }
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
    
    function shuffle(arr) { for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
    
    function getCardById(id) {
      for (const fk in FACTIONS) {
        const c = FACTIONS[fk].cards.find(x=>x.id===id);
        if (c) return { ...c, faction: fk };
      }
      return null;
    }
    
    window.updateRating = function(result) {
      let r = parseInt(localStorage.getItem('playerRating')||'0');
      if (result==='win') r+=10; else if (result==='loss') r=Math.max(0,r-5); else if (result==='surrender') r=Math.max(0,r-4);
      localStorage.setItem('playerRating', String(r));
      const el = document.getElementById('playerRatingDisplay');
      if (el) el.textContent = '⭐ ' + r;
    };
  </script>
</body>
</html>
