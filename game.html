<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Битва</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 10px;
      padding-bottom: 80px;
      overflow-x: hidden;
    }
    
    /* === ВЕРХНЯЯ ЗОНА (ПРОТИВНИК) === */
    .opponent-zone {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    
    .leader-opponent {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: linear-gradient(135deg, #666, #333);
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 10px;
    }
    
    .hand-opponent {
      flex: 1;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 5px 0;
      height: 60px;
    }
    
    .card-back {
      width: 40px;
      height: 56px;
      border-radius: 6px;
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      border: 2px solid #34495e;
      flex-shrink: 0;
    }
    
    .deck-zone {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-left: 10px;
    }
    
    .deck-pile, .discard-pile {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      text-align: center;
      position: relative;
    }
    
    .deck-pile::before { content: '📚'; font-size: 20px; }
    .discard-pile::before { content: '🗑️'; font-size: 20px; }
    
    .pile-count {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 600;
      color: #888;
    }
    
    /* === ПОЛЕ БОЯ === */
    .battlefield {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px 0;
      padding: 15px 0;
    }
    
    .player-field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .rows-container {
      display: flex;
      gap: 8px;
    }
    
    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 70px;
    }
    
    .row-label {
      font-size: 10px;
      text-align: center;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    
    .field-card {
      width: 60px;
      height: 70px;
      border-radius: 6px;
      background: #2c3e50;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      position: relative;
      cursor: pointer;
    }
    
    .field-card.selected {
      border-color: #f1c40f;
      box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
    }
    
    .field-card-power {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    
    .field-card-stats {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      font-size: 9px;
    }
    
    /* === СЧЁТ И PASS === */
    .score-pass-zone {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      margin: 10px 0;
    }
    
    .score {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .score-box {
      padding: 8px 15px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      text-align: center;
      min-width: 70px;
    }
    
    .score-label {
      font-size: 10px;
      color: #888;
      margin-bottom: 3px;
    }
    
    .score-value {
      font-size: 20px;
      font-weight: 700;
    }
    
    .score-value.win { color: #2ecc71; }
    .score-value.lose { color: #e74c3c; }
    
    .pass-btn {
      padding: 12px 30px;
      border-radius: 10px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .pass-btn:active { transform: scale(0.95); }
    .pass-btn.used {
      background: #555;
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    /* === НИЖНЯЯ ЗОНА (ИГРОК) === */
    .player-zone {
      display: flex;
      align-items: flex-end;
      margin-top: 10px;
    }
    
    .leader-player {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: 2px solid #3498db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 10px;
      cursor: pointer;
      position: relative;
    }
    
    .leader-player::after {
      content: '⚡';
      position: absolute;
      top: -5px;
      right: -5px;
      background: #f1c40f;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .hand-player {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 0;
      height: 90px;
    }
    
    .hand-card {
      width: 55px;
      height: 75px;
      border-radius: 6px;
      background: #2c3e50;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      cursor: pointer;
      position: relative;
    }
    
    .hand-card:hover {
      border-color: #3498db;
      transform: translateY(-10px);
    }
    
    .hand-card-type {
      font-size: 7px;
      padding: 2px 4px;
      border-radius: 3px;
      margin-bottom: 3px;
    }
    
    .hand-card-name {
      font-size: 8px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    
    .hand-card-power {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-top: 3px;
    }
    
    /* === МОДАЛЬНОЕ ОКНО ВЫБОРА КАРТЫ === */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: #1a1a2e;
      border-radius: 15px;
      padding: 20px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .modal-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }
    
    .modal-card {
      padding: 10px;
      border-radius: 8px;
      background: #2c3e50;
      border: 2px solid transparent;
      cursor: pointer;
      text-align: center;
    }
    
    .modal-card:hover { border-color: #3498db; }
    
    .modal-close {
      margin-top: 15px;
      padding: 10px;
      background: #e74c3c;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    
    /* === УВЕДОМЛЕНИЯ === */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .toast.show { opacity: 1; }
    
    @media (max-width: 480px) {
      .row { min-width: 60px; }
      .field-card { width: 50px; height: 60px; }
      .hand-card { width: 50px; height: 70px; }
      .score-box { min-width: 60px; }
      .score-value { font-size: 18px; }
    }
  </style>
</head>
<body>
  <!-- ВЕРХНЯЯ ЗОНА (ПРОТИВНИК) -->
  <div class="opponent-zone">
    <div class="leader-opponent" id="leaderOpponent">👤</div>
    <div class="hand-opponent" id="handOpponent">
      <!-- Карты противника (рубашкой вверх) -->
    </div>
    <div class="deck-zone">
      <div class="deck-pile">
        <span class="pile-count" id="deckOpponentCount">0</span>
      </div>
      <div class="discard-pile">
        <span class="pile-count" id="discardOpponentCount">0</span>
      </div>
    </div>
  </div>
  
  <!-- ПОЛЕ БОЯ (ПРОТИВНИК) -->
  <div class="battlefield">
    <div class="player-field" id="fieldOpponent">
      <div class="rows-container">
        <div class="row" id="opponentLeftRow">
          <div class="row-label">Левый</div>
          <!-- Карты -->
        </div>
        <div class="row" id="opponentRightRow">
          <div class="row-label">Правый</div>
          <!-- Карты -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- СЧЁТ И PASS -->
  <div class="score-pass-zone">
    <div class="score">
      <div class="score-box">
        <div class="score-label">ПРОТИВНИК</div>
        <div class="score-value" id="scoreOpponent">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">ИГРОК</div>
        <div class="score-value" id="scorePlayer">0</div>
      </div>
    </div>
    <button class="pass-btn" id="passBtn" onclick="passTurn()">PASS</button>
  </div>
  
  <!-- ПОЛЕ БОЯ (ИГРОК) -->
  <div class="battlefield">
    <div class="player-field" id="fieldPlayer">
      <div class="rows-container">
        <div class="row" id="playerLeftRow">
          <div class="row-label">Левый</div>
          <!-- Карты -->
        </div>
        <div class="row" id="playerRightRow">
          <div class="row-label">Правый</div>
          <!-- Карты -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- НИЖНЯЯ ЗОНА (ИГРОК) -->
  <div class="player-zone">
    <div class="leader-player" id="leaderPlayer" onclick="useLeaderAbility()">👑</div>
    <div class="hand-player" id="handPlayer">
      <!-- Карты игрока -->
    </div>
    <div class="deck-zone">
      <div class="deck-pile">
        <span class="pile-count" id="deckPlayerCount">0</span>
      </div>
      <div class="discard-pile">
        <span class="pile-count" id="discardPlayerCount">0</span>
      </div>
    </div>
  </div>
  
  <!-- МОДАЛЬНОЕ ОКНО -->
  <div class="modal" id="cardModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">Выберите карту</div>
      <div class="modal-cards" id="modalCards"></div>
      <button class="modal-close" onclick="closeModal()">Закрыть</button>
    </div>
  </div>
  
  <!-- УВЕДОМЛЕНИЕ -->
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    // === ИГРОВЫЕ ДАННЫЕ ===
    let gameState = {
      playerFaction: 'knights',
      playerHand: [],
      playerDeck: [],
      playerDiscard: [],
      playerField: { left: [], right: [] },
      opponentHand: [],
      opponentDeck: [],
      opponentDiscard: [],
      opponentField: { left: [], right: [] },
      playerScore: 0,
      opponentScore: 0,
      playerPass: false,
      opponentPass: false,
      round: 1,
      leaderUsed: false,
      currentPlayer: 'player'
    };
    
    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('DOMContentLoaded', () => {
      loadDeck();
      initGame();
      renderAll();
    });
    
    function loadDeck() {
      const faction = localStorage.getItem('selectedFaction') || 'knights';
      gameState.playerFaction = faction;
      
      // Загрузка сохранённой колоды
      const savedDeck = localStorage.getItem(`deck_${faction}`);
      if (savedDeck) {
        const cardIds = JSON.parse(savedDeck);
        gameState.playerDeck = cardIds.map(id => getCardById(id));
      } else {
        // Демо-колода если нет сохранённой
        const factionData = FACTIONS[faction];
        gameState.playerDeck = factionData.cards.slice(0, 25);
      }
      
      // Перемешиваем колоду
      shuffleArray(gameState.playerDeck);
      
      // Берём 10 карт в руку
      gameState.playerHand = gameState.playerDeck.splice(0, 10);
    }
    
    function initGame() {
      // Инициализация противника (демо)
      const enemyFactions = ['mages', 'cultists', 'dryads'];
      const enemyFaction = enemyFactions[Math.floor(Math.random() * enemyFactions.length)];
      const enemyData = FACTIONS[enemyFaction];
      gameState.opponentDeck = enemyData.cards.slice(0, 25);
      shuffleArray(gameState.opponentDeck);
      gameState.opponentHand = gameState.opponentDeck.splice(0, 10);
    }
    
    // === ОТРИСОВКА ===
    function renderAll() {
      renderHand('player');
      renderHand('opponent');
      renderField('player');
      renderField('opponent');
      renderScores();
      renderDeckCounts();
      renderLeader();
    }
    
    function renderHand(who) {
      const container = document.getElementById(`hand${who === 'player' ? 'Player' : 'Opponent'}`);
      const hand = gameState[who === 'player' ? 'playerHand' : 'opponentHand'];
      
      container.innerHTML = '';
      
      hand.forEach((card, index) => {
        const cardEl = document.createElement('div');
        
        if (who === 'opponent') {
          // Карты противника рубашкой вверх
          cardEl.className = 'card-back';
        } else {
          // Карты игрока
          const typeColors = {
            white: '#fff',
            gray: '#95a5a6',
            purple: '#a233ff',
            gold: '#f1c40f',
            special: '#e74c3c'
          };
          
          cardEl.className = 'hand-card';
          cardEl.innerHTML = `
            <div class="hand-card-type" style="background: ${typeColors[card.type]}; color: ${['white', 'gold'].includes(card.type) ? '#333' : '#fff'}">${card.type.toUpperCase()}</div>
            <div class="hand-card-name">${card.name}</div>
            <div class="hand-card-power">⚔️${card.power}</div>
          `;
          cardEl.onclick = () => playCard(index);
        }
        
        container.appendChild(cardEl);
      });
    }
    
    function renderField(who) {
      const leftRow = document.getElementById(`${who}LeftRow`);
      const rightRow = document.getElementById(`${who}RightRow`);
      const field = gameState[who === 'player' ? 'playerField' : 'opponentField'];
      
      // Очищаем только карты (оставляем label)
      leftRow.querySelectorAll('.field-card').forEach(el => el.remove());
      rightRow.querySelectorAll('.field-card').forEach(el => el.remove());
      
      field.left.forEach((card, index) => {
        const cardEl = createFieldCard(card, who, 'left', index);
        leftRow.appendChild(cardEl);
      });
      
      field.right.forEach((card, index) => {
        const cardEl = createFieldCard(card, who, 'right', index);
        rightRow.appendChild(cardEl);
      });
    }
    
    function createFieldCard(card, who, row, index) {
      const cardEl = document.createElement('div');
      cardEl.className = 'field-card';
      
      const factionColor = FACTIONS[gameState.playerFaction].color;
      cardEl.style.borderColor = who === 'player' ? factionColor : '#666';
      
      cardEl.innerHTML = `
        <div class="field-card-power">⚔️${card.power}</div>
        <div class="field-card-stats">
          <span>🛡️${card.armor}</span>
          <span>❤️${card.health}</span>
        </div>
      `;
      
      if (who === 'player') {
        cardEl.onclick = () => selectFieldCard(who, row, index);
      }
      
      return cardEl;
    }
    
    function renderScores() {
      document.getElementById('scorePlayer').textContent = gameState.playerScore;
      document.getElementById('scoreOpponent').textContent = gameState.opponentScore;
      
      if (gameState.playerScore > gameState.opponentScore) {
        document.getElementById('scorePlayer').classList.add('win');
        document.getElementById('scoreOpponent').classList.add('lose');
      } else if (gameState.playerScore < gameState.opponentScore) {
        document.getElementById('scorePlayer').classList.add('lose');
        document.getElementById('scoreOpponent').classList.add('win');
      }
    }
    
    function renderDeckCounts() {
      document.getElementById('deckPlayerCount').textContent = gameState.playerDeck.length;
      document.getElementById('discardPlayerCount').textContent = gameState.playerDiscard.length;
      document.getElementById('deckOpponentCount').textContent = gameState.opponentDeck.length;
      document.getElementById('discardOpponentCount').textContent = gameState.opponentDiscard.length;
    }
    
    function renderLeader() {
      const leaderEl = document.getElementById('leaderPlayer');
      if (gameState.leaderUsed) {
        leaderEl.style.opacity = '0.5';
        leaderEl.style.cursor = 'not-allowed';
      }
    }
    
    // === ИГРОВАЯ ЛОГИКА ===
    function playCard(handIndex) {
      if (gameState.currentPlayer !== 'player') {
        showToast('Не ваш ход!');
        return;
      }
      
      const card = gameState.playerHand[handIndex];
      
      // Выбор ряда (левый/правый)
      showModal('Выберите ряд', [
        { label: 'Левый ряд', action: () => placeCard(card, handIndex, 'left') },
        { label: 'Правый ряд', action: () => placeCard(card, handIndex, 'right') }
      ]);
    }
    
    function placeCard(card, handIndex, row) {
      // Проверка лимита карт в ряду
      if (gameState.playerField[row].length >= 4) {
        showToast('Ряд заполнен!');
        return;
      }
      
      // Размещение карты
      gameState.playerField[row].push(card);
      gameState.playerHand.splice(handIndex, 1);
      
      // Особые карты уходят в сброс сразу
      if (card.type === 'special' || card.discardAfterUse) {
        gameState.playerDiscard.push(card);
        gameState.playerField[row].pop();
      }
      
      // Обновление очков
      calculateScore();
      
      // Завершение хода
      endTurn();
      
      renderAll();
      closeModal();
      
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
    
    function calculateScore() {
      // Простой подсчёт силы всех карт на поле
      const playerScore = [
        ...gameState.playerField.left,
        ...gameState.playerField.right
      ].reduce((sum, card) => sum + (card.power || 0), 0);
      
      const opponentScore = [
        ...gameState.opponentField.left,
        ...gameState.opponentField.right
      ].reduce((sum, card) => sum + (card.power || 0), 0);
      
      gameState.playerScore = playerScore;
      gameState.opponentScore = opponentScore;
    }
    
    function endTurn() {
      gameState.currentPlayer = gameState.currentPlayer === 'player' ? 'opponent' : 'player';
      
      if (gameState.currentPlayer === 'opponent') {
        setTimeout(opponentTurn, 1000);
      }
    }
    
    function opponentTurn() {
      // Простой ИИ: случайная карта в случайный ряд
      if (gameState.opponentHand.length > 0) {
        const handIndex = Math.floor(Math.random() * gameState.opponentHand.length);
        const card = gameState.opponentHand[handIndex];
        const row = Math.random() > 0.5 ? 'left' : 'right';
        
        if (gameState.opponentField[row].length < 4) {
          gameState.opponentField[row].push(card);
          gameState.opponentHand.splice(handIndex, 1);
          
          if (card.type === 'special' || card.discardAfterUse) {
            gameState.opponentDiscard.push(card);
            gameState.opponentField[row].pop();
          }
        }
      }
      
      calculateScore();
      gameState.currentPlayer = 'player';
      renderAll();
    }
    
    function passTurn() {
      if (gameState.playerPass) return;
      
      gameState.playerPass = true;
      document.getElementById('passBtn').classList.add('used');
      document.getElementById('passBtn').textContent = 'PASS ✓';
      
      showToast('Вы пропустили ход!');
      
      // Если оба пропустили — конец раунда
      if (gameState.opponentPass) {
        endRound();
      }
      
      renderAll();
    }
    
    function endRound() {
      showToast(`Раунд ${gameState.round} завершён!`);
      
      // Очистка поля (кроме золотых карт с persistBetweenRounds)
      gameState.playerField.left = gameState.playerField.left.filter(c => c.persistBetweenRounds);
      gameState.playerField.right = gameState.playerField.right.filter(c => c.persistBetweenRounds);
      gameState.opponentField.left = [];
      gameState.opponentField.right = [];
      
      // Сброс в отбой
      gameState.playerDiscard.push(...gameState.playerField.left, ...gameState.playerField.right);
      
      // Добор карт
      const newCards = Math.min(2, gameState.playerDeck.length);
      gameState.playerHand.push(...gameState.playerDeck.splice(0, newCards));
      
      // Сброс флагов
      gameState.playerPass = false;
      gameState.opponentPass = false;
      document.getElementById('passBtn').classList.remove('used');
      document.getElementById('passBtn').textContent = 'PASS';
      
      gameState.round++;
      
      setTimeout(() => {
        if (gameState.round > 3) {
          endGame();
        } else {
          showToast(`Раунд ${gameState.round} начался!`);
          renderAll();
        }
      }, 2000);
    }
    
    function endGame() {
      let message = '';
      if (gameState.playerScore > gameState.opponentScore) {
        message = '🏆 ПОБЕДА!';
      } else if (gameState.playerScore < gameState.opponentScore) {
        message = '💀 ПОРАЖЕНИЕ!';
      } else {
        message = '🤝 НИЧЬЯ!';
      }
      
      alert(`Игра окончена!\n\n${message}\n\nВаш счёт: ${gameState.playerScore}\nСчёт противника: ${gameState.opponentScore}`);
      
      // Возврат в меню
      window.location.href = 'index.html';
    }
    
    function useLeaderAbility() {
      if (gameState.leaderUsed) {
        showToast('Способность уже использована!');
        return;
      }
      
      showToast('Способность лидера активирована!');
      gameState.leaderUsed = true;
      renderLeader();
      
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function selectFieldCard(who, row, index) {
      showToast(`Карта выбрана: ${gameState.playerField[row][index].name}`);
    }
    
    // === МОДАЛЬНОЕ ОКНО ===
    function showModal(title, options) {
      document.getElementById('modalTitle').textContent = title;
      const container = document.getElementById('modalCards');
      container.innerHTML = '';
      
      options.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'modal-card';
        btn.textContent = opt.label;
        btn.onclick = opt.action;
        container.appendChild(btn);
      });
      
      document.getElementById('cardModal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('cardModal').classList.remove('active');
    }
    
    // === УВЕДОМЛЕНИЯ ===
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }
    
    function getCardById(cardId) {
      for (const factionKey in FACTIONS) {
        const faction = FACTIONS[factionKey];
        const card = faction.cards.find(c => c.id === cardId);
        if (card) return { ...card, faction: factionKey };
      }
      return null;
    }
  </script>
</body>
