<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточная Битва - Меню</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 32px; margin-bottom: 10px; }
    .subtitle { color: #888; margin-bottom: 40px; }
    .menu-btn {
      width: 100%;
      max-width: 350px;
      padding: 18px 30px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
    .btn-info { background: linear-gradient(135deg, #926eae, #8e44ad); color: white; }
    .btn-warning { background: linear-gradient(135deg, #f39c12, #d68910); color: white; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }
    .menu-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <h1>⚔️ Карточная Битва</h1>
  <p class="subtitle">Полная версия игры</p>
  
  <button class="menu-btn btn-success" onclick="startBotGame()">🤖 Игра с ботом</button>
  <button class="menu-btn btn-info" onclick="startOnlineGame()">🌐 Онлайн игра</button>
  <button class="menu-btn btn-warning" onclick="window.location.href='deckbuilder.html'">🃏 Собрать колоду</button>
  <button class="menu-btn btn-back" onclick="window.location.href='index.html'">← Назад в меню</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    function startBotGame() {
      window.location.href = 'battle.html';
    }
    
    function startOnlineGame() {
      window.location.href = 'multiplayer.html';
    }
  </script>
</body>
</html>
