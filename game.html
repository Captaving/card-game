<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Битва</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e, #16213e); 
      color: white; 
      padding: 20px;
      text-align: center;
    }
    button {
      padding: 15px 30px;
      margin: 10px;

      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>⚔️ Карточная Битва</h1>
  <p style="margin:20px 0;">Игра работает!</p>
  <button onclick="alert('Игра в разработке!')">🎮 Играть</button>
  <button onclick="window.location.href='index.html'">← Назад</button>
  
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    console.log('✅ Game loaded');
  </script>
</body>
</html>
