<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сохранённые Колоды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 20px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }
    .header h2 { font-size: 20px; }
    .btn-back {
      padding: 8px 15px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .faction-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .faction-dot { width: 10px; height: 10px; border-radius: 50%; }
    .decks-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .deck-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 2px solid transparent;
    }
    .deck-item.active {
      border-color: #2ecc71;
      background: rgba(46, 204, 113, 0.1);
    }
    .deck-info { flex: 1; }
    .deck-name { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
    .deck-stats { font-size: 12px; color: #888; }
    .deck-stats span { margin-right: 15px; }
    .deck-actions {
      display: flex;
      gap: 8px;
    }
    .deck-btn {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-select { background: #2ecc71; color: white; }
    .btn-edit { background: #3498db; color: white; }
    .btn-delete { background: #e74c3c; color: white; }
    .deck-btn:active { transform: scale(0.95); }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 15px; }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      background: rgba(22, 33, 62, 0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-new { background: #2ecc71; color: white; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <h2>📁 Сохранённые колоды</h2>
    <div style="width: 70px;"></div>
  </div>
  
  <div class="faction-badge">
    <div class="faction-dot" id="factionDot"></div>
    <span id="factionName">Фракция</span>
  </div>
  
  <div class="decks-list" id="decksList"></div>
  
  <div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-state-icon">📭</div>
    <h3>Нет сохранённых колод</h3>
    <p style="margin-top: 10px;">Создайте свою первую колоду!</p>
  </div>
  
  <div class="bottom-bar">
    <button class="btn btn-back" onclick="goBack()">Назад</button>
    <button class="btn btn-new" onclick="createNewDeck()">➕ Новая колода</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let selectedFaction = localStorage.getItem('selectedFaction') || 'knights';
    let factionData = null;
    let savedDecks = [];
    
    document.addEventListener('DOMContentLoaded', () => {
      initFaction();
      loadDecks();
    });
    
    function initFaction() {
      factionData = FACTIONS[selectedFaction];
      document.getElementById('factionName').textContent = factionData.name;
      document.getElementById('factionDot').style.background = factionData.color;
    }
    
    function loadDecks() {
      const deckData = localStorage.getItem(`deck_${selectedFaction}`);
      const leaderData = localStorage.getItem('playerLeader');
      
      if (deckData) {
        const cards = JSON.parse(deckData);
        const influence = cards.reduce((sum, id) => {
          const card = factionData.cards.find(c => c.id === id);
          return sum + (card?.influence || 0);
        }, 0);
        
        savedDecks = [{
          id: 'current',
          name: 'Текущая колода',
          cards: cards,
          influence: influence,
          leader: leaderData || '0',
          active: true
        }];
        
        // Загрузка дополнительных колод (если есть)
        for (let i = 1; i <= 5; i++) {
          const extraDeck = localStorage.getItem(`deck_${selectedFaction}_slot_${i}`);
          if (extraDeck) {
            const cards = JSON.parse(extraDeck);
            const influence = cards.reduce((sum, id) => {
              const card = factionData.cards.find(c => c.id === id);
              return sum + (card?.influence || 0);
            }, 0);
            const leader = localStorage.getItem(`deck_${selectedFaction}_slot_${i}_leader`) || '0';
            
            savedDecks.push({
              id: `slot_${i}`,
              name: `Колода ${i}`,
              cards: cards,
              influence: influence,
              leader: leader,
              active: false
            });
          }
        }
        
        renderDecks();
      } else {
        document.getElementById('emptyState').style.display = 'block';
      }
    }
    
    function renderDecks() {
      const container = document.getElementById('decksList');
      container.innerHTML = savedDecks.map(deck => `
        <div class="deck-item ${deck.active ? 'active' : ''}">
          <div class="deck-info">
            <div class="deck-name">${deck.name}</div>
            <div class="deck-stats">
              <span>🃏 ${deck.cards.length}/25 карт</span>
              <span>💫 ${deck.influence}/170 влияния</span>
              <span>👑 Лидер: ${deck.leader}</span>
            </div>
          </div>
          <div class="deck-actions">
            ${!deck.active ? `<button class="deck-btn btn-select" onclick="selectDeck('${deck.id}')">Выбрать</button>` : ''}
            <button class="deck-btn btn-edit" onclick="editDeck('${deck.id}')">✏️</button>
            ${!deck.active ? `<button class="deck-btn btn-delete" onclick="deleteDeck('${deck.id}')">🗑️</button>` : ''}
          </div>
        </div>
      `).join('');
    }
    
    function selectDeck(deckId) {
      const deck = savedDecks.find(d => d.id === deckId);
      if (!deck) return;
      
      // Сохраняем текущую колоду в слот
      const currentDeck = savedDecks.find(d => d.active);
      if (currentDeck) {
        localStorage.setItem(`deck_${selectedFaction}_slot_current`, JSON.stringify(currentDeck.cards));
        localStorage.setItem(`deck_${selectedFaction}_slot_current_leader`, currentDeck.leader);
      }
      
      // Загружаем выбранную колоду
      localStorage.setItem(`deck_${selectedFaction}`, JSON.stringify(deck.cards));
      localStorage.setItem('playerLeader', deck.leader);
      
      // Обновляем активную колоду
      savedDecks.forEach(d => d.active = (d.id === deckId));
      
      renderDecks();
      showToast('✅ Колода выбрана!');
      
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function editDeck(deckId) {
      const deck = savedDecks.find(d => d.id === deckId);
      if (!deck) return;
      
      localStorage.setItem(`deck_${selectedFaction}`, JSON.stringify(deck.cards));
      localStorage.setItem('playerLeader', deck.leader);
      
      window.location.href = 'deckbuilder.html';
    }
    
    function deleteDeck(deckId) {
      if (!confirm('Удалить эту колоду?')) return;
      
      localStorage.removeItem(`deck_${selectedFaction}_${deckId}`);
      localStorage.removeItem(`deck_${selectedFaction}_${deckId}_leader`);
      
      loadDecks();
      showToast('🗑️ Колода удалена!');
      
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function createNewDeck() {
      localStorage.removeItem(`deck_${selectedFaction}`);
      localStorage.removeItem('playerLeader');
      window.location.href = 'deckbuilder.html';
    }
    
    function goBack() {
      window.location.href = 'game.html';
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
