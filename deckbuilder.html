<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Конструктор Колод</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* Скроллим только контейнеры */
        }

        /* Верхняя панель */
        .header {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        .faction-selector {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .faction-btn {
            flex: 0 0 auto;
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .faction-btn.active {
            background: white;
            color: black;
            font-weight: bold;
        }

        /* Основная область */
        .main-area {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px); /* Вычет хедера и футера */
        }
        
        /* Список карт */
        .cards-grid {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            align-content: start;
        }

        /* Карта в списке */
        .card-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 8px;
            font-size: 11px;
            text-align: center;
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 110px;
        }
        .card-item:active { transform: scale(0.95); }
        .card-item.added { border-color: var(--success); }
        .card-item.maxed { opacity: 0.5; cursor: not-allowed; }
        
        .card-name { font-weight: bold; margin-bottom: 4px; line-height: 1.2; }
        .card-stats { font-size: 10px; color: #ccc; }
        .card-cost { 
            position: absolute; top: -5px; right: -5px; 
            background: #926eae; color: white; 
            width: 20px; height: 20px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold;
        }
        .card-count {
            position: absolute; top: -5px; left: -5px;
            background: var(--success); color: white;
            width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold;
            border: 1px solid white;
        }

        /* Нижняя панель (Колода) */
        .deck-panel {
            height: 130px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        .deck-header {
            padding: 5px 10px;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
        }
        .deck-list {
            flex: 1;
            overflow-x: auto;
            display: flex;
            padding: 10px;
            gap: 8px;
            align-items: center;
        }
        .deck-card-mini {
            min-width: 60px;
            height: 80px;
            background: #444;
            border-radius: 6px;
            font-size: 9px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            border: 1px solid #666;
        }
        .remove-btn {
            position: absolute;
            top: 2px; right: 2px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px; height: 16px;
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Модальное окно эффекта */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: #2c3e50;
            padding: 20px;
            border-radius: 12px;
            max-width: 300px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
        .modal-desc { font-size: 14px; line-height: 1.5; margin-bottom: 15px; color: #ddd; }
        .modal-stats { 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 12px; 
            margin-bottom: 15px;
            text-align: left;
        }
        .modal-close {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* Кнопки действий */
        .action-buttons {
            padding: 10px;
            display: flex;
            gap: 10px;
        }
        .btn-save {
            flex: 1;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-back {
            padding: 12px;
            background: #7f8c8d;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-bar">
        <span id="deck-count">Карт: 0/25</span>
        <span id="influence-count">Влияние: 0/170</span>
    </div>
    <div class="faction-selector" id="faction-buttons">
        <!-- Кнопки фракций генерируются JS -->
    </div>
</div>

<div class="main-area">
    <div class="cards-grid" id="cards-container">
        <!-- Карты генерируются JS -->
    </div>
</div>

<div class="deck-panel">
    <div class="deck-header">
        <span>Ваша колода</span>
        <span id="deck-influence-mini">0 inf</span>
    </div>
    <div class="deck-list" id="deck-list">
        <!-- Карты в колоде -->
    </div>
</div>

<div class="action-buttons">
    <button onclick="window.location.href='index.html'" class="btn-back">⬅ Назад</button>
    <button onclick="saveDeck()" class="btn-save">💾 Сохранить</button>
</div>

<!-- Модальное окно эффекта -->
<div class="modal-overlay" id="effect-modal" onclick="closeModal(event)">
    <div class="modal-content">
        <div class="modal-title" id="m-title">Название карты</div>
        <div class="modal-stats" id="m-stats">
            Сила: 0 | Броня: 0 | Здоровье: 0<br>
            Влияние: 0
        </div>
        <div class="modal-desc" id="m-desc">Описание эффекта...</div>
        <button class="modal-close" onclick="document.getElementById('effect-modal').style.display='none'">Понятно</button>
    </div>
</div>

<script src="config.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Применение темы
    document.body.style.backgroundColor = tg.themeParams.bg_color || '#1a1a1a';
    document.body.style.color = tg.themeParams.text_color || '#ffffff';

    let currentFaction = 'knights'; // Фракция по умолчанию
    let myDeck = []; // Массив объектов карт

    // Инициализация
    function init() {
        renderFactionButtons();
        selectFaction('knights');
        updateDeckUI();
    }

    // Рендер кнопок фракций
    function renderFactionButtons() {
        const container = document.getElementById('faction-buttons');
        container.innerHTML = '';
        
        Object.values(FACTIONS).forEach(faction => {
            const btn = document.createElement('button');
            btn.className = 'faction-btn';
            btn.innerText = faction.name;
            btn.style.borderColor = faction.color;
            btn.onclick = () => selectFaction(faction.id);
            btn.id = `btn-${faction.id}`;
            container.appendChild(btn);
        });
    }

    // Выбор фракции
    function selectFaction(factionId) {
        currentFaction = factionId;
        
        // Обновление активного класса кнопок
        document.querySelectorAll('.faction-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${factionId}`).classList.add('active');

        renderCards();
    }

    // Рендер сетки карт
    function renderCards() {
        const container = document.getElementById('cards-container');
        container.innerHTML = '';
        
        const faction = FACTIONS[currentFaction];
        if (!faction) return;

        faction.cards.forEach(card => {
            // Считаем сколько таких карт уже в колоде
            const countInDeck = myDeck.filter(c => c.id === card.id).length;
            const isMaxed = countInDeck >= card.maxInDeck;
            
            const el = document.createElement('div');
            el.className = `card-item ${countInDeck > 0 ? 'added' : ''} ${isMaxed ? 'maxed' : ''}`;
            el.onclick = () => {
                if (!isMaxed) addCardToDeck(card);
                else tg.HapticFeedback.notificationOccurred('error');
            };
            
            // Двойной клик или долгое нажатие для просмотра эффекта
            el.ondblclick = (e) => {
                e.stopPropagation();
                showEffectModal(card);
            };
            // Для мобильных: отдельная кнопка или логика долгого тапа могла бы быть здесь, 
            // но пока сделаем так: если карта добавлена - показываем эффект при клике? 
            // Нет, лучше оставим двойной клик или добавим иконку "i". 
            // Для простоты: клик добавляет, долгий тап (эмуляция) или просто отдельная зона?
            // Давайте сделаем так: Клик по правой верхней части (cost) открывает инфо.
            
            el.innerHTML = `
                <div class="card-cost" onclick="event.stopPropagation(); showEffectModalById('${card.id}')">ℹ️</div>
                ${countInDeck > 0 ? `<div class="card-count">${countInDeck}</div>` : ''}
                <div class="card-name">${card.name}</div>
                <div class="card-stats">⚔️${card.power} ❤️${card.health}<br>💰${card.influence}</div>
            `;
            container.appendChild(el);
        });
    }

    // Показать модалку по ID
    window.showEffectModalById = function(id) {
        const faction = FACTIONS[currentFaction];
        const card = faction.cards.find(c => c.id === id);
        if(card) showEffectModal(card);
    };

    // Показ модального окна
    function showEffectModal(card) {
        document.getElementById('m-title').innerText = card.name;
        document.getElementById('m-stats').innerHTML = `
            <b>Тип:</b> ${card.type.toUpperCase()}<br>
            <b>Ряд:</b> ${translateRow(card.row)}<br>
            <b>Сила:</b> ${card.power} | <b>Броня:</b> ${card.armor} | <b>Здоровье:</b> ${card.health}<br>
            <b>Влияние:</b> ${card.influence} | <b>Макс в колоде:</b> ${card.maxInDeck}
        `;
        
        let desc = "Нет специального эффекта.";
        if (card.effect) {
            desc = `<b>${card.effect.description}</b>`;
            if(card.discardAfterUse) desc += "<br><i style='color:#f1c40f'>Одноразовая карта (сбрасывается)</i>";
        }
        document.getElementById('m-desc').innerHTML = desc;
        
        document.getElementById('effect-modal').style.display = 'flex';
        tg.HapticFeedback.selectionChanged();
    }

    function closeModal(e) {
        if (e.target.id === 'effect-modal') {
            e.target.style.display = 'none';
        }
    }

    function translateRow(row) {
        if(row === 'left') return 'Левый';
        if(row === 'right') return 'Правый';
        if(row === 'any') return 'Любой';
        if(row === 'enemy_field') return 'Поле врага';
        return row;
    }

    // Логика колоды
    function addCardToDeck(card) {
        if (myDeck.length >= GAME_CONFIG.maxDeckSize) {
            tg.showAlert("Колода полная (макс 25 карт)!");
            return;
        }
        
        const currentInf = myDeck.reduce((sum, c) => sum + c.influence, 0);
        if (currentInf + card.influence > GAME_CONFIG.maxInfluence) {
            tg.showAlert("Превышен лимит влияния!");
            return;
        }

        myDeck.push({...card}); // Копируем объект
        tg.HapticFeedback.impactOccurred('light');
        updateDeckUI();
        renderCards(); // Перерисовать счетчики
    }

    function removeCardFromDeck(index) {
        myDeck.splice(index, 1);
        tg.HapticFeedback.impactOccurred('medium');
        updateDeckUI();
        renderCards();
    }

    function updateDeckUI() {
        const list = document.getElementById('deck-list');
        list.innerHTML = '';
        
        let totalInf = 0;
        
        myDeck.forEach((card, index) => {
            totalInf += card.influence;
            const el = document.createElement('div');
            el.className = 'deck-card-mini';
            el.style.borderLeft = `3px solid ${FACTIONS[getFactionIdFromCardId(card.id)]?.color || '#fff'}`;
            el.innerHTML = `
                <div style="font-size:9px; text-align:center;">${card.name}</div>
                <div style="font-size:9px;">💰${card.influence}</div>
                <button class="remove-btn" onclick="removeCardFromDeck(${index})">×</button>
            `;
            list.appendChild(el);
        });

        document.getElementById('deck-count').innerText = `Карт: ${myDeck.length}/${GAME_CONFIG.maxDeckSize}`;
        document.getElementById('influence-count').innerText = `Влияние: ${totalInf}/${GAME_CONFIG.maxInfluence}`;
        document.getElementById('deck-influence-mini').innerText = `${totalInf} inf`;
        
        // Проверка валидности для сохранения
        const saveBtn = document.querySelector('.btn-save');
        if (myDeck.length === 0) {
            saveBtn.disabled = true;
            saveBtn.style.opacity = 0.5;
            saveBtn.innerText = "Пустая колода";
        } else {
            saveBtn.disabled = false;
            saveBtn.style.opacity = 1;
            saveBtn.innerText = "💾 Сохранить";
        }
    }

    function getFactionIdFromCardId(id) {
        if(id.includes('knights')) return 'knights';
        if(id.includes('cultists')) return 'cultists';
        if(id.includes('dryads')) return 'dryads';
        if(id.includes('mages')) return 'mages';
        return null;
    }

    // Сохранение
    window.saveDeck = function() {
        const name = prompt("Введите название колоды:", "Моя колода");
        if (!name) return;

        const key = `deck_${name.replace(/[^a-z0-9]/gi, '_')}`;
        localStorage.setItem(key, JSON.stringify(myDeck));
        
        // Также ставим её активной
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(`Колода "${name}" сохранена!`);
        setTimeout(() => {
            window.location.href = 'saved-decks.html';
        }, 1000);
    };

    init();
</script>

</body>
</html>
