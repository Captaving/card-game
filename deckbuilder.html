<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Конструктор колоды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 15px;
      padding-bottom: 100px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 20px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }
    
    .header h2 {
      font-size: 20px;
      font-weight: 600;
    }
    
    .btn-back {
      padding: 8px 15px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    
    .stat {
      flex: 1;
      text-align: center;
    }
    
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }
    
    .stat-value.warning { color: #f39c12; }
    .stat-value.error { color: #e74c3c; }
    .stat-value.success { color: #2ecc71; }
    
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 5px;
      scrollbar-width: none;
    }
    
    .filters::-webkit-scrollbar { display: none; }
    
    .filter-btn {
      padding: 10px 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-btn.active {
      background: #3498db;
      border-color: #3498db;
    }
    
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    
    .card {
      padding: 12px;
      border-radius: 10px;
      background: #2c3e50;
      border: 3px solid transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      user-select: none;
    }
    
    .card:active { transform: scale(0.98); }
    
    .card.selected {
      border-color: #2ecc71;
      background: rgba(46, 204, 113, 0.15);
    }
    
    .card.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .card-type {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 5px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    
    .card-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.3;
      min-height: 32px;
    }
    
    .card-stats {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }
    
    .card-stat {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .card-influence {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #f1c40f;
      background: rgba(0,0,0,0.6);
      padding: 3px 6px;
      border-radius: 4px;
    }
    
    .card-count {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 11px;
      color: #2ecc71;
      font-weight: 600;
    }
    
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      background: rgba(22, 33, 62, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
    }
    
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:active { transform: scale(0.98); }
    
    .btn-cancel {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .btn-save {
      background: #2ecc71;
      color: white;
    }
    
    .btn-save:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
    
    .faction-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 15px;
    }
    
    .faction-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    @media (max-width: 480px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <h2>🃏 Конструктор колоды</h2>
    <div style="width: 70px;"></div>
  </div>
  
  <div class="faction-badge" id="factionBadge">
    <div class="faction-dot" id="factionDot"></div>
    <span id="factionName">Фракция</span>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-label">КАРТ</div>
      <div class="stat-value" id="cardsCount">0/25</div>
    </div>
    <div class="stat">
      <div class="stat-label">ВЛИЯНИЕ</div>
      <div class="stat-value" id="influenceCount">0/150</div>
    </div>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="white">⚪ Белый</button>
    <button class="filter-btn" data-filter="gray">⚫ Серый</button>
    <button class="filter-btn" data-filter="purple">🟣 Фиолетовый</button>
    <button class="filter-btn" data-filter="gold">🟡 Золотой</button>
    <button class="filter-btn" data-filter="special">🔴 Особая</button>
  </div>
  
  <div class="cards-grid" id="cardsGrid">
    <!-- Карты будут добавлены через JS -->
  </div>
  
  <div class="bottom-bar">
    <button class="btn btn-cancel" onclick="goBack()">Отмена</button>
    <button class="btn btn-save" id="saveBtn" disabled onclick="saveDeck()">💾 Сохранить колоду</button>
  </div>

  <script type="module">
    import { saveDeck, loadDeck } from './firebase.js';
    
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let selectedFaction = localStorage.getItem('selectedFaction') || 'knights';
    let selectedCards = [];
    let currentFilter = 'all';
    let factionData = null;
    
    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      initFaction();
      loadSavedDeck();
      renderCards();
      updateStats();
      setupFilters();
    });
    
    function initFaction() {
      factionData = FACTIONS[selectedFaction];
      if (!factionData) {
        alert('Ошибка: фракция не найдена!');
        goBack();
        return;
      }
      
      document.getElementById('factionName').textContent = factionData.name;
      document.getElementById('factionDot').style.background = factionData.color;
      document.querySelector('.header h2').style.color = factionData.color;
    }
    
    async function loadSavedDeck() {
      const tg = window.Telegram.WebApp;
      const userId = tg.initDataUnsafe?.user?.id || 'guest';
      const savedDeck = await loadDeck(userId, selectedFaction);
      if (savedDeck) {
        selectedCards = savedDeck;
      }
    }
    
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      
      factionData.cards.forEach(card => {
        // Фильтрация
        if (currentFilter !== 'all' && card.type !== currentFilter) return;
        
        const cardEl = document.createElement('div');
        const copiesInDeck = selectedCards.filter(id => id === card.id).length;
        const isLocked = isCardLocked(card, copiesInDeck);
        const isSelected = copiesInDeck > 0;
        
        cardEl.className = `card ${isSelected ? 'selected' : ''} ${isLocked && !isSelected ? 'locked' : ''}`;
        
        cardEl.innerHTML = `
          <div class="card-influence">${card.influence}</div>
          <div class="card-type ${card.type}">${getCardTypeName(card.type)}</div>
          <div class="card-name">${card.name}</div>
          <div class="card-stats">
            <span class="card-stat">⚔️${card.power}</span>
            <span class="card-stat">🛡️${card.armor}</span>
            <span class="card-stat">❤️${card.health}</span>
          </div>
          ${copiesInDeck > 0 ? `<div class="card-count">×${copiesInDeck}</div>` : ''}
        `;
        
        if (!isLocked || isSelected) {
          cardEl.onclick = () => toggleCard(card);
        }
        
        grid.appendChild(cardEl);
      });
    }
    
    function getCardTypeName(type) {
      const names = {
        white: 'Белый',
        gray: 'Серый',
        purple: 'Фиолетовый',
        gold: 'Золотой',
        special: 'Особая'
      };
      return names[type] || type;
    }
    
    function toggleCard(card) {
      const index = selectedCards.indexOf(card.id);
      
      if (index > -1) {
        // Удалить карту
        selectedCards.splice(index, 1);
      } else {
        // Добавить карту
        const copiesInDeck = selectedCards.filter(id => id === card.id).length;
        if (copiesInDeck >= card.maxInDeck) {
          if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
          return;
        }
        selectedCards.push(card.id);
      }
      
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      renderCards();
      updateStats();
    }
    
    function isCardLocked(card, copiesInDeck) {
      // Проверка лимита копий
      if (copiesInDeck >= card.maxInDeck) return true;
      
      // Проверка лимита карт
      if (selectedCards.length >= GAME_CONFIG.maxDeckSize) return true;
      
      // Проверка лимита влияния
      const currentInfluence = calculateTotalInfluence();
      if (currentInfluence + card.influence > GAME_CONFIG.maxInfluence) return true;
      
      return false;
    }
    
    function calculateTotalInfluence() {
      return selectedCards.reduce((sum, cardId) => {
        const card = factionData.cards.find(c => c.id === cardId);
        return sum + (card?.influence || 0);
      }, 0);
    }
    
    function updateStats() {
      const cardsCount = selectedCards.length;
      const influenceCount = calculateTotalInfluence();
      
      const cardsEl = document.getElementById('cardsCount');
      const influenceEl = document.getElementById('influenceCount');
      const saveBtn = document.getElementById('saveBtn');
      
      cardsEl.textContent = `${cardsCount}/${GAME_CONFIG.maxDeckSize}`;
      influenceEl.textContent = `${influenceCount}/${GAME_CONFIG.maxInfluence}`;
      
      // Цвета для предупреждений
      cardsEl.className = 'stat-value';
      influenceEl.className = 'stat-value';
      
      if (cardsCount > GAME_CONFIG.maxDeckSize) {
        cardsEl.classList.add('error');
      } else if (cardsCount === GAME_CONFIG.maxDeckSize) {
        cardsEl.classList.add('success');
      }
      
      if (influenceCount > GAME_CONFIG.maxInfluence) {
        influenceEl.classList.add('error');
      } else if (influenceCount > GAME_CONFIG.maxInfluence * 0.9) {
        influenceEl.classList.add('warning');
      } else if (influenceCount === GAME_CONFIG.maxInfluence) {
        influenceEl.classList.add('success');
      }
      
      // Активация кнопки сохранения
      saveBtn.disabled = cardsCount !== GAME_CONFIG.maxDeckSize || influenceCount > GAME_CONFIG.maxInfluence;
    }
    
    function setupFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = (e) => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          currentFilter = e.currentTarget.dataset.filter;
          renderCards();
        };
      });
    }
    
    function goBack() {
      window.location.href = 'index.html';
    }
    
    window.saveDeck = async function() {
      const userId = tg.initDataUnsafe?.user?.id || 'guest';
      const faction = selectedFaction;
      
      // Валидация
      const validation = validateDeck(selectedCards, faction);
      if (!validation.valid) {
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        alert('❌ Ошибка:\n' + validation.error);
        return;
      }
      
      // Сохранение
      const success = await saveDeck(userId, faction, selectedCards);
      
      if (success) {
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        alert('✅ Колода сохранена!\n\nКарт: ' + selectedCards.length + '\nВлияние: ' + calculateTotalInfluence());
      } else {
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        alert('❌ Ошибка сохранения. Попробуйте позже.');
      }
    };
    
    // Экспорт для глобального доступа
    window.goBack = goBack;
  </script>
</body>
</html>
