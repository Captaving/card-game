<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конструктор Колоды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 15px; padding-bottom: 100px; }
    .header { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    select, button { padding: 10px; border-radius: 8px; border: none; font-size: 14px; }
    select { background: #2c3e50; color: white; flex: 1; }
    .stats { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .card { background: #2c3e50; padding: 10px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; position: relative; display: flex; flex-direction: column; min-height: 180px; }
    .card.selected { border-color: #2ecc71; background: rgba(46, 204, 113, 0.15); }
    .card .power { font-size: 28px; font-weight: bold; text-align: center; margin: 5px 0; }
    .card .name { font-size: 13px; text-align: center; font-weight: 600; margin-bottom: 5px; }
    .card .effect { font-size: 11px; color: #ccc; line-height: 1.3; flex-grow: 1; white-space: pre-wrap; word-break: break-word; }
    .card .count { position: absolute; top: 5px; right: 5px; background: #2ecc71; color: black; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
    .bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: #16213e; display: flex; gap: 10px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; }
    .btn-save { background: #2ecc71; }
    .btn-save:disabled { background: #555; opacity: 0.5; }
    .btn-back { background: #e74c3c; }
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 10px; z-index: 1000; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <select id="factionSelect" onchange="loadFaction()"></select>
    <select id="leaderSelect"></select>
  </div>
  <div class="stats">
    <div>Карт: <span id="count">0</span>/25</div>
    <div>Влияние: <span id="influence">0</span>/170</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="bottom">
    <button class="btn btn-back" onclick="history.back()">← Назад</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveDeck()">💾 Сохранить</button>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    let faction = localStorage.getItem('selectedFaction') || 'knights';
    let selectedCards = JSON.parse(localStorage.getItem(`deck_${faction}`) || '[]');
    let selectedLeader = parseInt(localStorage.getItem('leaderIdx') || '0');

    const facSel = document.getElementById('factionSelect');
    const leadSel = document.getElementById('leaderSelect');

    // Заполняем выбор фракций
    Object.keys(FACTIONS).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = FACTIONS[key].name;
      if(key === faction) opt.selected = true;
      facSel.appendChild(opt);
    });

    function loadFaction() {
      faction = facSel.value;
      localStorage.setItem('selectedFaction', faction);
      selectedCards = []; // Сброс при смене фракции
      loadLeaders();
      renderCards();
      updateStats();
    }

    function loadLeaders() {
      leadSel.innerHTML = '';
      const leaders = FACTIONS[faction].leaders;
      leaders.forEach((l, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${l.name} (${l.ability.description.substring(0,20)}...)`;
        if(i === selectedLeader) opt.selected = true;
        leadSel.appendChild(opt);
      });
      leadSel.onchange = () => { selectedLeader = parseInt(leadSel.value); };
    }

    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const cards = FACTIONS[faction].cards;
      
      cards.forEach(card => {
        const count = selectedCards.filter(id => id === card.id).length;
        const el = document.createElement('div');
        el.className = `card ${count > 0 ? 'selected' : ''}`;
        el.innerHTML = `
          <div class="type" style="font-size:10px;color:#888;">${card.type} | ${card.row}</div>
          <div class="power">⚔️ ${card.power}</div>
          <div class="name">${card.name}</div>
          <div class="effect">${card.effect ? card.effect.description : 'Нет эффекта'}</div>
          ${count > 0 ? `<div class="count">${count}</div>` : ''}
        `;
        el.onclick = () => toggleCard(card);
        grid.appendChild(el);
      });
    }

    function toggleCard(card) {
      const idx = selectedCards.indexOf(card.id);
      const count = selectedCards.filter(id => id === card.id).length;
      
      if (idx > -1) {
        selectedCards.splice(idx, 1);
      } else {
        if (count < card.maxInDeck && selectedCards.length < 25) {
          selectedCards.push(card.id);
        } else {
          showToast('Лимит карт или копий!');
        }
      }
      renderCards();
      updateStats();
    }

    function updateStats() {
      let inf = 0;
      selectedCards.forEach(id => {
        const c = FACTIONS[faction].cards.find(x => x.id === id);
        if(c) inf += c.influence;
      });
      document.getElementById('count').textContent = selectedCards.length;
      document.getElementById('influence').textContent = inf;
      document.getElementById('saveBtn').disabled = (selectedCards.length !== 25 || inf > 170);
    }

    function saveDeck() {
      localStorage.setItem(`deck_${faction}`, JSON.stringify(selectedCards));
      localStorage.setItem('leaderIdx', selectedLeader.toString());
      showToast('✅ Колода сохранена!');
      setTimeout(() => history.back(), 800);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 1500);
    }

    loadFaction();
  </script>
</body>
</html>
