<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Конструктор Колоды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 15px; padding-bottom: 100px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .stats { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; }
    .stat-val { font-size: 20px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .card { background: #2c3e50; padding: 10px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; position: relative; }
    .card.selected { border-color: #2ecc71; background: rgba(46, 204, 113, 0.2); }
    .card .power { font-size: 24px; font-weight: bold; text-align: center; margin: 5px 0; }
    .card .name { font-size: 12px; text-align: center; }
    .card .effect { font-size: 10px; color: #aaa; margin-top: 5px; text-align: center; }
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: #16213e; display: flex; gap: 10px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; }
    .btn-save { background: #2ecc71; }
    .btn-back { background: #e74c3c; }
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: black; padding: 20px; border-radius: 10px; display: none; z-index: 1000; }
  </style>
</head>
<body>
  <div class="header">
    <button class="btn btn-back" style="width: auto; padding: 5px 15px;" onclick="history.back()">←</button>
    <h2>Конструктор</h2>
    <div style="width: 30px;"></div>
  </div>

  <div class="stats">
    <div>Карт: <span id="count" class="stat-val">0</span>/25</div>
    <div>Влияние: <span id="influence" class="stat-val">0</span>/170</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-bar">
    <button class="btn btn-back" onclick="history.back()">Отмена</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveDeck()">Сохранить</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    let faction = localStorage.getItem('selectedFaction') || 'knights';
    let selectedCards = JSON.parse(localStorage.getItem(`deck_${faction}`) || '[]');
    let cards = FACTIONS[faction].cards;

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      // Считаем статистику
      let currentInf = 0;
      selectedCards.forEach(id => {
        const c = cards.find(x => x.id === id);
        if(c) currentInf += c.influence;
      });
      document.getElementById('count').textContent = selectedCards.length;
      document.getElementById('influence').textContent = currentInf;
      document.getElementById('saveBtn').disabled = (selectedCards.length !== 25 || currentInf > 170);

      cards.forEach(card => {
        const el = document.createElement('div');
        const count = selectedCards.filter(id => id === card.id).length;
        const isFull = count >= card.maxInDeck;
        const isSelected = count > 0;
        
        el.className = `card ${isSelected ? 'selected' : ''}`;
        if(isFull && !isSelected) el.style.opacity = '0.5';
        
        el.innerHTML = `
          <div style="font-size:10px; color:#888;">${card.type} | Линия: ${card.row}</div>
          <div class="power">⚔️ ${card.power}</div>
          <div class="name">${card.name}</div>
          <div class="effect">${card.effect ? card.effect.description.substring(0, 30) + '...' : ''}</div>
          ${isSelected ? `<div style="position:absolute; top:5px; right:5px; background:#2ecc71; color:black; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-weight:bold;">${count}</div>` : ''}
        `;
        
        el.onclick = () => toggleCard(card);
        grid.appendChild(el);
      });
    }

    function toggleCard(card) {
      const idx = selectedCards.indexOf(card.id);
      const count = selectedCards.filter(id => id === card.id).length;
      
      if (idx > -1) {
        selectedCards.splice(idx, 1);
      } else {
        if (count < card.maxInDeck && selectedCards.length < 25) {
          selectedCards.push(card.id);
        } else {
          document.getElementById('toast').textContent = "Лимит!";
          document.getElementById('toast').style.display = 'block';
          setTimeout(() => document.getElementById('toast').style.display = 'none', 1000);
        }
      }
      render();
    }

    function saveDeck() {
      localStorage.setItem(`deck_${faction}`, JSON.stringify(selectedCards));
      tg.showAlert('Колода сохранена!');
      setTimeout(() => history.back(), 500);
    }

    render();
  </script>
</body>
</html>
