<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конструктор Колоды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 15px;
      padding-bottom: 100px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 20px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }
    .header h2 { font-size: 20px; }
    .btn-back {
      padding: 8px 15px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .stat { flex: 1; text-align: center; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.error { color: #e74c3c; }
    .stat-value.success { color: #2ecc71; }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 5px;
    }
    .filter-btn {
      padding: 10px 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }
    .filter-btn.active { background: #3498db; border-color: #3498db; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .card {
      padding: 12px;
      border-radius: 10px;
      background: #2c3e50;
      border: 3px solid transparent;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 180px;
    }
    .card:active { transform: scale(0.98); }
    .card.selected { border-color: #2ecc71; background: rgba(46, 204, 113, 0.15); }
    .card.locked { opacity: 0.4; cursor: not-allowed; }
    .card-type {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 5px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 600;
    }
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    .card-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .card-stats { display: flex; gap: 10px; font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .card-influence {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #f1c40f;
      background: rgba(0,0,0,0.6);
      padding: 3px 6px;
      border-radius: 4px;
    }
    .card-count {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 11px;
      color: #2ecc71;
      font-weight: 600;
    }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      background: rgba(22, 33, 62, 0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel { background: rgba(255,255,255,0.1); color: white; }
    .btn-save { background: #2ecc71; color: white; }
    .btn-save:disabled { background: #555; color: #888; cursor: not-allowed; }
    .faction-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 15px;
    }
    .faction-dot { width: 10px; height: 10px; border-radius: 50%; }
    .leader-select {
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(52, 152, 219, 0.1);
      border: 1px solid #3498db;
      border-radius: 10px;
    }
    .leader-select h3 { margin-bottom: 15px; color: #3498db; }
    .leader-option {
      padding: 12px;
      margin: 8px 0;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
    }
    .leader-option.selected { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; }
    .leader-name { font-weight: 700; color: #3498db; margin-bottom: 5px; }
    .leader-ability { font-size: 12px; color: #aaa; }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <h2>🃏 Конструктор колоды</h2>
    <div style="width: 70px;"></div>
  </div>
  
  <div class="faction-badge">
    <div class="faction-dot" id="factionDot"></div>
    <span id="factionName">Фракция</span>
  </div>
  
  <div class="leader-select" id="leaderSelect">
    <h3>👑 Выберите лидера:</h3>
    <div id="leaderOptions"></div>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-label">КАРТ</div>
      <div class="stat-value" id="cardsCount">0/25</div>
    </div>
    <div class="stat">
      <div class="stat-label">ВЛИЯНИЕ</div>
      <div class="stat-value" id="influenceCount">0/150</div>
    </div>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="white">⚪ Белый</button>
    <button class="filter-btn" data-filter="gray">⚫ Серый</button>
    <button class="filter-btn" data-filter="purple">🟣 Фиолетовый</button>
    <button class="filter-btn" data-filter="gold">🟡 Золотой</button>
    <button class="filter-btn" data-filter="special">🔴 Особая</button>
  </div>
  
  <div class="cards-grid" id="cardsGrid"></div>
  
  <div class="bottom-bar">
    <button class="btn btn-cancel" onclick="goBack()">Отмена</button>
    <button class="btn btn-save" id="saveBtn" disabled onclick="saveDeck()">💾 Сохранить</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let selectedFaction = localStorage.getItem('selectedFaction') || 'knights';
    let selectedLeader = parseInt(localStorage.getItem('playerLeader') || '0');
    let selectedCards = [];
    let currentFilter = 'all';
    let factionData = null;
    
    document.addEventListener('DOMContentLoaded', () => {
      initFaction();
      loadSavedDeck();
      renderLeaders();
      renderCards();
      updateStats();
      setupFilters();
    });
    
    function initFaction() {
      factionData = FACTIONS[selectedFaction];
      document.getElementById('factionName').textContent = factionData.name;
      document.getElementById('factionDot').style.background = factionData.color;
    }
    
    function loadSavedDeck() {
      const saved = localStorage.getItem(`deck_${selectedFaction}`);
      if (saved) selectedCards = JSON.parse(saved);
    }
    
    function renderLeaders() {
      const container = document.getElementById('leaderOptions');
      const leaders = factionData.leaders || [];
      container.innerHTML = leaders.map((leader, idx) => `
        <div class="leader-option ${selectedLeader===idx?'selected':''}" onclick="selectLeader(${idx})">
          <div class="leader-name">${idx+1}. ${leader.name}</div>
          <div class="leader-ability">${leader.ability?.description || 'Уникальная способность'}</div>
        </div>
      `).join('');
    }
    
    function selectLeader(idx) {
      selectedLeader = idx;
      localStorage.setItem('playerLeader', idx.toString());
      renderLeaders();
      showToast('Лидер выбран!');
    }
    
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      factionData.cards.forEach(card => {
        if (currentFilter !== 'all' && card.type !== currentFilter) return;
        const cardEl = document.createElement('div');
        const copiesInDeck = selectedCards.filter(id => id === card.id).length;
        const isLocked = copiesInDeck >= card.maxInDeck || selectedCards.length >= 25;
        const isSelected = copiesInDeck > 0;
        const eff = card.effect ? (card.effect.description || 'Есть эффект') : 'Нет эффекта';
        cardEl.className = `card ${isSelected ? 'selected' : ''} ${isLocked && !isSelected ? 'locked' : ''}`;
        cardEl.innerHTML = `
          <div class="card-influence">${card.influence}</div>
          <div class="card-type ${card.type}">${card.type.toUpperCase()}</div>
          <div class="card-name">${card.name}</div>
          <div class="card-stats">
            <span>⚔️${card.power}</span>
            <span>🛡️${card.armor}</span>
            <span>❤️${card.health}</span>
          </div>
          <div style="font-size:10px;color:#888;margin-top:8px;border-top:1px solid rgba(255,255,255,0.1);padding-top:8px;">${eff.substring(0,40)}${eff.length>40?'...':''}</div>
          ${copiesInDeck > 0 ? `<div class="card-count">×${copiesInDeck}</div>` : ''}
        `;
        if (!isLocked || isSelected) cardEl.onclick = () => toggleCard(card);
        grid.appendChild(cardEl);
      });
    }
    
    function toggleCard(card) {
      const index = selectedCards.indexOf(card.id);
      if (index > -1) {
        selectedCards.splice(index, 1);
      } else {
        const copiesInDeck = selectedCards.filter(id => id === card.id).length;
        if (copiesInDeck >= card.maxInDeck) { showToast('Максимум копий!'); return; }
        selectedCards.push(card.id);
      }
      renderCards();
      updateStats();
    }
    
    function updateStats() {
      const cardsCount = selectedCards.length;
      const influence = selectedCards.reduce((sum, id) => {
        const card = factionData.cards.find(c => c.id === id);
        return sum + (card?.influence || 0);
      }, 0);
      
      const cardsEl = document.getElementById('cardsCount');
      const infEl = document.getElementById('influenceCount');
      const saveBtn = document.getElementById('saveBtn');
      
      cardsEl.textContent = `${cardsCount}/25`;
      infEl.textContent = `${influence}/150`;
      
      cardsEl.className = 'stat-value' + (cardsCount === 25 ? ' success' : '');
      infEl.className = 'stat-value' + (influence > 150 ? ' error' : '');
      
      saveBtn.disabled = cardsCount !== 25 || influence > 150;
    }
    
    function setupFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = (e) => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          currentFilter = e.currentTarget.dataset.filter;
          renderCards();
        };
      });
    }
    
    function saveDeck() {
      localStorage.setItem(`deck_${selectedFaction}`, JSON.stringify(selectedCards));
      localStorage.setItem('playerLeader', selectedLeader.toString());
      showToast('✅ Колода сохранена!');
      setTimeout(() => { goBack(); }, 1000);
    }
    
    function goBack() { window.location.href = 'game.html'; }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
