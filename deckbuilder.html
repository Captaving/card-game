<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Конструктор колоды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
<script type="module">
  import { saveDeck, loadDeck } from './firebase.js';
  
  // Делаем функции доступными глобально (для onclick)
  window.saveDeckFirebase = async function() {
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id || 'guest';
    const faction = localStorage.getItem('selectedFaction') || 'knights';
    
    const success = await saveDeck(userId, faction, selectedCards);
    
    if (success) {
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      alert('✅ Колода сохранена в облаке!');
    } else {
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
      alert('❌ Ошибка сохранения. Попробуйте позже.');
    }
  };
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 15px;
      padding-bottom: 80px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
    }
    .stats {
      display: flex;
      gap: 20px;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stat.warning { color: #f39c12; }
    .stat.error { color: #e74c3c; }
    
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      overflow-x: auto;
      padding-bottom: 5px;
    }
    .filter-btn {
      padding: 8px 12px;
      border: 1px solid #555;
      border-radius: 20px;
      background: #2c3e50;
      color: white;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
    }
    .filter-btn.active {
      background: #3498db;
      border-color: #3498db;
    }
    
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    
    .card {
      padding: 10px;
      border-radius: 8px;
      background: #2c3e50;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .card.selected {
      border-color: #2ecc71;
      background: #27ae6020;
    }
    .card.full {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .card-type {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 5px;
      text-align: center;
    }
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    
    .card-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .card-stats {
      font-size: 11px;
      display: flex;
      gap: 8px;
      color: #aaa;
    }
    
    .card-influence {
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 10px;
      color: #f1c40f;
      background: rgba(0,0,0,0.5);
      padding: 2px 5px;
      border-radius: 3px;
    }
    
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: #16213e;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
    }
    
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save {
      background: #2ecc71;
      color: white;
    }
    .btn-save:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .btn-back {
      background: #34495e;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🃏 Конструктор колоды</h2>
    <button class="btn-back" onclick="goBack()" style="padding: 8px 15px; font-size: 12px;">← Назад</button>
  </div>
  
  <div class="stats">
    <div class="stat" id="cardsCount">Карт: <b>0/25</b></div>
    <div class="stat" id="influenceCount">Влияние: <b>0/150</b></div>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="white">⚪ Белый</button>
    <button class="filter-btn" data-filter="gray">⚫ Серый</button>
    <button class="filter-btn" data-filter="purple">🟣 Фиолетовый</button>
    <button class="filter-btn" data-filter="gold">🟡 Золотой</button>
    <button class="filter-btn" data-filter="special">🔴 Особая</button>
  </div>
  
  <div class="cards-grid" id="cardsGrid">
    <!-- Карты будут добавлены через JS -->
  </div>
  
  <div class="bottom-bar">
    <button class="btn btn-back" onclick="goBack()">Отмена</button>
    <button class="btn btn-save" id="saveBtn" disabled>Сохранить колоду</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let selectedFaction = localStorage.getItem('selectedFaction') || 'knights';
    let selectedCards = [];
    let currentFilter = 'all';
    
    // Загрузка карт при старте
    document.addEventListener('DOMContentLoaded', () => {
      renderCards();
      updateStats();
      setupFilters();
    });
    
    function renderCards() {
      const faction = FACTIONS[selectedFaction];
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      
      faction.cards.forEach(card => {
        // Фильтрация по типу
        if (currentFilter !== 'all' && card.type !== currentFilter) return;
        
        const cardEl = document.createElement('div');
        cardEl.className = `card ${selectedCards.includes(card.id) ? 'selected' : ''}`;
        if (isCardLocked(card)) cardEl.classList.add('full');
        
        cardEl.innerHTML = `
          <div class="card-influence">${card.influence}</div>
          <div class="card-type ${card.type}">${card.type.toUpperCase()}</div>
          <div class="card-name">${card.name}</div>
          <div class="card-stats">
            <span>⚔️${card.power}</span>
            <span>🛡️${card.armor}</span>
            <span>❤️${card.health}</span>
          </div>
        `;
        
        cardEl.onclick = () => toggleCard(card);
        grid.appendChild(cardEl);
      });
    }
    
    function toggleCard(card) {
      if (isCardLocked(card) && !selectedCards.includes(card.id)) {
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        return;
      }
      
      const index = selectedCards.indexOf(card.id);
      if (index > -1) {
        selectedCards.splice(index, 1);
      } else {
        selectedCards.push(card.id);
      }
      
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      renderCards();
      updateStats();
    }
    
    function isCardLocked(card) {
      // Проверка лимита копий
      const copiesInDeck = selectedCards.filter(id => id === card.id).length;
      if (copiesInDeck >= card.maxInDeck) return true;
      
      // Проверка лимита карт
      if (selectedCards.length >= GAME_CONFIG.maxDeckSize) return true;
      
      // Проверка лимита влияния
      const currentInfluence = selectedCards
        .map(id => FACTIONS[selectedFaction].cards.find(c => c.id === id))
        .reduce((sum, c) => sum + (c?.influence || 0), 0);
      
      if (currentInfluence + card.influence > GAME_CONFIG.maxInfluence) return true;
      
      return false;
    }
    
    function updateStats() {
      const faction = FACTIONS[selectedFaction];
      const currentInfluence = selectedCards
        .map(id => faction.cards.find(c => c.id === id))
        .reduce((sum, c) => sum + (c?.influence || 0), 0);
      
      const cardsEl = document.getElementById('cardsCount');
      const influenceEl = document.getElementById('influenceCount');
      const saveBtn = document.getElementById('saveBtn');
      
      cardsEl.innerHTML = `Карт: <b>${selectedCards.length}/${GAME_CONFIG.maxDeckSize}</b>`;
      influenceEl.innerHTML = `Влияние: <b>${currentInfluence}/${GAME_CONFIG.maxInfluence}</b>`;
      
      // Подсветка предупреждений
      cardsEl.className = `stat ${selectedCards.length > GAME_CONFIG.maxDeckSize ? 'error' : ''}`;
      influenceEl.className = `stat ${currentInfluence > GAME_CONFIG.maxInfluence ? 'error' : currentInfluence > GAME_CONFIG.maxInfluence * 0.9 ? 'warning' : ''}`;
      
      // Активация кнопки сохранения
      saveBtn.disabled = selectedCards.length !== GAME_CONFIG.maxDeckSize || currentInfluence > GAME_CONFIG.maxInfluence;
    }
    
    function setupFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = (e) => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          currentFilter = e.currentTarget.dataset.filter;
          renderCards();
        };
      });
    }
    
    function goBack() {
      window.location.href = 'index.html';
    }
    
    document.getElementById('saveBtn').onclick = () => {
      // Сохранение колоды в localStorage (для теста)
      localStorage.setItem(`deck_${selectedFaction}`, JSON.stringify(selectedCards));
      
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      alert('✅ Колода сохранена!\n\nВ полной версии здесь будет переход к игре.');
    };
  </script>
</body>
</html>
