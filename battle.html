<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Битва с Ботом</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 120px; min-height: 100vh; }
    
    /* Верхняя панель */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    .coin-container { display: flex; gap: 4px; }
    .coin { width: 18px; height: 18px; background: gold; border-radius: 50%; border: 2px solid orange; opacity: 0.3; display: flex; align-items: center; justify-content: center; font-size: 10px; color: black; font-weight: bold; }
    .coin.active { opacity: 1; box-shadow: 0 0 8px gold; }
    .score { font-size: 18px; font-weight: bold; }
    
    /* Поле боя: 2 колонки, в каждой 2 ряда по 2 слота = 4 карты на колонку */
    .field { display: flex; justify-content: center; gap: 20px; margin: 10px 0; }
    .column { display: flex; flex-direction: column; gap: 5px; }
    .row { display: flex; gap: 5px; }
    .slot { 
      width: 70px; height: 75px; 
      border: 1px dashed rgba(255,255,255,0.2); 
      border-radius: 6px; 
      display: flex; align-items: center; justify-content: center; 
      position: relative; 
    }
    
    /* Карта */
    .card { 
      width: 66px; height: 71px; 
      background: #2c3e50; border-radius: 5px; 
      border: 2px solid #555; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      font-size: 9px; position: relative; cursor: pointer; 
      transition: transform 0.1s;
    }
    .card:active { transform: scale(0.95); }
    .card.power-0 { opacity: 0.4; filter: grayscale(1); }
    .card .power { font-size: 20px; font-weight: 800; color: white; text-shadow: 0 2px 4px black; }
    .card .name { font-size: 8px; text-align: center; line-height: 1.1; padding: 0 2px; overflow: hidden; height: 18px; }
    .card .type { position: absolute; top: 2px; right: 2px; font-size: 7px; padding: 1px 3px; background: rgba(0,0,0,0.5); border-radius: 3px; }
    .card .charge-badge { 
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%); 
      background: #f39c12; color: black; border-radius: 10px; 
      padding: 2px 6px; font-size: 10px; font-weight: bold; 
      display: none; 
    }
    .card.has-charge .charge-badge { display: block; }
    
    /* Рука */
    .hand { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      height: 100px; background: rgba(0,0,0,0.9); 
      display: flex; overflow-x: auto; padding: 10px; gap: 6px; align-items: center; z-index: 100; 
    }
    .hand .card { flex-shrink: 0; width: 60px; height: 80px; border: 2px solid white; }
    .hand .card.selected { border-color: #f1c40f; transform: translateY(-10px); box-shadow: 0 0 10px gold; }
    
    /* Управление */
    .controls { position: fixed; bottom: 105px; right: 15px; display: flex; gap: 10px; z-index: 99; }
    .ctrl-btn { padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
    .btn-pass { background: #e74c3c; }
    .btn-leader { background: #f1c40f; color: #333; }
    
    /* Модальные окна */
    .overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.95); z-index: 2000; 
      display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
    }
    .overlay.active { display: flex; }
    .modal-content { 
      background: #2c3e50; border-radius: 15px; padding: 20px; 
      max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; 
    }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center; color: #3498db; }
    .mulligan-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
    .btn-start { padding: 12px 30px; background: #2ecc71; border: none; border-radius: 25px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-yes { background: #2ecc71; color: white; padding: 10px 25px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .btn-no { background: #e74c3c; color: white; padding: 10px 25px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
    
    /* Информация о карте/лидере */
    .info-box { background: rgba(52,152,219,0.1); border: 1px solid #3498db; border-radius: 10px; padding: 15px; margin: 10px 0; }
    .info-title { font-weight: bold; color: #3498db; margin-bottom: 8px; }
    .info-effect { font-size: 13px; line-height: 1.4; color: #ddd; }
    
    /* Сообщение */
    .toast { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(0,0,0,0.85); padding: 15px 25px; border-radius: 12px; 
      z-index: 3000; display: none; text-align: center; pointer-events: none; font-size: 14px;
    }
    
    /* Лидер */
    .leader-avatar { 
      width: 40px; height: 40px; border-radius: 8px; 
      background: linear-gradient(135deg, #f1c40f, #f39c12); 
      display: flex; align-items: center; justify-content: center; 
      font-size: 20px; cursor: pointer; position: relative;
    }
    .leader-info { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(52,152,219,0.15); border-radius: 8px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- Верх -->
  <div class="top-bar">
    <div>
      <div style="font-size:11px; color:#aaa;">БОТ</div>
      <div class="coin-container" id="botCoins"><div class="coin">1</div><div class="coin">2</div></div>
      <div class="score" id="botScore">0</div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:13px; color:#f1c40f;" id="roundDisplay">Раунд 1</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px; color:#aaa;">ВЫ</div>
      <div class="coin-container" id="myCoins"><div class="coin">1</div><div class="coin">2</div></div>
      <div class="score" id="myScore">0</div>
    </div>
  </div>

  <!-- Информация о лидере -->
  <div class="leader-info">
    <div class="leader-avatar" id="playerLeader" onclick="showLeaderInfo('player')">👑</div>
    <div style="flex:1;">
      <div style="font-weight:600; color:#3498db; font-size:13px;">Ваш лидер</div>
      <div style="font-size:11px; color:#aaa;" id="leaderName">-</div>
    </div>
    <div style="font-size:11px; color:#f1c40f; cursor:pointer;" onclick="useLeaderAbility()">⚡ Использовать</div>
  </div>

  <!-- Поле противника -->
  <div class="field">
    <div class="column">
      <div class="row" id="botLeftTop"></div>
      <div class="row" id="botLeftBottom"></div>
    </div>
    <div class="column">
      <div class="row" id="botRightTop"></div>
      <div class="row" id="botRightBottom"></div>
    </div>
  </div>

  <div style="height: 15px;"></div>

  <!-- Поле игрока -->
  <div class="field">
    <div class="column">
      <div class="row" id="myLeftTop"></div>
      <div class="row" id="myLeftBottom"></div>
    </div>
    <div class="column">
      <div class="row" id="myRightTop"></div>
      <div class="row" id="myRightBottom"></div>
    </div>
  </div>

  <!-- Управление -->
  <div class="controls">
    <button class="ctrl-btn btn-leader" onclick="useLeaderAbility()">👑 Лидер</button>
    <button class="ctrl-btn btn-pass" onclick="passTurn()">PASS</button>
  </div>

  <!-- Рука + колода/отбой -->
  <div class="hand" id="handContainer"></div>
  <div style="position:fixed; bottom:105px; left:15px; display:flex; flex-direction:column; gap:5px; z-index:99;">
    <div style="background:rgba(255,255,255,0.1); padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer;" onclick="showDeckInfo()">📚 Колода: <span id="deckCount">0</span></div>
    <div style="background:rgba(255,255,255,0.1); padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer;" onclick="showDiscardInfo()">🗑️ Отбой: <span id="discardCount">0</span></div>
  </div>

  <!-- Муллиган -->
  <div class="overlay" id="mulliganOverlay">
    <div class="modal-content">
      <div class="modal-title">🔄 Муллиган</div>
      <p style="color:#aaa; text-align:center; margin-bottom:15px;">Выберите до 3 карт для замены</p>
      <div class="mulligan-list" id="mulliganList"></div>
      <button class="btn-start" onclick="endMulligan()">НАЧАТЬ БОЙ</button>
    </div>
  </div>

  <!-- Эффект карты -->
  <div class="overlay" id="effectOverlay">
    <div class="modal-content" style="text-align:center;">
      <div class="modal-title">📜 Применить эффект?</div>
      <div id="effectText" style="margin:15px 0; font-size:14px; color:#ddd;"></div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn-yes" onclick="applyEffectChoice(true)">Да</button>
        <button class="btn-no" onclick="applyEffectChoice(false)">Нет</button>
      </div>
    </div>
  </div>

  <!-- Информация о карте/лидере/колоде -->
  <div class="overlay" id="infoOverlay">
    <div class="modal-content">
      <div class="modal-title" id="infoTitle">Информация</div>
      <div id="infoContent"></div>
      <button class="btn-start" style="margin-top:15px; width:100%;" onclick="closeInfo()">Закрыть</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand(); tg.ready();

  // === СОСТОЯНИЕ ИГРЫ ===
  let state = {
    faction: localStorage.getItem('selectedFaction') || 'knights',
    leaderIdx: parseInt(localStorage.getItem('leaderIdx') || '0'),
    deck: [], discard: [], hand: [],
    myField: { left: { top: [], bottom: [] }, right: { top: [], bottom: [] } },
    botField: { left: { top: [], bottom: [] }, right: { top: [], bottom: [] } },
    botHand: [], botDeck: [], botDiscard: [],
    coins: { my: 0, bot: 0 },
    round: 1, turn: 'player', gameOver: false,
    pendingEffect: null, leaderUsed: false,
    cardCharges: {} // { cardId: count }
  };

  let clickTimer = null;
  let lastCard = null;

  // === ИНИЦИАЛИЗАЦИЯ ===
  window.onload = () => {
    loadDeck();
    drawCards(10);
    showMulligan();
    initBot();
    updateLeaderName();
  };

  function loadDeck() {
    const saved = localStorage.getItem(`deck_${state.faction}`);
    if(saved) {
      state.deck = JSON.parse(saved).map(id => {
        for(let f in FACTIONS) {
          const c = FACTIONS[f].cards.find(x => x.id === id);
          if(c) return {...c, cur: c.power, charges: 0};
        }
        return null;
      }).filter(c => c);
    } else {
      state.deck = FACTIONS[state.faction].cards.slice(0,10).map(c => ({...c, cur: c.power, charges: 0}));
    }
    shuffle(state.deck);
  }

  function drawCards(n) {
    for(let i=0; i<n; i++) {
      if(state.deck.length > 0 && state.hand.length < 10) {
        const card = state.deck.pop();
        // Инициализируем заряды если есть
        if(card.effect && (card.effect.action === 'active' || card.effect.charges)) {
          state.cardCharges[card.id + '_' + Date.now()] = card.effect.charges || 1;
          card.uniqueId = card.id + '_' + Date.now();
          card.charges = state.cardCharges[card.uniqueId];
        }
        state.hand.push(card);
      }
    }
  }

  function initBot() {
    const pool = FACTIONS[state.faction === 'knights' ? 'cultists' : 'knights'].cards;
    for(let i=0; i<10; i++) {
      const c = pool[Math.floor(Math.random()*pool.length)];
      state.botHand.push({...c, cur: c.power});
    }
    state.botDeck = pool.slice(10, 35);
  }

  function updateLeaderName() {
    const leader = FACTIONS[state.faction].leaders[state.leaderIdx];
    document.getElementById('leaderName').textContent = leader.name;
  }

  // === МУЛЛИГАН ===
  function showMulligan() {
    document.getElementById('mulliganOverlay').classList.add('active');
    const list = document.getElementById('mulliganList');
    list.innerHTML = '';
    
    state.hand.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="type">${card.type}</div>
        <div class="power">${card.cur}</div>
        <div class="name">${card.name}</div>
      `;
      el.onclick = () => {
        el.classList.toggle('selected');
        el.dataset.sel = el.classList.contains('selected');
      };
      el.dataset.idx = idx;
      list.appendChild(el);
    });
  }

  function endMulligan() {
    const selected = Array.from(document.querySelectorAll('#mulliganList .card.selected'))
      .map(e => parseInt(e.dataset.idx)).sort((a,b) => b-a);
    
    selected.forEach(idx => {
      state.hand.splice(idx, 1);
      if(state.deck.length > 0) {
        const newCard = state.deck.pop();
        newCard.uniqueId = newCard.id + '_' + Date.now();
        newCard.charges = 0;
        state.hand.push(newCard);
      }
    });
    
    document.getElementById('mulliganOverlay').classList.remove('active');
    render();
    showToast("🎮 Ваш ход!");
  }

  // === РАЗЫГРЫВАНИЕ КАРТЫ ===
  function playCard(handIdx, col, row) {
    if(state.turn !== 'player' || state.gameOver) return;
    
    const card = state.hand[handIdx];
    
    // Проверка ряда
    if(card.row !== 'any' && card.row !== col) {
      showToast(`❌ Эта карта только для ${card.row==='left'?'левого':'правого'} ряда!`);
      return;
    }
    
    const fieldRow = state.myField[col][row];
    if(fieldRow.length >= 2) {
      showToast("❌ Ряд заполнен (макс. 2 карты)!");
      return;
    }

    // Размещение
    fieldRow.push(card);
    state.hand.splice(handIdx, 1);
    
    // Эффект при размещении (onPlay)
    if(card.effect && card.effect.type === 'onPlay') {
      applyCardEffect(card, 'me', col, row);
    }
    
    // Особые карты уходят в отбой сразу
    if(card.type === 'special' || card.discardAfterUse) {
      state.discard.push(card);
      fieldRow.pop();
    }
    
    checkDeaths();
    render();
    
    // Конец хода
    state.turn = 'bot';
    render();
    setTimeout(botTurn, 1200);
  }

  // === БОТ ===
  function botTurn() {
    if(state.gameOver) return;
    
    if(state.botHand.length > 0) {
      // Простая логика: играет первую подходящую карту
      const valid = state.botHand.filter(c => {
        const col = c.row === 'any' ? (Math.random() > 0.5 ? 'left' : 'right') : c.row;
        return (state.botField[col].top.length < 2 || state.botField[col].bottom.length < 2);
      });
      
      if(valid.length > 0) {
        const card = valid[0];
        const hIdx = state.botHand.indexOf(card);
        const col = card.row === 'any' ? (Math.random() > 0.5 ? 'left' : 'right') : card.row;
        const row = state.botField[col].top.length < 2 ? 'top' : 'bottom';
        
        state.botField[col][row].push(card);
        state.botHand.splice(hIdx, 1);
        
        if(card.effect && card.effect.type === 'onPlay') {
          applyCardEffect(card, 'bot', col, row);
        }
        if(card.type === 'special') {
          state.botDiscard.push(card);
          state.botField[col][row].pop();
        }
      }
    }
    
    state.turn = 'player';
    render();
    
    if(state.hand.length === 0 && state.botHand.length === 0) {
      setTimeout(endRound, 800);
    }
  }

  function passTurn() {
    if(state.turn !== 'player') return;
    state.turn = 'bot';
    render();
    setTimeout(botTurn, 800);
  }

  // === ЭФФЕКТЫ КАРТ ===
  function applyCardEffect(card, who, col, row) {
    if(!card.effect) return;
    const eff = card.effect;
    
    // УРОН
    if(eff.action === 'damage') {
      const targetField = who === 'me' ? state.botField : state.myField;
      // Ищем первую живую карту в целевой колонке
      for(let r of ['top', 'bottom']) {
        const target = targetField[col][r].find(c => c.cur > 0);
        if(target) {
          target.cur -= eff.value;
          showToast(`💥 ${card.name} наносит ${eff.value} урона!`);
          break;
        }
      }
    }
    
    // БУФФ СИЛЫ
    if(eff.action === 'buff') {
      const sourceField = who === 'me' ? state.myField : state.botField;
      sourceField[col][row].forEach(c => {
        if(c.id !== card.id) c.cur += eff.value;
      });
      showToast(`💪 ${card.name} усиливает на +${eff.value}!`);
    }
    
    // ПРИЗЫВ
    if(eff.action === 'summon' && eff.card) {
      const template = FACTIONS[state.faction].cards.find(c => c.id === eff.card);
      if(template && state.myField[col][row].length < 2) {
        const summoned = {...template, cur: template.power, charges: 0};
        summoned.uniqueId = template.id + '_' + Date.now();
        state.myField[col][row].push(summoned);
        showToast(`👻 ${card.name} призывает ${template.name}!`);
      }
    }
    
    // ЗАРЯДЫ (активируемые эффекты)
    if(eff.action === 'active' || eff.charges) {
      const uniqueId = card.uniqueId || (card.id + '_' + Date.now());
      if(!state.cardCharges[uniqueId]) {
        state.cardCharges[uniqueId] = eff.charges || 1;
        card.charges = state.cardCharges[uniqueId];
        showToast(`⚡ ${card.name} получил ${card.charges} заряд(ов)!`);
      }
    }
  }

  // Проверка смерти карт (сила <= 0)
  function checkDeaths() {
    ['left', 'right'].forEach(col => {
      ['top', 'bottom'].forEach(row => {
        state.myField[col][row] = state.myField[col][row].filter(c => c.cur > 0);
        state.botField[col][row] = state.botField[col][row].filter(c => c.cur > 0);
      });
    });
  }

  // === ДВОЙНОЙ ТАП ===
  function setupDoubleTap(element, onSingle, onDouble, data) {
    element.addEventListener('click', (e) => {
      e.stopPropagation();
      
      if(clickTimer && lastCard === element) {
        clearTimeout(clickTimer);
        clickTimer = null;
        lastCard = null;
        onDouble(data);
      } else {
        clickTimer = setTimeout(() => {
          onSingle(data);
          clickTimer = null;
          lastCard = null;
        }, 250);
        lastCard = element;
      }
    });
  }

  // Обработка клика по карте на поле
  function handleCardClick(card, who, col, row, element) {
    // Одиночный тап: если эффект не onPlay и есть заряды → показать окно
    if(card.effect && card.effect.type !== 'onPlay' && (card.effect.action === 'active' || card.charges > 0)) {
      const uniqueId = card.uniqueId || card.id;
      const charges = state.cardCharges[uniqueId] || card.charges || 0;
      
      if(charges > 0) {
        state.pendingEffect = { card, who, col, row, uniqueId };
        document.getElementById('effectText').textContent = 
          `${card.name}\n📜 ${card.effect.description}\n⚡ Зарядов: ${charges}`;
        document.getElementById('effectOverlay').classList.add('active');
        return;
      }
    }
    
    // Просто показать инфо
    showCardInfo(card);
  }

  function applyEffectChoice(yes) {
    document.getElementById('effectOverlay').classList.remove('active');
    if(!yes || !state.pendingEffect) return;
    
    const { card, who, col, row, uniqueId } = state.pendingEffect;
    
    // Тратим заряд
    if(state.cardCharges[uniqueId] !== undefined) {
      state.cardCharges[uniqueId]--;
      card.charges = state.cardCharges[uniqueId];
    }
    
    // Применяем эффект
    if(card.effect.action === 'damage') {
      const targetField = who === 'me' ? state.botField : state.myField;
      for(let r of ['top', 'bottom']) {
        const target = targetField[col][r].find(c => c.cur > 0);
        if(target) { target.cur -= card.effect.value; break; }
      }
      showToast(`💥 Эффект применён!`);
    }
    
    checkDeaths();
    render();
    state.pendingEffect = null;
  }

  // === СПОСОБНОСТЬ ЛИДЕРА ===
  function useLeaderAbility() {
    if(state.leaderUsed || state.gameOver || state.turn !== 'player') {
      showToast('⚠️ Способность уже использована!');
      return;
    }
    
    const leader = FACTIONS[state.faction].leaders[state.leaderIdx];
    const abil = leader.ability;
    
    if(abil.type === 'damage') {
      // Ищем первую карту противника
      for(let col of ['left', 'right']) {
        for(let row of ['top', 'bottom']) {
          const target = state.botField[col][row].find(c => c.cur > 0);
          if(target) {
            target.cur -= abil.value;
            showToast(`👑 ${leader.name}: ${target.name} получил ${abil.value} урона!`);
            break;
          }
        }
      }
    }
    else if(abil.type === 'buff') {
      for(let col of ['left', 'right']) {
        for(let row of ['top', 'bottom']) {
          state.myField[col][row].forEach(c => c.cur += abil.value);
        }
      }
      showToast(`👑 ${leader.name}: все ваши карты +${abil.value} силы!`);
    }
    else if(abil.type === 'counter') {
      showToast(`👑 ${leader.name}: способность противника отменена!`);
    }
    
    state.leaderUsed = true;
    render();
    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }

  // === ИНФОРМАЦИЯ (двойной тап) ===
  function showCardInfo(card) {
    const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
    const eff = card.effect ? card.effect.description : 'Нет эффекта';
    
    document.getElementById('infoTitle').textContent = card.name;
    document.getElementById('infoContent').innerHTML = `
      <div class="info-box">
        <div class="info-title" style="color:${colors[card.type]}">${card.type.toUpperCase()} • 💫 ${card.influence}</div>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:10px 0; text-align:center;">
          <div><div style="font-size:20px; font-weight:bold;">⚔️${card.cur}</div><div style="font-size:10px; color:#888;">Сила</div></div>
          <div><div style="font-size:20px; font-weight:bold;">🛡️${card.armor||0}</div><div style="font-size:10px; color:#888;">Броня</div></div>
          <div><div style="font-size:20px; font-weight:bold;">❤️${card.health||0}</div><div style="font-size:10px; color:#888;">Здоровье</div></div>
        </div>
        <div class="info-effect">📜 <strong>Эффект:</strong><br>${eff}</div>
        ${card.charges > 0 ? `<div style="margin-top:10px; color:#f39c12; font-weight:bold;">⚡ Заряды: ${card.charges}</div>` : ''}
      </div>
    `;
    document.getElementById('infoOverlay').classList.add('active');
  }

  function showLeaderInfo(who) {
    const faction = who === 'player' ? state.faction : (state.faction === 'knights' ? 'cultists' : 'knights');
    const leaderIdx = who === 'player' ? state.leaderIdx : 0;
    const leader = FACTIONS[faction].leaders[leaderIdx];
    
    document.getElementById('infoTitle').textContent = `${who==='player'?'Ваш':'Противника'} лидер`;
    document.getElementById('infoContent').innerHTML = `
      <div class="info-box">
        <div class="info-title">👑 ${leader.name}</div>
        <div class="info-effect">📜 <strong>Способность:</strong><br>${leader.ability.description}</div>
      </div>
    `;
    document.getElementById('infoOverlay').classList.add('active');
  }

  function showDeckInfo() {
    document.getElementById('infoTitle').textContent = '📚 Ваша колода';
    let html = `<div style="text-align:center; padding:20px;">`;
    html += `<div style="font-size:32px; font-weight:bold; color:#3498db;">${state.deck.length}</div>`;
    html += `<div style="color:#aaa;">карт осталось</div></div>`;
    
    if(state.deck.length > 0) {
      html += `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; max-height:200px; overflow-y:auto;">`;
      state.deck.slice(0, 9).forEach(c => {
        html += `<div style="background:#34495e; padding:5px; border-radius:4px; font-size:10px; text-align:center;">
          <div style="font-weight:bold;">${c.name}</div>
          <div>⚔️${c.power}</div>
        </div>`;
      });
      html += `</div>`;
    }
    
    document.getElementById('infoContent').innerHTML = html;
    document.getElementById('infoOverlay').classList.add('active');
  }

  function showDiscardInfo() {
    document.getElementById('infoTitle').textContent = '🗑️ Ваш отбой';
    let html = `<div style="text-align:center; padding:20px;">`;
    html += `<div style="font-size:32px; font-weight:bold; color:#e74c3c;">${state.discard.length}</div>`;
    html += `<div style="color:#aaa;">карт сброшено</div></div>`;
    
    if(state.discard.length > 0) {
      html += `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; max-height:200px; overflow-y:auto;">`;
      state.discard.slice(-9).forEach(c => {
        html += `<div style="background:#34495e; padding:5px; border-radius:4px; font-size:10px; text-align:center; opacity:0.7;">
          <div style="font-weight:bold;">${c.name}</div>
          <div>⚔️${c.power}</div>
        </div>`;
      });
      html += `</div>`;
    }
    
    document.getElementById('infoContent').innerHTML = html;
    document.getElementById('infoOverlay').classList.add('active');
  }

  function closeInfo() {
    document.getElementById('infoOverlay').classList.remove('active');
  }

  // === КОНЕЦ РАУНДА ===
  function endRound() {
    // Подсчёт очков
    let myS = 0, botS = 0;
    ['left', 'right'].forEach(col => {
      ['top', 'bottom'].forEach(row => {
        state.myField[col][row].forEach(c => myS += c.cur);
        state.botField[col][row].forEach(c => botS += c.cur);
      });
    });
    
    document.getElementById('myScore').textContent = myS;
    document.getElementById('botScore').textContent = botS;
    
    let msg = "";
    if(myS > botS) { state.coins.my++; msg = "🏆 Вы выиграли раунд! (+1 монета)"; }
    else if(botS > myS) { state.coins.bot++; msg = "💀 Бот выиграл раунд!"; }
    else { msg = "🤝 Ничья в раунде."; }
    
    showToast(msg);
    updateCoinsUI();
    
    // Проверка победы в матче
    if(state.coins.my >= 2) {
      setTimeout(() => { alert("🎉 ПОБЕДА В МАТЧЕ!"); location.href = 'index.html'; }, 500);
      state.gameOver = true;
      return;
    }
    if(state.coins.bot >= 2) {
      setTimeout(() => { alert("💀 ПОРАЖЕНИЕ В МАТЧЕ!"); location.href = 'index.html'; }, 500);
      state.gameOver = true;
      return;
    }
    
    // Подготовка к следующему раунду
    state.round++;
    document.getElementById('roundDisplay').textContent = `Раунд ${state.round}`;
    
    // Очистка поля (карты в отбой, кроме persist)
    ['left', 'right'].forEach(col => {
      ['top', 'bottom'].forEach(row => {
        state.myField[col][row].forEach(c => {
          if(!c.effect || c.effect.type !== 'persist') state.discard.push(c);
        });
        state.botField[col][row].forEach(c => {
          if(!c.effect || c.effect.type !== 'persist') state.botDiscard.push(c);
        });
        state.myField[col][row] = state.myField[col][row].filter(c => c.effect?.type === 'persist');
        state.botField[col][row] = state.botField[col][row].filter(c => c.effect?.type === 'persist');
      });
    });
    
    // Добор карт (1 карта за раунд)
    if(state.deck.length > 0) state.hand.push(state.deck.pop());
    if(state.botDeck.length > 0) state.botHand.push(state.botDeck.pop());
    
    state.turn = 'player';
    state.leaderUsed = false;
    render();
    showToast(`🎮 Раунд ${state.round} начался!`);
  }

  // === РЕНДЕР ===
  function render() {
    // Поля
    renderField('my', state.myField);
    renderField('bot', state.botField);
    
    // Рука
    const hand = document.getElementById('handContainer');
    hand.innerHTML = '';
    state.hand.forEach((card, idx) => {
      const el = createCardElement(card, true, idx);
      // Одиночный: выбрать ряд, Двойной: инфо
      setupDoubleTap(el, 
        () => showRowSelector(idx), 
        () => showCardInfo(card),
        null
      );
      hand.appendChild(el);
    });
    
    // Статистика
    document.getElementById('deckCount').textContent = state.deck.length;
    document.getElementById('discardCount').textContent = state.discard.length;
    
    // Лидер
    if(state.leaderUsed) {
      document.getElementById('playerLeader').style.opacity = '0.5';
      document.querySelector('.btn-leader').disabled = true;
    }
  }

  function renderField(who, fieldObj) {
    ['left', 'right'].forEach(col => {
      ['top', 'bottom'].forEach(row => {
        const el = document.getElementById(`${who}${col}${row==='top'?'Top':'Bottom'}`);
        el.innerHTML = '';
        fieldObj[col][row].forEach((card, cIdx) => {
          const cardEl = createCardElement(card, false, null, who, col, row, cIdx);
          if(who === 'my') {
            setupDoubleTap(cardEl,
              () => showRowSelectorForField(card, col, row),
              () => handleCardClick(card, who, col, row, cardEl),
              { card, who, col, row }
            );
          }
          el.appendChild(cardEl);
        });
      });
    });
  }

  function createCardElement(card, inHand, handIdx, who, col, row, fieldIdx) {
    const el = document.createElement('div');
    el.className = `card ${card.cur <= 0 ? 'power-0' : ''} ${card.charges > 0 ? 'has-charge' : ''}`;
    
    const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
    
    el.innerHTML = `
      <div class="type" style="background:${colors[card.type]}; color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div>
      <div class="power">${card.cur}</div>
      <div class="name">${card.name}</div>
      <div class="charge-badge">${card.charges || 0}</div>
    `;
    
    if(inHand) {
      el.style.cursor = 'pointer';
    }
    
    return el;
  }

  function showRowSelector(handIdx) {
    // Простой выбор: если карта только для одного ряда - сразу туда, иначе спрашиваем
    const card = state.hand[handIdx];
    if(card.row !== 'any') {
      playCard(handIdx, card.row, 'top'); // По умолчанию в верхний ряд
    } else {
      // Показываем простой выбор (для экономии места)
      const choice = confirm(`Куда разместить "${card.name}"?\n\n✅ ОК = Левый ряд\n❌ Отмена = Правый ряд`);
      playCard(handIdx, choice ? 'left' : 'right', 'top');
    }
  }

  function showRowSelectorForField(card, col, row) {
    // Для карт на поле - просто инфо при одиночном
    showCardInfo(card);
  }

  function updateCoinsUI() {
    document.querySelectorAll('#myCoins .coin').forEach((e,i) => e.classList.toggle('active', i < state.coins.my));
    document.querySelectorAll('#botCoins .coin').forEach((e,i) => e.classList.toggle('active', i < state.coins.bot));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1800);
  }

  function shuffle(a) { for(let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
</script>
</body>
