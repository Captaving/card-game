<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Битва с ботом</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 10px;
      padding-bottom: 120px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .score { font-size: 18px; font-weight: 700; }
    .score-label { font-size: 11px; color: #888; }
    .zone { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .avatar {
      width: 45px; height: 45px; border-radius: 8px;
      background: linear-gradient(135deg, #666, #333);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .hand { flex: 1; display: flex; gap: 4px; overflow-x: auto; height: 55px; }
    .card-back {
      width: 38px; height: 52px; border-radius: 6px;
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      border: 2px solid #34495e; flex-shrink: 0;
    }
    .deck-info { display: flex; flex-direction: column; gap: 5px; }
    .pile {
      width: 45px; height: 45px; border-radius: 8px;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; position: relative;
    }
    .pile-count {
      position: absolute; bottom: -16px; left: 50%;
      transform: translateX(-50%); font-size: 11px; color: #888;
    }
    .field { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
    .field-section { display: flex; flex-direction: column; gap: 8px; }
    .rows { display: flex; gap: 6px; }
    .row {
      display: flex; flex-direction: column; gap: 6px; padding: 8px;
      border-radius: 8px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1); min-width: 85px;
    }
    .row-label { font-size: 9px; text-align: center; color: #666; margin-bottom: 3px; }
    .field-card {
      width: 75px; min-height: 100px; border-radius: 8px;
      background: #2c3e50; border: 2px solid rgba(255,255,255,0.3);
      display: flex; flex-direction: column; padding: 6px; font-size: 8px;
    }
    .card-type {
      font-size: 7px; padding: 2px 4px; border-radius: 3px;
      text-align: center; font-weight: 700; margin-bottom: 4px;
    }
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    .card-name { font-size: 9px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .card-power { font-size: 16px; font-weight: 700; text-align: center; margin: 4px 0; }
    .card-stats { display: flex; gap: 4px; justify-content: center; font-size: 9px; }
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 15px;
      background: rgba(22, 33, 62, 0.98); border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; gap: 10px; justify-content: center;
    }
    .btn {
      padding: 15px 30px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-pass { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-leader { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #333; }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .player-zone { display: flex; gap: 10px; align-items: flex-end; margin-top: 10px; }
    .leader-btn {
      width: 45px; height: 45px; border-radius: 8px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: 2px solid #3498db; display: flex;
      align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; position: relative;
    }
    .leader-btn::after {
      content: '⚡'; position: absolute; top: -4px; right: -4px;
      background: #f1c40f; border-radius: 50%;
      width: 18px; height: 18px; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .player-hand {
      flex: 1; display: flex; gap: 5px; overflow-x: auto; height: 80px;
    }
    .hand-card {
      width: 50px; height: 68px; border-radius: 6px;
      background: #2c3e50; border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      font-size: 8px;
    }
    .hand-card:active { transform: translateY(-5px); }
    .hand-type { font-size: 6px; padding: 2px 3px; border-radius: 2px; margin-bottom: 2px; }
    .hand-name { font-size: 7px; text-align: center; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .hand-power { font-size: 12px; font-weight: 700; color: #fff; margin-top: 2px; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1a2e; border-radius: 15px; padding: 25px;
      max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; text-align: center; }
    .modal-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .modal-card {
      padding: 12px; border-radius: 8px; background: #2c3e50;
      border: 2px solid transparent; cursor: pointer; text-align: center;
    }
    .modal-card:active { background: rgba(52, 152, 219, 0.3); }
    .modal-close {
      margin-top: 15px; padding: 12px; background: #e74c3c;
      border: none; border-radius: 8px; color: white;
      font-weight: 600; cursor: pointer; width: 100%;
    }
    .toast {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); padding: 12px 20px; border-radius: 20px;
      font-size: 12px; z-index: 2000; opacity: 0; transition: opacity 0.2s;
      max-width: 85%; text-align: center; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .turn-indicator {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(52, 152, 219, 0.9); padding: 8px 20px;
      border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 100; display: none;
    }
    .turn-indicator.show { display: block; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div><div class="score-label">ПРОТИВНИК</div><div class="score" id="oppScore">0</div></div>
    <div style="text-align:right;"><div class="score-label">ИГРОК</div><div class="score" id="playerScore">0</div></div>
  </div>
  
  <div class="turn-indicator" id="turnIndicator">Ваш ход</div>
  
  <div class="zone">
    <div class="avatar">🤖</div>
    <div class="hand" id="oppHand"></div>
    <div class="deck-info">
      <div class="pile">📚<div class="pile-count" id="oppDeck">0</div></div>
      <div class="pile">🗑️<div class="pile-count" id="oppDiscard">0</div></div>
    </div>
  </div>
  
  <div class="field">
    <div class="field-section">
      <div class="rows">
        <div class="row" id="oppLeft"><div class="row-label">Левый</div></div>
        <div class="row" id="oppRight"><div class="row-label">Правый</div></div>
      </div>
    </div>
  </div>
  
  <div class="action-bar">
    <button class="btn btn-leader" id="leaderBtn" onclick="useLeader()">👑 Лидер</button>
    <button class="btn btn-pass" id="passBtn" onclick="pass()">PASS</button>
  </div>
  
  <div class="field">
    <div class="field-section">
      <div class="rows">
        <div class="row" id="playerLeft"><div class="row-label">Левый</div></div>
        <div class="row" id="playerRight"><div class="row-label">Правый</div></div>
      </div>
    </div>
  </div>
  
  <div class="player-zone">
    <div class="leader-btn" onclick="useLeader()">👑</div>
    <div class="player-hand" id="playerHand"></div>
    <div class="deck-info">
      <div class="pile">📚<div class="pile-count" id="playerDeck">0</div></div>
      <div class="pile">🗑️<div class="pile-count" id="playerDiscard">0</div></div>
    </div>
  </div>
  
  <div class="modal" id="rowModal">
    <div class="modal-content">
      <div class="modal-title">Выберите ряд</div>
      <div class="modal-cards" id="rowOptions"></div>
      <button class="modal-close" onclick="closeModal()">Отмена</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let gameState = {
      faction: localStorage.getItem('selectedFaction') || 'knights',
      playerHand: [], playerDeck: [], playerDiscard: [],
      playerField: { left: [], right: [] },
      oppHand: [], oppDeck: [], oppDiscard: [],
      oppField: { left: [], right: [] },
      playerScore: 0, oppScore: 0,
      playerPass: false, oppPass: false,
      round: 1, leaderUsed: false,
      currentPlayer: 'player', gameOver: false
    };
    
    document.addEventListener('DOMContentLoaded', () => {
      initGame();
      renderAll();
      showToast('🎮 Ваш ход!');
    });
    
    function initGame() {
      const faction = gameState.faction;
      const saved = localStorage.getItem(`deck_${faction}`);
      if (saved) {
        const ids = JSON.parse(saved);
        gameState.playerDeck = ids.map(id => getCardById(id));
      } else {
        gameState.playerDeck = FACTIONS[faction].cards.slice(0, 25);
      }
      shuffle(gameState.playerDeck);
      gameState.playerHand = gameState.playerDeck.splice(0, 10);
      
      const factions = ['mages', 'cultists', 'dryads'];
      const enemy = FACTIONS[factions[Math.floor(Math.random() * factions.length)]];
      gameState.oppDeck = enemy.cards.slice(0, 25);
      shuffle(gameState.oppDeck);
      gameState.oppHand = gameState.oppDeck.splice(0, 10);
    }
    
    function renderAll() {
      renderHand('player');
      renderHand('opp');
      renderField('player');
      renderField('opp');
      document.getElementById('playerScore').textContent = gameState.playerScore;
      document.getElementById('oppScore').textContent = gameState.oppScore;
      document.getElementById('playerDeck').textContent = gameState.playerDeck.length;
      document.getElementById('playerDiscard').textContent = gameState.playerDiscard.length;
      document.getElementById('oppDeck').textContent = gameState.oppDeck.length;
      document.getElementById('oppDiscard').textContent = gameState.oppDiscard.length;
      if (gameState.leaderUsed) {
        document.getElementById('leaderBtn').disabled = true;
        document.getElementById('leaderBtn').style.opacity = '0.5';
      }
    }
    
    function renderHand(who) {
      const container = document.getElementById(`${who}Hand`);
      const hand = gameState[`${who}Hand`];
      container.innerHTML = '';
      hand.forEach((card, idx) => {
        const el = document.createElement('div');
        if (who === 'opp') {
          el.className = 'card-back';
        } else {
          const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
          el.className = 'hand-card';
          el.innerHTML = `<div class="hand-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div><div class="hand-name">${card.name}</div><div class="hand-power">⚔️${card.power}</div>`;
          el.onclick = () => playCard(idx);
        }
        container.appendChild(el);
      });
    }
    
    function renderField(who) {
      ['left', 'right'].forEach(row => {
        const el = document.getElementById(`${who}${row==='left'?'Left':'Right'}`);
        el.querySelectorAll('.field-card').forEach(c => c.remove());
        gameState[`${who}Field`][row].forEach(card => {
          const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
          const eff = card.effect ? (card.effect.description || 'Есть эффект') : 'Нет эффекта';
          const cardEl = document.createElement('div');
          cardEl.className = 'field-card';
          cardEl.innerHTML = `<div class="card-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div><div class="card-name">${card.name}</div><div class="card-power">⚔️${card.power}</div><div class="card-stats"><span>🛡️${card.armor}</span><span>❤️${card.health}</span></div><div style="font-size:7px;color:#888;text-align:center;border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;">${eff.substring(0,25)}${eff.length>25?'...':''}</div>`;
          el.appendChild(cardEl);
        });
      });
    }
    
    function playCard(idx) {
      if (gameState.currentPlayer !== 'player' || gameState.gameOver) { showToast('Не ваш ход!'); return; }
      const card = gameState.playerHand[idx];
      const modal = document.getElementById('rowModal');
      const options = document.getElementById('rowOptions');
      options.innerHTML = `<div class="modal-card" onclick="placeCard(${idx},'left')">⬅️ Левый</div><div class="modal-card" onclick="placeCard(${idx},'right')">Правый ➡️</div>`;
      modal.classList.add('active');
    }
    
    function placeCard(idx, row) {
      closeModal();
      if (gameState.playerField[row].length >= 4) { showToast('Ряд заполнен!'); return; }
      const card = gameState.playerHand.splice(idx, 1)[0];
      gameState.playerField[row].push(card);
      if (card.effect) handleEffect(card, row);
      if (card.type === 'special' || card.discardAfterUse) {
        gameState.playerDiscard.push(card);
        gameState.playerField[row].pop();
      }
      calcScore();
      endTurn();
      renderAll();
    }
    
    function handleEffect(card, row) {
      if (!card.effect) return;
      const eff = card.effect;
      if (eff.action === 'damage') {
        const enemies = [...gameState.oppField.left, ...gameState.oppField.right];
        if (enemies[0]) { enemies[0].health = (enemies[0].health||1) - (eff.value||1); showToast(`💥 ${enemies[0].name} получил урон!`); }
      } else if (eff.action === 'heal') {
        const allies = [...gameState.playerField.left, ...gameState.playerField.right];
        if (allies[0]) { allies[0].health = (allies[0].health||0) + (eff.value||2); showToast(`❤️ ${allies[0].name} исцелён!`); }
      } else if (eff.action === 'buff') {
        const allies = gameState.playerField[row].filter(c => c.id !== card.id);
        if (allies[0]) { allies[0][eff.stat||'power'] = (allies[0][eff.stat||'power']||0) + (eff.value||2); showToast(`💪 ${allies[0].name} усилен!`); }
      } else if (eff.action === 'summon' && eff.card) {
        const template = FACTIONS[gameState.faction].cards.find(c => c.id === eff.card);
        if (template && gameState.playerField[row].length < 4) {
          gameState.playerField[row].push({...template});
          showToast('👻 Карта призвана!');
        }
      } else if (eff.action === 'apocalypse_combo') {
        const allCards = [...gameState.playerField.left, ...gameState.playerField.right];
        const names = allCards.map(c => c.name.toLowerCase());
        if (names.includes('смерть') && names.includes('голод') && names.includes('война') && names.includes('чума')) {
          const apocalypse = FACTIONS[gameState.faction].cards.find(c => c.name.toLowerCase() === 'апокалипсис');
          if (apocalypse) {
            const enemies = [...gameState.oppField.left, ...gameState.oppField.right];
            if (enemies[0]) { enemies[0].health = 0; gameState.playerDiscard.push(apocalypse); showToast('🔥 АПОКАЛИПСИС!'); }
          }
        }
      }
    }
    
    function calcScore() {
      gameState.playerScore = [...gameState.playerField.left, ...gameState.playerField.right].reduce((s,c) => s + (c.power||0), 0);
      gameState.oppScore = [...gameState.oppField.left, ...gameState.oppField.right].reduce((s,c) => s + (c.power||0), 0);
    }
    
    function endTurn() {
      if (gameState.gameOver) return;
      gameState.currentPlayer = 'opp';
      document.getElementById('turnIndicator').textContent = 'Ход противника...';
      document.getElementById('turnIndicator').classList.add('show');
      setTimeout(oppTurn, 1500);
    }
    
    function oppTurn() {
      if (gameState.gameOver) return;
      const shouldPass = Math.random() > 0.7 || (gameState.oppField.left.length + gameState.oppField.right.length >= 7);
      if (shouldPass && !gameState.oppPass) {
        gameState.oppPass = true;
        showToast('⏭️ Противник пропустил ход!');
        if (gameState.playerPass) setTimeout(endRound, 1000);
        else { gameState.currentPlayer = 'player'; document.getElementById('turnIndicator').textContent = 'Ваш ход!'; }
      } else if (gameState.oppHand.length > 0) {
        const idx = Math.floor(Math.random() * gameState.oppHand.length);
        const card = gameState.oppHand.splice(idx, 1)[0];
        const row = gameState.oppField.left.length <= gameState.oppField.right.length ? 'left' : 'right';
        if (gameState.oppField[row].length < 4) {
          gameState.oppField[row].push(card);
          if (card.type === 'special' || card.discardAfterUse) { gameState.oppDiscard.push(card); gameState.oppField[row].pop(); }
          calcScore();
          showToast('🤖 Противник сыграл карту');
        }
      }
      renderAll();
      if (!gameState.oppPass) {
        setTimeout(() => { gameState.currentPlayer = 'player'; document.getElementById('turnIndicator').textContent = 'Ваш ход!'; }, 1000);
      }
    }
    
    function pass() {
      if (gameState.playerPass || gameState.gameOver) return;
      gameState.playerPass = true;
      showToast('✅ Вы пропустили ход!');
      if (gameState.oppPass) setTimeout(endRound, 1000);
      else { gameState.currentPlayer = 'opp'; document.getElementById('turnIndicator').textContent = 'Ход противника...'; setTimeout(oppTurn, 1000); }
      renderAll();
    }
    
    function endRound() {
      showToast(`🔄 Раунд ${gameState.round} завершён!`);
      gameState.playerDiscard.push(...gameState.playerField.left, ...gameState.playerField.right);
      gameState.oppDiscard.push(...gameState.oppField.left, ...gameState.oppField.right);
      gameState.playerField.left = []; gameState.playerField.right = [];
      gameState.oppField.left = []; gameState.oppField.right = [];
      const draw = Math.min(2, gameState.playerDeck.length);
      if (draw > 0) gameState.playerHand.push(...gameState.playerDeck.splice(0, draw));
      const oppDraw = Math.min(2, gameState.oppDeck.length);
      if (oppDraw > 0) gameState.oppHand.push(...gameState.oppDeck.splice(0, oppDraw));
      gameState.playerPass = false; gameState.oppPass = false;
      gameState.round++;
      setTimeout(() => {
        if (gameState.round > 3 || (gameState.playerDeck.length === 0 && gameState.oppDeck.length === 0)) endGame();
        else { showToast(`🎮 Раунд ${gameState.round} начался!`); document.getElementById('turnIndicator').textContent = 'Ваш ход!'; renderAll(); }
      }, 2000);
    }
    
    function endGame() {
      gameState.gameOver = true;
      let msg = '', result = '';
      if (gameState.playerScore > gameState.oppScore) { msg = '🏆 ПОБЕДА!'; result = 'win'; showToast('+10 очков рейтинга'); }
      else if (gameState.playerScore < gameState.oppScore) { msg = '💀 ПОРАЖЕНИЕ!'; result = 'loss'; showToast('-5 очков рейтинга'); }
      else { msg = '🤝 НИЧЬЯ!'; result = 'draw'; }
      let rating = parseInt(localStorage.getItem('playerRating') || '0');
      if (result === 'win') rating += 10;
      else if (result === 'loss') rating = Math.max(0, rating - 5);
      localStorage.setItem('playerRating', String(rating));
      alert(`${msg}\n\nВаш счёт: ${gameState.playerScore}\nСчёт противника: ${gameState.oppScore}\n\nРейтинг: ${rating}`);
      setTimeout(() => { window.location.href = 'index.html'; }, 500);
    }
    
    function useLeader() {
      if (gameState.leaderUsed || gameState.gameOver || gameState.currentPlayer !== 'player') { showToast('Способность уже использована!'); return; }
      const faction = gameState.faction;
      const leaderIdx = parseInt(localStorage.getItem('playerLeader') || '0');
      const leader = FACTIONS[faction]?.leaders?.[leaderIdx];
      if (!leader?.ability) { showToast('Способность не найдена'); return; }
      const abil = leader.ability;
      if (abil.type === 'damage') {
        const enemies = [...gameState.oppField.left, ...gameState.oppField.right];
        if (enemies[0]) { enemies[0].health = (enemies[0].health||1) - (abil.value||3); showToast(`💥 ${enemies[0].name} получил урон!`); }
      } else if (abil.type === 'heal') {
        [...gameState.playerField.left, ...gameState.playerField.right].forEach(ally => { ally.health = (ally.health||0) + 5; });
        showToast('❤️ Все карты исцелены!');
      } else if (abil.type === 'copy' || abil.type === 'counter') {
        gameState.playerField.left.forEach(c => { c.power += 2; c.armor += 1; });
        gameState.playerField.right.forEach(c => { c.power += 2; c.armor += 1; });
        showToast('💪 Все карты усилены!');
      }
      gameState.leaderUsed = true;
      renderAll();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function closeModal() { document.getElementById('rowModal').classList.remove('active'); }
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
    function getCardById(id) { for (const fk in FACTIONS) { const card = FACTIONS[fk].cards.find(c => c.id === id); if (card) return { ...card }; } return null; }
  </script>
