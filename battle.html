<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Битва - Карточная Игра</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      color: white; 
      min-height: 100vh;
      padding: 10px;
      padding-bottom: 120px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .score-display { font-size: 18px; font-weight: 700; }
    .score-label { font-size: 11px; color: #888; }
    .opponent-zone {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 10px;
    }
    .leader-avatar {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      background: linear-gradient(135deg, #666, #333);
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .hand-container {
      flex: 1;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      height: 55px;
    }
    .card-back {
      width: 38px;
      height: 52px;
      border-radius: 6px;
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      border: 2px solid #34495e;
      flex-shrink: 0;
    }
    .deck-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 50px;
    }
    .pile {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      position: relative;
    }
    .pile-count {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: #888;
    }
    .battlefield {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0;
      padding: 10px 0;
    }
    .field-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .rows-wrapper {
      display: flex;
      gap: 6px;
    }
    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 85px;
    }
    .row-label {
      font-size: 9px;
      text-align: center;
      color: #666;
      margin-bottom: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .field-card {
      width: 75px;
      min-height: 100px;
      border-radius: 8px;
      background: #2c3e50;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      flex-direction: column;
      padding: 6px;
      font-size: 8px;
    }
    .field-card-type {
      font-size: 7px;
      padding: 2px 4px;
      border-radius: 3px;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .field-card-type.white { background: #fff; color: #333; }
    .field-card-type.gray { background: #95a5a6; color: #fff; }
    .field-card-type.purple { background: #a233ff; color: #fff; }
    .field-card-type.gold { background: #f1c40f; color: #333; }
    .field-card-type.special { background: #e74c3c; color: #fff; }
    .field-card-name {
      font-size: 9px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
      min-height: 22px;
    }
    .field-card-power {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin: 4px 0;
    }
    .field-card-stats {
      display: flex;
      gap: 4px;
      justify-content: center;
      font-size: 9px;
      margin-bottom: 4px;
    }
    .field-card-effect {
      font-size: 7px;
      color: #888;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: rgba(22, 33, 62, 0.98);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .action-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-pass { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-leader { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #333; }
    .action-btn:active { transform: scale(0.95); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .player-zone {
      display: flex;
      align-items: flex-end;
      margin-top: 10px;
      gap: 10px;
    }
    .leader-btn {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: 2px solid #3498db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      position: relative;
    }
    .leader-btn::after {
      content: '⚡';
      position: absolute;
      top: -4px;
      right: -4px;
      background: #f1c40f;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player-hand {
      flex: 1;
      display: flex;
      gap: 5px;
      overflow-x: auto;
      height: 80px;
    }
    .hand-card {
      width: 50px;
      height: 68px;
      border-radius: 6px;
      background: #2c3e50;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 8px;
    }
    .hand-card:active { transform: translateY(-5px); }
    .hand-card-type {
      font-size: 6px;
      padding: 2px 3px;
      border-radius: 2px;
      margin-bottom: 2px;
    }
    .hand-card-name {
      font-size: 7px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .hand-card-power {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1a2e;
      border-radius: 15px;
      padding: 25px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 15px;
      text-align: center;
      color: #3498db;
    }
    .modal-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }
    .modal-card {
      padding: 8px;
      border-radius: 8px;
      background: #2c3e50;
      border: 2px solid transparent;
      cursor: pointer;
      text-align: center;
      font-size: 11px;
    }
    .modal-card:active { background: rgba(52, 152, 219, 0.3); }
    .modal-close {
      margin-top: 15px;
      padding: 12px;
      background: #e74c3c;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      padding: 12px 20px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 85%;
      text-align: center;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .turn-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(52, 152, 219, 0.9);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 100;
      display: none;
    }
    .turn-indicator.show { display: block; }
    @media (max-width: 480px) {
      .field-card { width: 70px; min-height: 95px; }
      .row { min-width: 75px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>
      <div class="score-label">ПРОТИВНИК</div>
      <div class="score-display" id="opponentScore">0</div>
    </div>
    <div style="text-align: right;">
      <div class="score-label">ИГРОК</div>
      <div class="score-display" id="playerScore">0</div>
    </div>
  </div>
  
  <div class="turn-indicator" id="turnIndicator">Ваш ход</div>
  
  <!-- Opponent Zone -->
  <div class="opponent-zone">
    <div class="leader-avatar" id="opponentLeader">🤖</div>
    <div class="hand-container" id="opponentHand"></div>
    <div class="deck-info">
      <div class="pile" style="position: relative;">
        📚
        <div class="pile-count" id="opponentDeckCount">0</div>
      </div>
      <div class="pile" style="position: relative;">
        🗑️
        <div class="pile-count" id="opponentDiscardCount">0</div>
      </div>
    </div>
  </div>
  
  <!-- Opponent Field -->
  <div class="battlefield">
    <div class="field-section" id="opponentField">
      <div class="rows-wrapper">
        <div class="row" id="oppLeftRow">
          <div class="row-label">Левый</div>
        </div>
        <div class="row" id="oppRightRow">
          <div class="row-label">Правый</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Action Bar -->
  <div class="action-bar">
    <button class="action-btn btn-leader" id="leaderBtn" onclick="useLeaderAbility()">
      👑 Лидер
    </button>
    <button class="action-btn btn-pass" id="passBtn" onclick="passTurn()">
      PASS
    </button>
  </div>
  
  <!-- Player Field -->
  <div class="battlefield">
    <div class="field-section" id="playerField">
      <div class="rows-wrapper">
        <div class="row" id="playerLeftRow">
          <div class="row-label">Левый</div>
        </div>
        <div class="row" id="playerRightRow">
          <div class="row-label">Правый</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Player Zone -->
  <div class="player-zone">
    <div class="leader-btn" id="playerLeader" onclick="useLeaderAbility()">👑</div>
    <div class="player-hand" id="playerHand"></div>
    <div class="deck-info">
      <div class="pile" style="position: relative;">
        📚
        <div class="pile-count" id="playerDeckCount">0</div>
      </div>
      <div class="pile" style="position: relative;">
        🗑️
        <div class="pile-count" id="playerDiscardCount">0</div>
      </div>
    </div>
  </div>
  
  <!-- Row Selection Modal -->
  <div class="modal" id="rowModal">
    <div class="modal-content">
      <div class="modal-title">Выберите ряд</div>
      <div class="modal-cards" id="rowOptions"></div>
      <button class="modal-close" onclick="closeModal()">Отмена</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    // === GAME STATE ===
    let gameState = {
      faction: localStorage.getItem('selectedFaction') || 'knights',
      leader: parseInt(localStorage.getItem('playerLeader') || '0'),
      playerHand: [],
      playerDeck: [],
      playerDiscard: [],
      playerField: { left: [], right: [] },
      opponentHand: [],
      opponentDeck: [],
      opponentDiscard: [],
      opponentField: { left: [], right: [] },
      playerScore: 0,
      opponentScore: 0,
      playerPass: false,
      opponentPass: false,
      round: 1,
      leaderUsed: false,
      currentPlayer: 'player',
      gameOver: false
    };
    
    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      initGame();
      renderAll();
      showToast('🎮 Ваш ход!');
    });
    
    function initGame() {
      // Load player deck
      const faction = gameState.faction;
      const savedDeck = localStorage.getItem(`deck_${faction}`);
      
      if (savedDeck) {
        const cardIds = JSON.parse(savedDeck);
        gameState.playerDeck = cardIds.map(id => getCardById(id));
      } else {
        const factionData = FACTIONS[faction];
        gameState.playerDeck = factionData.cards.slice(0, 25);
      }
      
      shuffle(gameState.playerDeck);
      gameState.playerHand = gameState.playerDeck.splice(0, 10);
      
      // Init opponent (random faction)
      const factions = ['mages', 'cultists', 'dryads'];
      const enemyFaction = factions[Math.floor(Math.random() * factions.length)];
      const enemyData = FACTIONS[enemyFaction];
      gameState.opponentDeck = enemyData.cards.slice(0, 25);
      shuffle(gameState.opponentDeck);
      gameState.opponentHand = gameState.opponentDeck.splice(0, 10);
    }
    
    // === RENDER ===
    function renderAll() {
      renderHand('player');
      renderHand('opponent');
      renderField('player');
      renderField('opponent');
      renderScores();
      renderDeckCounts();
      renderLeader();
    }
    
    function renderHand(who) {
      const container = document.getElementById(`${who}Hand`);
      const hand = gameState[`${who}Hand`];
      container.innerHTML = '';
      
      hand.forEach((card, idx) => {
        const el = document.createElement('div');
        if (who === 'opponent') {
          el.className = 'card-back';
        } else {
          const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
          el.className = 'hand-card';
          el.innerHTML = `
            <div class="hand-card-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div>
            <div class="hand-card-name">${card.name}</div>
            <div class="hand-card-power">⚔️${card.power}</div>
          `;
          el.onclick = () => playCard(idx);
        }
        container.appendChild(el);
      });
    }
    
    function renderField(who) {
      ['left', 'right'].forEach(row => {
        const el = document.getElementById(`${who}${row==='left'?'Left':'Right'}Row`);
        // Remove existing cards
        el.querySelectorAll('.field-card').forEach(c => c.remove());
        
        const field = gameState[`${who}Field`][row];
        field.forEach((card, idx) => {
          const cardEl = createFieldCard(card, who, row);
          el.appendChild(cardEl);
        });
      });
    }
    
    function createFieldCard(card, who, row) {
      const el = document.createElement('div');
      el.className = 'field-card';
      el.style.borderColor = who === 'player' ? FACTIONS[gameState.faction].color : '#666';
      
      const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
      const eff = card.effect ? (card.effect.description || 'Есть эффект') : 'Нет эффекта';
      
      el.innerHTML = `
        <div class="field-card-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div>
        <div class="field-card-name">${card.name}</div>
        <div class="field-card-power">⚔️${card.power}</div>
        <div class="field-card-stats">
          <span>🛡️${card.armor}</span>
          <span>❤️${card.health}</span>
        </div>
        <div class="field-card-effect">${eff.substring(0,30)}${eff.length>30?'...':''}</div>
      `;
      
      return el;
    }
    
    function renderScores() {
      document.getElementById('playerScore').textContent = gameState.playerScore;
      document.getElementById('opponentScore').textContent = gameState.opponentScore;
    }
    
    function renderDeckCounts() {
      document.getElementById('playerDeckCount').textContent = gameState.playerDeck.length;
      document.getElementById('playerDiscardCount').textContent = gameState.playerDiscard.length;
      document.getElementById('opponentDeckCount').textContent = gameState.opponentDeck.length;
      document.getElementById('opponentDiscardCount').textContent = gameState.opponentDiscard.length;
    }
    
    function renderLeader() {
      const btn = document.getElementById('leaderBtn');
      const leaderEl = document.getElementById('playerLeader');
      if (gameState.leaderUsed) {
        btn.disabled = true;
        btn.style.opacity = '0.5';
        leaderEl.style.opacity = '0.5';
      }
    }
    
    // === GAME LOGIC ===
    function playCard(handIndex) {
      if (gameState.currentPlayer !== 'player' || gameState.gameOver) {
        showToast('Не ваш ход!');
        return;
      }
      
      const card = gameState.playerHand[handIndex];
      
      // Show row selection
      const modal = document.getElementById('rowModal');
      const options = document.getElementById('rowOptions');
      options.innerHTML = `
        <div class="modal-card" onclick="placeCard(${handIndex}, 'left')">⬅️ Левый ряд</div>
        <div class="modal-card" onclick="placeCard(${handIndex}, 'right')">Правый ряд ➡️</div>
      `;
      modal.classList.add('active');
    }
    
    function placeCard(handIndex, row) {
      closeModal();
      
      if (gameState.playerField[row].length >= 4) {
        showToast('Ряд заполнен!');
        return;
      }
      
      const card = gameState.playerHand.splice(handIndex, 1)[0];
      gameState.playerField[row].push(card);
      
      // Handle card effects
      if (card.effect) {
        handleCardEffect(card, row);
      }
      
      // Special cards go to discard
      if (card.type === 'special' || card.discardAfterUse) {
        gameState.playerDiscard.push(card);
        gameState.playerField[row].pop();
      }
      
      calculateScore();
      endTurn();
      renderAll();
    }
    
    function handleCardEffect(card, row) {
      if (!card.effect) return;
      const eff = card.effect;
      
      // Damage
      if (eff.action === 'damage') {
        const enemies = [...gameState.opponentField.left, ...gameState.opponentField.right];
        if (enemies[0]) {
          enemies[0].health = (enemies[0].health || 1) - (eff.value || 1);
          showToast(`💥 ${enemies[0].name} получил урон!`);
        }
      }
      
      // Heal
      else if (eff.action === 'heal') {
        const allies = [...gameState.playerField.left, ...gameState.playerField.right];
        if (allies[0]) {
          allies[0].health = (allies[0].health || 0) + (eff.value || 2);
          showToast(`❤️ ${allies[0].name} исцелён!`);
        }
      }
      
      // Buff
      else if (eff.action === 'buff') {
        const allies = gameState.playerField[row].filter(c => c.id !== card.id);
        if (allies[0]) {
          allies[0][eff.stat || 'power'] = (allies[0][eff.stat || 'power'] || 0) + (eff.value || 2);
          showToast(`💪 ${allies[0].name} усилен!`);
        }
      }
      
      // Summon
      else if (eff.action === 'summon' && eff.card) {
        const faction = FACTIONS[gameState.faction];
        const template = faction.cards.find(c => c.id === eff.card);
        if (template && gameState.playerField[row].length < 4) {
          gameState.playerField[row].push({...template});
          showToast('👻 Карта призвана!');
        }
      }
      
      // Apocalypse Combo
      else if (eff.action === 'apocalypse_combo') {
        const allCards = [...gameState.playerField.left, ...gameState.playerField.right];
        const names = allCards.map(c => c.name.toLowerCase());
        if (names.includes('смерть') && names.includes('голод') && 
            names.includes('война') && names.includes('чума')) {
          const faction = FACTIONS[gameState.faction];
          const apocalypse = faction.cards.find(c => c.name.toLowerCase() === 'апокалипсис');
          if (apocalypse) {
            const enemies = [...gameState.opponentField.left, ...gameState.opponentField.right];
            if (enemies[0]) {
              enemies[0].health = 0;
              gameState.playerDiscard.push(apocalypse);
              showToast('🔥 АПОКАЛИПСИС! Карта уничтожена!');
            }
          }
        }
      }
    }
    
    function calculateScore() {
      gameState.playerScore = [
        ...gameState.playerField.left,
        ...gameState.playerField.right
      ].reduce((sum, c) => sum + (c.power || 0), 0);
      
      gameState.opponentScore = [
        ...gameState.opponentField.left,
        ...gameState.opponentField.right
      ].reduce((sum, c) => sum + (c.power || 0), 0);
    }
    
    function endTurn() {
      if (gameState.gameOver) return;
      gameState.currentPlayer = 'opponent';
      document.getElementById('turnIndicator').textContent = 'Ход противника...';
      document.getElementById('turnIndicator').classList.add('show');
      
      setTimeout(opponentTurn, 1500);
    }
    
    function opponentTurn() {
      if (gameState.gameOver) return;
      
      // Simple AI: play random card or pass
      const shouldPass = Math.random() > 0.7 || 
        (gameState.opponentField.left.length + gameState.opponentField.right.length >= 7);
      
      if (shouldPass && !gameState.opponentPass) {
        gameState.opponentPass = true;
        showToast('⏭️ Противник пропустил ход!');
        
        if (gameState.playerPass) {
          setTimeout(endRound, 1000);
        } else {
          gameState.currentPlayer = 'player';
          document.getElementById('turnIndicator').textContent = 'Ваш ход!';
        }
      } else if (gameState.opponentHand.length > 0) {
        const idx = Math.floor(Math.random() * gameState.opponentHand.length);
        const card = gameState.opponentHand.splice(idx, 1)[0];
        const row = gameState.opponentField.left.length <= gameState.opponentField.right.length ? 'left' : 'right';
        
        if (gameState.opponentField[row].length < 4) {
          gameState.opponentField[row].push(card);
          
          if (card.type === 'special' || card.discardAfterUse) {
            gameState.opponentDiscard.push(card);
            gameState.opponentField[row].pop();
          }
          
          showToast('🤖 Противник сыграл карту');
        }
      }
      
      calculateScore();
      renderAll();
      
      if (!gameState.opponentPass) {
        setTimeout(() => {
          gameState.currentPlayer = 'player';
          document.getElementById('turnIndicator').textContent = 'Ваш ход!';
        }, 1000);
      }
    }
    
    function passTurn() {
      if (gameState.playerPass || gameState.gameOver) return;
      
      gameState.playerPass = true;
      showToast('✅ Вы пропустили ход!');
      
      if (gameState.opponentPass) {
        setTimeout(endRound, 1000);
      } else {
        gameState.currentPlayer = 'opponent';
        document.getElementById('turnIndicator').textContent = 'Ход противника...';
        setTimeout(opponentTurn, 1000);
      }
      
      renderAll();
    }
    
    function endRound() {
      showToast(`🔄 Раунд ${gameState.round} завершён!`);
      
      // All cards to discard
      gameState.playerDiscard.push(...gameState.playerField.left, ...gameState.playerField.right);
      gameState.opponentDiscard.push(...gameState.opponentField.left, ...gameState.opponentField.right);
      
      gameState.playerField.left = [];
      gameState.playerField.right = [];
      gameState.opponentField.left = [];
      gameState.opponentField.right = [];
      
      // Draw cards
      const draw = Math.min(2, gameState.playerDeck.length);
      if (draw > 0) gameState.playerHand.push(...gameState.playerDeck.splice(0, draw));
      
      const oppDraw = Math.min(2, gameState.opponentDeck.length);
      if (oppDraw > 0) gameState.opponentHand.push(...gameState.opponentDeck.splice(0, oppDraw));
      
      gameState.playerPass = false;
      gameState.opponentPass = false;
      gameState.round++;
      
      setTimeout(() => {
        if (gameState.round > 3 || (gameState.playerDeck.length === 0 && gameState.opponentDeck.length === 0)) {
          endGame();
        } else {
          showToast(`🎮 Раунд ${gameState.round} начался!`);
          document.getElementById('turnIndicator').textContent = 'Ваш ход!';
          renderAll();
        }
      }, 2000);
    }
    
    function endGame() {
      gameState.gameOver = true;
      let msg = '', result = '';
      
      if (gameState.playerScore > gameState.opponentScore) {
        msg = '🏆 ПОБЕДА!';
        result = 'win';
        showToast('+10 очков рейтинга');
      } else if (gameState.playerScore < gameState.opponentScore) {
        msg = '💀 ПОРАЖЕНИЕ!';
        result = 'loss';
        showToast('-5 очков рейтинга');
      } else {
        msg = '🤝 НИЧЬЯ!';
        result = 'draw';
      }
      
      // Update rating
      let rating = parseInt(localStorage.getItem('playerRating') || '0');
      if (result === 'win') rating += 10;
      else if (result === 'loss') rating = Math.max(0, rating - 5);
      localStorage.setItem('playerRating', String(rating));
      
      alert(`${msg}\n\nВаш счёт: ${gameState.playerScore}\nСчёт противника: ${gameState.opponentScore}\n\nРейтинг: ${rating}`);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 500);
    }
    
    function useLeaderAbility() {
      if (gameState.leaderUsed || gameState.gameOver) {
        showToast('Способность уже использована!');
        return;
      }
      
      const faction = gameState.faction;
      const leaderIdx = gameState.leader;
      const leader = FACTIONS[faction]?.leaders?.[leaderIdx];
      
      if (!leader?.ability) {
        showToast('Способность не найдена');
        return;
      }
      
      const abil = leader.ability;
      
      // Handle leader ability
      if (abil.type === 'damage') {
        const enemies = [...gameState.opponentField.left, ...gameState.opponentField.right];
        if (enemies[0]) {
          enemies[0].health = (enemies[0].health || 1) - (abil.value || 3);
          showToast(`💥 ${enemies[0].name} получил урон от лидера!`);
        }
      }
      else if (abil.type === 'heal') {
        const allies = [...gameState.playerField.left, ...gameState.playerField.right];
        allies.forEach(ally => {
          ally.health = (ally.health || 0) + 5;
        });
        showToast('❤️ Все карты исцелены!');
      }
      else if (abil.type === 'copy' || abil.type === 'counter') {
        gameState.playerField.left.forEach(c => { c.power += 2; c.armor += 1; });
        gameState.playerField.right.forEach(c => { c.power += 2; c.armor += 1; });
        showToast('💪 Все карты усилены!');
      }
      
      gameState.leaderUsed = true;
      renderLeader();
      renderAll();
      
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function closeModal() {
      document.getElementById('rowModal').classList.remove('active');
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    
    function getCardById(id) {
      for (const fk in FACTIONS) {
        const card = FACTIONS[fk].cards.find(c => c.id === id);
        if (card) return { ...card, faction: fk };
      }
      return null;
    }
  </script>
