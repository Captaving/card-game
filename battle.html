<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Битва с Ботом</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 100px; min-height: 100vh; }
    
    /* Верхняя панель */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    .coin-container { display: flex; gap: 5px; }
    .coin { width: 25px; height: 25px; background: gold; border-radius: 50%; border: 2px solid orange; display: flex; align-items: center; justify-content: center; font-size: 14px; color: black; font-weight: bold; opacity: 0.3; }
    .coin.active { opacity: 1; box-shadow: 0 0 10px gold; }
    
    /* Поле боя */
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .row { display: flex; gap: 5px; justify-content: center; min-height: 90px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 5px; }
    .slot { width: 80px; height: 85px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; }
    
    /* Карта */
    .card { width: 76px; height: 81px; background: #2c3e50; border-radius: 5px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; position: relative; cursor: pointer; }
    .card.power-0 { opacity: 0.5; filter: grayscale(1); }
    .card .power { font-size: 24px; font-weight: 800; color: white; text-shadow: 0 2px 4px black; }
    .card .name { font-size: 9px; text-align: center; line-height: 1.1; padding: 0 2px; }
    .card .type { position: absolute; top: 2px; right: 2px; font-size: 8px; padding: 1px 3px; background: rgba(0,0,0,0.5); border-radius: 3px; }
    
    /* Рука */
    .hand { position: fixed; bottom: 0; left: 0; right: 0; height: 110px; background: rgba(0,0,0,0.9); display: flex; overflow-x: auto; padding: 10px; gap: 8px; align-items: center; z-index: 100; }
    .hand .card { flex-shrink: 0; width: 70px; height: 90px; border: 2px solid white; }
    .hand .card.selected { border-color: #f1c40f; transform: translateY(-10px); }
    
    /* Муллиган */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .mulligan-cards { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; max-width: 400px; }
    .btn-start { padding: 15px 40px; background: #2ecc71; border: none; border-radius: 30px; color: white; font-size: 18px; font-weight: bold; }

    /* Кнопки управления */
    .controls { position: fixed; bottom: 115px; right: 10px; display: flex; gap: 10px; z-index: 99; }
    .ctrl-btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; color: white; }
    .btn-pass { background: #e74c3c; }
    
    /* Сообщение */
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; z-index: 3000; display: none; text-align: center; pointer-events: none; }
  </style>
</head>
<body>

  <!-- Верх -->
  <div class="top-bar">
    <div>
      <div style="font-size:12px; color:#aaa;">БОТ</div>
      <div class="coin-container" id="botCoins"><div class="coin">1</div><div class="coin">2</div></div>
      <div style="font-size:20px; font-weight:bold;" id="botScore">0</div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:14px; color:#f1c40f;" id="roundDisplay">Раунд 1</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:12px; color:#aaa;">ВЫ</div>
      <div class="coin-container" id="playerCoins"><div class="coin">1</div><div class="coin">2</div></div>
      <div style="font-size:20px; font-weight:bold;" id="playerScore">0</div>
    </div>
  </div>

  <!-- Поле -->
  <div class="field">
    <div class="row" id="botFieldLeft"></div>
    <div class="row" id="botFieldRight"></div>
  </div>
  
  <div style="height: 20px;"></div> <!-- Разделитель -->

  <div class="field">
    <div class="row" id="playerFieldLeft"></div>
    <div class="row" id="playerFieldRight"></div>
  </div>

  <!-- Управление -->
  <div class="controls">
    <button class="ctrl-btn btn-pass" onclick="passTurn()">PASS</button>
  </div>

  <!-- Рука -->
  <div class="hand" id="handContainer"></div>

  <!-- Муллиган -->
  <div class="overlay" id="mulliganOverlay">
    <h2>Муллиган</h2>
    <p style="color:#aaa; margin-bottom:20px;">Выберите до 3 карт для замены</p>
    <div class="mulligan-cards" id="mulliganList"></div>
    <button class="btn-start" onclick="endMulligan()">НАЧАТЬ БОЙ</button>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  // Состояние игры
  let state = {
    faction: localStorage.getItem('selectedFaction') || 'knights',
    deck: [],
    hand: [],
    field: { left: [], right: [] },
    botField: { left: [], right: [] },
    botHand: [],
    coins: { player: 0, bot: 0 },
    round: 1,
    turn: 'player', // player | bot
    gameOver: false
  };

  // Инициализация
  window.onload = () => {
    loadDeck();
    drawCards(10); // 10 стартовых карт
    showMulligan();
    initBot();
  };

  function loadDeck() {
    const saved = localStorage.getItem(`deck_${state.faction}`);
    if (saved) {
      const ids = JSON.parse(saved);
      // Копируем объекты карт, чтобы не мутировать базу
      state.deck = ids.map(id => {
        for(let f in FACTIONS) {
          const c = FACTIONS[f].cards.find(x => x.id === id);
          if(c) return {...c, currentPower: c.power};
        }
        return null;
      }).filter(c => c);
    } else {
      // Дефолтная колода
      state.deck = FACTIONS[state.faction].cards.slice(0, 10).map(c => ({...c, currentPower: c.power}));
    }
    shuffle(state.deck);
  }

  function drawCards(count) {
    for(let i=0; i<count; i++) {
      if(state.deck.length > 0 && state.hand.length < 10) {
        state.hand.push(state.deck.pop());
      }
    }
  }

  function showMulligan() {
    const list = document.getElementById('mulliganList');
    list.innerHTML = '';
    state.hand.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<div class="power">${card.currentPower}</div><div class="name">${card.name}</div>`;
      el.onclick = () => {
        el.classList.toggle('selected');
        el.dataset.selected = el.classList.contains('selected');
      };
      el.dataset.idx = idx;
      list.appendChild(el);
    });
  }

  function endMulligan() {
    const selected = Array.from(document.querySelectorAll('#mulliganList .card.selected'));
    const indices = selected.map(el => parseInt(el.dataset.idx)).sort((a,b) => b-a); // С конца чтобы не сбивать индексы
    
    indices.forEach(idx => {
      state.hand.splice(idx, 1); // Удаляем выбранную
      if(state.deck.length > 0) state.hand.push(state.deck.pop()); // Добавляем новую
    });
    
    document.getElementById('mulliganOverlay').style.display = 'none';
    render();
    showToast("Ваш ход!");
  }

  function initBot() {
    // Бот берет рандомные карты из той же фракции для простоты
    const pool = FACTIONS[state.faction].cards;
    for(let i=0; i<10; i++) {
      const randCard = pool[Math.floor(Math.random() * pool.length)];
      state.botHand.push({...randCard, currentPower: randCard.power});
    }
  }

  // Логика хода
  function playCard(handIdx, row) {
    if(state.turn !== 'player' || state.gameOver) return;
    
    const card = state.hand[handIdx];
    
    // Проверка ряда
    if(card.row !== 'any' && card.row !== row) {
      showToast(`Эта карта только для ${card.row === 'left' ? 'левого' : 'правого'} ряда!`);
      return;
    }
    
    if(state.field[row].length >= 2) {
      showToast("Ряд переполнен!");
      return;
    }

    // Размещение
    state.field[row].push(card);
    state.hand.splice(handIdx, 1);
    
    // Эффект при размещении
    applyEffect(card, 'player', row);
    
    render();
    
    // Конец хода игрока -> Ход бота
    state.turn = 'bot';
    render();
    setTimeout(botTurn, 1500);
  }

  function botTurn() {
    if(state.gameOver) return;
    
    // Бот играет карту если может
    if(state.botHand.length > 0) {
      // Простая логика: ищет карту, которая влезает в ряд
      const validCards = state.botHand.filter(c => 
        (c.row === 'any' || c.row === 'left') && state.botField.left.length < 2
        || (c.row === 'any' || c.row === 'right') && state.botField.right.length < 2
      );

      if(validCards.length > 0) {
        const card = validCards[0]; // Берет первую подходящую
        const handIdx = state.botHand.indexOf(card);
        const row = (card.row === 'left' || (card.row === 'any' && state.botField.left.length < state.botField.right.length)) ? 'left' : 'right';
        
        state.botField[row].push(card);
        state.botHand.splice(handIdx, 1);
        applyEffect(card, 'bot', row);
      }
    }

    state.turn = 'player';
    render();
    
    // Проверка конца раунда (если руки пусты)
    if(state.hand.length === 0 && state.botHand.length === 0) {
      setTimeout(endRound, 1000);
    }
  }

  function passTurn() {
    if(state.turn !== 'player') return;
    state.turn = 'bot';
    render();
    setTimeout(botTurn, 1000);
  }

  function applyEffect(card, who, row) {
    if(!card.effect) return;
    
    // УРОН
    if(card.effect.action === 'damage') {
      const targets = who === 'player' ? state.botField : state.field; // Цель - враг
      // Находим случайную цель или все (для простоты берем первую живую)
      let target = null;
      if(targets.left.length > 0 && targets.left[0].currentPower > 0) target = targets.left[0];
      else if(targets.right.length > 0 && targets.right[0].currentPower > 0) target = targets.right[0];
      
      if(target) {
        target.currentPower -= card.effect.value;
        checkDeaths();
        showToast(`💥 ${card.name} наносит ${card.effect.value} урона!`);
      }
    }
    
    // БУФФ (Сила)
    if(card.effect.action === 'buff') {
      const targets = who === 'player' ? state.field : state.botField; // Цель - свои
      // Бафаем весь ряд
      targets[row].forEach(c => {
        if(c.id !== card.id) { // Не бафаем себя (если не указано иное)
           c.currentPower += card.effect.value;
        }
      });
      showToast(`💪 Бафф +${card.effect.value} силы!`);
    }
  }

  function checkDeaths() {
    ['left', 'right'].forEach(r => {
      state.field[r] = state.field[r].filter(c => c.currentPower > 0);
      state.botField[r] = state.botField[r].filter(c => c.currentPower > 0);
    });
  }

  function endRound() {
    // Подсчет очков (сумма силы на поле)
    let pScore = 0, bScore = 0;
    ['left', 'right'].forEach(r => {
      state.field[r].forEach(c => pScore += c.currentPower);
      state.botField[r].forEach(c => bScore += c.currentPower);
    });

    document.getElementById('playerScore').textContent = pScore;
    document.getElementById('botScore').textContent = bScore;

    let msg = "";
    if(pScore > bScore) {
      state.coins.player++;
      msg = "🏆 Вы выиграли раунд!";
    } else if (bScore > pScore) {
      state.coins.bot++;
      msg = "💀 Бот выиграл раунд!";
    } else {
      msg = "🤝 Ничья!";
    }
    
    showToast(msg);
    updateCoinsUI();

    // Проверка победы в матче (2 монеты)
    if(state.coins.player >= 2) {
      setTimeout(() => alert("ПОБЕДА В МАТЧЕ!"), 500);
      state.gameOver = true;
      return;
    }
    if(state.coins.bot >= 2) {
      setTimeout(() => alert("ПОРАЖЕНИЕ В МАТЧЕ!"), 500);
      state.gameOver = true;
      return;
    }

    // Подготовка к след раунду
    state.round++;
    document.getElementById('roundDisplay').textContent = `Раунд ${state.round}`;
    
    // Очистка поля (карты уходят в отбой, кроме тех что persist)
    // Для упрощения: просто чистим поле
    state.field = { left: [], right: [] };
    state.botField = { left: [], right: [] };
    
    // Добор карт (например до 5)
    drawCards(3);
    // Бот тоже добирает
    const pool = FACTIONS[state.faction].cards;
    for(let i=0; i<3; i++) state.botHand.push({...pool[Math.floor(Math.random()*pool.length)], currentPower: pool[0].power});

    state.turn = 'player';
    state.playerScore = 0; state.botScore = 0;
    document.getElementById('playerScore').textContent = 0;
    document.getElementById('botScore').textContent = 0;
    render();
    showToast(`Начинается раунд ${state.round}!`);
  }

  // Рендер
  function render() {
    // Отрисовка полей
    renderRow('playerFieldLeft', state.field.left);
    renderRow('playerFieldRight', state.field.right);
    renderRow('botFieldLeft', state.botField.left);
    renderRow('botFieldRight', state.botField.right);
    
    // Отрисовка руки
    const handCont = document.getElementById('handContainer');
    handCont.innerHTML = '';
    state.hand.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<div class="type">${card.type}</div><div class="power">${card.currentPower}</div><div class="name">${card.name}</div>`;
      el.onclick = () => playCard(idx, 'left'); // По дефолту влево, если влезет
      // Тут можно добавить выбор ряда через модалку, но для краткости авто-выбор
      handCont.appendChild(el);
    });
  }

  function renderRow(id, cards) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for(let i=0; i<2; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      if(cards[i]) {
        const c = document.createElement('div');
        c.className = `card ${cards[i].currentPower <= 0 ? 'power-0' : ''}`;
        c.innerHTML = `<div class="type">${cards[i].type}</div><div class="power">${cards[i].currentPower}</div><div class="name">${cards[i].name}</div>`;
        slot.appendChild(c);
      }
      el.appendChild(slot);
    }
  }

  function updateCoinsUI() {
    const pCoins = document.querySelectorAll('#playerCoins .coin');
    const bCoins = document.querySelectorAll('#botCoins .coin');
    pCoins.forEach((c, i) => c.classList.toggle('active', i < state.coins.player));
    bCoins.forEach((c, i) => c.classList.toggle('active', i < state.coins.bot));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } }
</script>
</body>
</html>
