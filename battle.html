<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Битва с ботом</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 10px;
      padding-bottom: 140px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .score { font-size: 18px; font-weight: 700; }
    .score-label { font-size: 11px; color: #888; }
    .zone { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .avatar {
      width: 45px; height: 45px; border-radius: 8px;
      background: linear-gradient(135deg, #666, #333);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
    }
    .hand { flex: 1; display: flex; gap: 4px; overflow-x: auto; height: 55px; }
    .card-back {
      width: 38px; height: 52px; border-radius: 6px;
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      border: 2px solid #34495e; flex-shrink: 0;
    }
    .deck-info { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
    .pile {
      width: 45px; height: 45px; border-radius: 8px;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; position: relative;
    }
    .pile-count {
      position: absolute; bottom: -16px; left: 50%;
      transform: translateX(-50%); font-size: 11px; color: #888;
    }
    .field { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
    .field-section { display: flex; flex-direction: column; gap: 8px; }
    .rows { display: flex; gap: 6px; }
    .row {
      display: flex; flex-direction: column; gap: 6px; padding: 8px;
      border-radius: 8px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1); min-width: 85px;
    }
    .row-label { font-size: 9px; text-align: center; color: #666; margin-bottom: 3px; }
    .field-card {
      width: 75px; min-height: 100px; border-radius: 8px;
      background: #2c3e50; border: 2px solid rgba(255,255,255,0.3);
      display: flex; flex-direction: column; padding: 6px; font-size: 8px;
      cursor: pointer;
    }
    .field-card:active { transform: scale(0.95); }
    .card-type {
      font-size: 7px; padding: 2px 4px; border-radius: 3px;
      text-align: center; font-weight: 700; margin-bottom: 4px;
    }
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    .card-name { font-size: 9px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .card-power { font-size: 16px; font-weight: 700; text-align: center; margin: 4px 0; }
    .card-stats { display: flex; gap: 4px; justify-content: center; font-size: 9px; }
    .leader-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      background: rgba(52, 152, 219, 0.2);
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .leader-avatar {
      width: 40px; height: 40px; border-radius: 8px;
      background: linear-gradient(135deg, #f1c40f, #f39c12);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; position: relative;
    }
    .coin {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #f1c40f;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 15px;
      background: rgba(22, 33, 62, 0.98); border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; gap: 10px; justify-content: center;
    }
    .btn {
      padding: 15px 30px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn:active { transform: scale(0.95); }
    .btn-pass { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-leader { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #333; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .player-zone { display: flex; gap: 10px; align-items: flex-end; margin-top: 10px; }
    .leader-btn {
      width: 45px; height: 45px; border-radius: 8px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: 2px solid #3498db; display: flex;
      align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; position: relative;
    }
    .player-hand {
      flex: 1; display: flex; gap: 5px; overflow-x: auto; height: 80px;
    }
    .hand-card {
      width: 50px; height: 68px; border-radius: 6px;
      background: #2c3e50; border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      font-size: 8px;
    }
    .hand-card:active { transform: translateY(-5px); }
    .hand-type { font-size: 6px; padding: 2px 3px; border-radius: 2px; margin-bottom: 2px; }
    .hand-name { font-size: 7px; text-align: center; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .hand-power { font-size: 12px; font-weight: 700; color: #fff; margin-top: 2px; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1a2e; border-radius: 15px; padding: 25px;
      max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; text-align: center; color: #3498db; }
    .modal-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .modal-card {
      padding: 12px; border-radius: 8px; background: #2c3e50;
      border: 2px solid transparent; cursor: pointer; text-align: center;
    }
    .modal-card:active { background: rgba(52, 152, 219, 0.3); }
    .modal-close {
      margin-top: 15px; padding: 12px; background: #e74c3c;
      border: none; border-radius: 8px; color: white;
      font-weight: 600; cursor: pointer; width: 100%;
    }
    .card-detail {
      background: rgba(52, 152, 219, 0.1);
      border: 2px solid #3498db;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }
    .card-detail-title { font-size: 18px; font-weight: 700; color: #3498db; margin-bottom: 10px; }
    .card-detail-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .card-detail-stat { text-align: center; }
    .card-detail-stat-value { font-size: 24px; font-weight: 700; }
    .card-detail-stat-label { font-size: 11px; color: #888; }
    .card-detail-effect {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
    }
    .toast {
      position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); padding: 12px 20px; border-radius: 20px;
      font-size: 12px; z-index: 2000; opacity: 0; transition: opacity 0.2s;
      max-width: 85%; text-align: center; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .turn-indicator {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(52, 152, 219, 0.9); padding: 8px 20px;
      border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 100; display: none;
    }
    .turn-indicator.show { display: block; }
    .turn-indicator.enemy { background: rgba(231, 76, 60, 0.9); }
  </style>
</head>
<body>
  <div class="leader-info">
    <div class="leader-avatar" id="playerLeader" onclick="useLeaderAbility()">
      👑
      <div class="coin" id="playerCoins" style="display:none;">0</div>
    </div>
    <div style="flex:1;">
      <div style="font-weight:600;color:#3498db;">Ваш лидер</div>
      <div style="font-size:12px;color:#aaa;" id="leaderName">-</div>
    </div>
  </div>
  
  <div class="top-bar">
    <div><div class="score-label">БОТ</div><div class="score" id="oppScore">0</div></div>
    <div style="text-align:right;"><div class="score-label">ВЫ</div><div class="score" id="playerScore">0</div></div>
  </div>
  
  <div class="turn-indicator" id="turnIndicator">Ваш ход</div>
  
  <div class="zone">
    <div class="avatar" onclick="showCardDetail('opponent', 'leader')">🤖</div>
    <div class="hand" id="oppHand"></div>
    <div class="deck-info">
      <div class="pile" onclick="showDeck('opponent')">📚<div class="pile-count" id="oppDeck">0</div></div>
      <div class="pile" onclick="showDiscard('opponent')">🗑️<div class="pile-count" id="oppDiscard">0</div></div>
    </div>
  </div>
  
  <div class="field">
    <div class="field-section">
      <div class="rows">
        <div class="row" id="oppLeft"><div class="row-label">Левый</div></div>
        <div class="row" id="oppRight"><div class="row-label">Правый</div></div>
      </div>
    </div>
  </div>
  
  <div class="action-bar">
    <button class="btn btn-leader" id="leaderBtn" onclick="useLeaderAbility()">👑 Лидер</button>
    <button class="btn btn-pass" id="passBtn" onclick="pass()">PASS</button>
  </div>
  
  <div class="field">
    <div class="field-section">
      <div class="rows">
        <div class="row" id="playerLeft"><div class="row-label">Левый</div></div>
        <div class="row" id="playerRight"><div class="row-label">Правый</div></div>
      </div>
    </div>
  </div>
  
  <div class="player-zone">
    <div class="leader-btn" onclick="showCardDetail('player', 'leader')">👑</div>
    <div class="player-hand" id="playerHand"></div>
    <div class="deck-info">
      <div class="pile" onclick="showDeck('player')">📚<div class="pile-count" id="playerDeck">0</div></div>
      <div class="pile" onclick="showDiscard('player')">🗑️<div class="pile-count" id="playerDiscard">0</div></div>
    </div>
  </div>
  
  <div class="modal" id="rowModal">
    <div class="modal-content">
      <div class="modal-title">Выберите ряд</div>
      <div class="modal-cards" id="rowOptions"></div>
      <button class="modal-close" onclick="closeModal('rowModal')">Отмена</button>
    </div>
  </div>
  
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-title" id="detailTitle">Информация</div>
      <div id="detailContent"></div>
      <button class="modal-close" onclick="closeModal('detailModal')">Закрыть</button>
    </div>
  </div>
  
  <div class="modal" id="effectModal">
    <div class="modal-content">
      <div class="modal-title">Применить эффект?</div>
      <div id="effectText" style="text-align:center;padding:20px;font-size:14px;"></div>
      <div style="display:flex;gap:10px;">
        <button class="modal-close" onclick="applyEffect(true)" style="background:#2ecc71;">Да</button>
        <button class="modal-close" onclick="applyEffect(false)" style="background:#e74c3c;">Нет</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let gameState = {
      faction: localStorage.getItem('selectedFaction') || 'knights',
      playerHand: [], playerDeck: [], playerDiscard: [],
      playerField: { left: [], right: [] },
      oppHand: [], oppDeck: [], oppDiscard: [],
      oppField: { left: [], right: [] },
      playerScore: 0, oppScore: 0,
      playerPass: false, oppPass: false,
      round: 1, leaderUsed: false, coins: 0,
      currentPlayer: 'player', gameOver: false,
      pendingEffect: null
    };
    
    let clickTimer = null;
    let lastClickTarget = null;
    
    document.addEventListener('DOMContentLoaded', () => {
      initGame();
      renderAll();
      showToast('🎮 Ваш ход!');
    });
    
    function initGame() {
      const faction = gameState.faction;
      const saved = localStorage.getItem(`deck_${faction}`);
      if (saved) {
        const ids = JSON.parse(saved);
        gameState.playerDeck = ids.map(id => getCardById(id));
      } else {
        gameState.playerDeck = FACTIONS[faction].cards.slice(0, 25);
      }
      shuffle(gameState.playerDeck);
      gameState.playerHand = gameState.playerDeck.splice(0, 10);
      
      const factions = ['mages', 'cultists', 'dryads'];
      const enemy = FACTIONS[factions[Math.floor(Math.random() * factions.length)]];
      gameState.oppDeck = enemy.cards.slice(0, 25);
      shuffle(gameState.oppDeck);
      gameState.oppHand = gameState.oppDeck.splice(0, 10);
      
      const leaderIdx = parseInt(localStorage.getItem('playerLeader') || '0');
      const leader = FACTIONS[faction].leaders[leaderIdx];
      document.getElementById('leaderName').textContent = leader.name;
    }
    
    function renderAll() {
      renderHand('player');
      renderHand('opp');
      renderField('player');
      renderField('opp');
      document.getElementById('playerScore').textContent = gameState.playerScore;
      document.getElementById('oppScore').textContent = gameState.oppScore;
      document.getElementById('playerDeck').textContent = gameState.playerDeck.length;
      document.getElementById('playerDiscard').textContent = gameState.playerDiscard.length;
      document.getElementById('oppDeck').textContent = gameState.oppDeck.length;
      document.getElementById('oppDiscard').textContent = gameState.oppDiscard.length;
      
      const coinsEl = document.getElementById('playerCoins');
      if (gameState.coins > 0) {
        coinsEl.textContent = gameState.coins;
        coinsEl.style.display = 'flex';
      }
      
      if (gameState.leaderUsed) {
        document.getElementById('leaderBtn').disabled = true;
        document.getElementById('leaderBtn').style.opacity = '0.5';
      }
    }
    
    function renderHand(who) {
      const container = document.getElementById(`${who}Hand`);
      const hand = gameState[`${who}Hand`];
      container.innerHTML = '';
      hand.forEach((card, idx) => {
        const el = document.createElement('div');
        if (who === 'opp') {
          el.className = 'card-back';
        } else {
          const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
          el.className = 'hand-card';
          el.innerHTML = `<div class="hand-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div><div class="hand-name">${card.name}</div><div class="hand-power">⚔️${card.power}</div>`;
          el.onclick = () => playCard(idx);
        }
        container.appendChild(el);
      });
    }
    
    function renderField(who) {
      ['left', 'right'].forEach(row => {
        const el = document.getElementById(`${who}${row==='left'?'Left':'Right'}`);
        el.querySelectorAll('.field-card').forEach(c => c.remove());
        gameState[`${who}Field`][row].forEach((card, idx) => {
          const cardEl = createFieldCard(card, who, row, idx);
          if (who === 'player') {
            cardEl.onclick = () => handleFieldCardClick(card, row);
          }
          el.appendChild(cardEl);
        });
      });
    }
    
    function createFieldCard(card, who, row, idx) {
      const el = document.createElement('div');
      el.className = 'field-card';
      el.style.borderColor = who === 'player' ? FACTIONS[gameState.faction].color : '#666';
      const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
      const eff = card.effect ? (card.effect.description || 'Есть эффект') : 'Нет эффекта';
      el.innerHTML = `<div class="card-type" style="background:${colors[card.type]};color:${['white','gold'].includes(card.type)?'#333':'#fff'}">${card.type.toUpperCase()}</div><div class="card-name">${card.name}</div><div class="card-power">⚔️${card.power}</div><div class="card-stats"><span>🛡️${card.armor}</span><span>❤️${card.health}</span></div><div style="font-size:7px;color:#888;text-align:center;border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;">${eff.substring(0,25)}${eff.length>25?'...':''}</div>`;
      return el;
    }
    
    function handleFieldCardClick(card, row) {
      if (gameState.currentPlayer !== 'player') {
        showToast('Не ваш ход!');
        return;
      }
      
      if (card.effect && card.effect.type !== 'onPlay') {
        gameState.pendingEffect = { card, row };
        document.getElementById('effectText').textContent = card.effect.description;
        document.getElementById('effectModal').classList.add('active');
      } else {
        showToast(`${card.name}\n⚔️${card.power} 🛡️${card.armor} ❤️${card.health}`);
      }
    }
    
    function applyEffect(yes) {
      closeModal('effectModal');
      if (!yes || !gameState.pendingEffect) return;
      
      const { card, row } = gameState.pendingEffect;
      if (card.effect.action === 'damage') {
        const enemies = [...gameState.oppField.left, ...gameState.oppField.right];
        if (enemies[0]) {
          enemies[0].health -= card.effect.value;
          showToast(`💥 ${enemies[0].name} получил урон!`);
        }
      } else if (card.effect.action === 'buff') {
        const allies = gameState.playerField[row].filter(c => c.id !== card.id);
        if (allies[0]) {
          allies[0][card.effect.stat] += card.effect.value;
          showToast(`💪 ${allies[0].name} усилен!`);
        }
      }
      
      renderAll();
      gameState.pendingEffect = null;
    }
    
    function playCard(idx) {
      if (gameState.currentPlayer !== 'player' || gameState.gameOver) {
        showToast('Не ваш ход!');
        return;
      }
      const card = gameState.playerHand[idx];
      
      // Determine valid rows
      const validRows = [];
      if (card.row === 'left' || card.row === 'any') validRows.push('left');
      if (card.row === 'right' || card.row === 'any') validRows.push('right');
      
      const modal = document.getElementById('rowModal');
      const options = document.getElementById('rowOptions');
      
      if (validRows.length === 1) {
        placeCard(idx, validRows[0]);
      } else {
        options.innerHTML = `
          <div class="modal-card" onclick="placeCard(${idx},'left')">⬅️ Левый</div>
          <div class="modal-card" onclick="placeCard(${idx},'right')">Правый ➡️</div>
        `;
        modal.classList.add('active');
      }
    }
    
    function placeCard(idx, row) {
      closeModal('rowModal');
      if (gameState.playerField[row].length >= 4) {
        showToast('Ряд заполнен!');
        return;
      }
      const card = gameState.playerHand.splice(idx, 1)[0];
      gameState.playerField[row].push(card);
      
      // Apply onPlay effects
      if (card.effect && card.effect.type === 'onPlay') {
        applyCardEffect(card, row);
      }
      
      if (card.type === 'special' || card.discardAfterUse) {
        gameState.playerDiscard.push(card);
        gameState.playerField[row].pop();
      }
      
      calcScore();
      endTurn();
      renderAll();
    }
    
    function applyCardEffect(card, row) {
      if (!card.effect) return;
      const eff = card.effect;
      
      if (eff.action === 'damage') {
        const enemies = [...gameState.oppField.left, ...gameState.oppField.right];
        if (enemies[0]) {
          enemies[0].health -= eff.value;
          showToast(`💥 ${enemies[0].name} получил ${eff.value} урона!`);
        }
      } else if (eff.action === 'heal') {
        const allies = [...gameState.playerField.left, ...gameState.playerField.right];
        if (allies[0]) {
          allies[0].health += eff.value;
          showToast(`❤️ ${allies[0].name} исцелён!`);
        }
      } else if (eff.action === 'buff') {
        const allies = gameState.playerField[row].filter(c => c.id !== card.id);
        if (allies[0]) {
          allies[0][eff.stat] += eff.value;
          showToast(`💪 ${allies[0].name} усилен на +${eff.value}!`);
        }
      } else if (eff.action === 'summon') {
        const template = FACTIONS[gameState.faction].cards.find(c => c.id === eff.card);
        if (template && gameState.playerField[row].length < 4) {
          gameState.playerField[row].push({...template});
          showToast('👻 Карта призвана!');
        }
      }
    }
    
    function calcScore() {
      gameState.playerScore = [...gameState.playerField.left, ...gameState.playerField.right].reduce((s,c) => s + (c.power||0), 0);
      gameState.oppScore = [...gameState.oppField.left, ...gameState.oppField.right].reduce((s,c) => s + (c.power||0), 0);
    }
    
    function endTurn() {
      if (gameState.gameOver) return;
      gameState.currentPlayer = 'opp';
      document.getElementById('turnIndicator').textContent = 'Ход противника...';
      document.getElementById('turnIndicator').classList.add('show');
      document.getElementById('turnIndicator').classList.add('enemy');
      setTimeout(oppTurn, 1500);
    }
    
    function oppTurn() {
      if (gameState.gameOver) return;
      const shouldPass = Math.random() > 0.7 || (gameState.oppField.left.length + gameState.oppField.right.length >= 7);
      if (shouldPass && !gameState.oppPass) {
        gameState.oppPass = true;
        showToast('⏭️ Противник пропустил ход!');
        if (gameState.playerPass) setTimeout(endRound, 1000);
        else {
          gameState.currentPlayer = 'player';
          document.getElementById('turnIndicator').textContent = 'Ваш ход!';
          document.getElementById('turnIndicator').classList.remove('enemy');
        }
      } else if (gameState.oppHand.length > 0) {
        const idx = Math.floor(Math.random() * gameState.oppHand.length);
        const card = gameState.oppHand.splice(idx, 1)[0];
        const row = gameState.oppField.left.length <= gameState.oppField.right.length ? 'left' : 'right';
        if (gameState.oppField[row].length < 4) {
          gameState.oppField[row].push(card);
          if (card.effect && card.effect.type === 'onPlay') {
            // Apply bot card effects
          }
          if (card.type === 'special' || card.discardAfterUse) {
            gameState.oppDiscard.push(card);
            gameState.oppField[row].pop();
          }
          calcScore();
          showToast('🤖 Противник сыграл карту');
        }
      }
      renderAll();
      if (!gameState.oppPass) {
        setTimeout(() => {
          gameState.currentPlayer = 'player';
          document.getElementById('turnIndicator').textContent = 'Ваш ход!';
          document.getElementById('turnIndicator').classList.remove('enemy');
        }, 1000);
      }
    }
    
    function pass() {
      if (gameState.playerPass || gameState.gameOver) return;
      gameState.playerPass = true;
      showToast('✅ Вы пропустили ход!');
      if (gameState.oppPass) setTimeout(endRound, 1000);
      else {
        gameState.currentPlayer = 'opp';
        document.getElementById('turnIndicator').textContent = 'Ход противника...';
        document.getElementById('turnIndicator').classList.add('enemy');
        setTimeout(oppTurn, 1000);
      }
      renderAll();
    }
    
    function endRound() {
      showToast(`🔄 Раунд ${gameState.round} завершён!`);
      
      // Check winner
      if (gameState.playerScore > gameState.oppScore) {
        gameState.coins++;
        showToast('🏆 Вы выиграли раунд! +1 монета');
        if (gameState.coins >= 3) {
          setTimeout(() => {
            alert('🎉 ПОБЕДА!\n\nВы выиграли 3 раунда!');
            window.location.href = 'index.html';
          }, 1000);
          return;
        }
      } else if (gameState.oppScore > gameState.playerScore) {
        showToast('💀 Противник выиграл раунд');
      } else {
        showToast('🤝 Ничья в раунде');
      }
      
      gameState.playerDiscard.push(...gameState.playerField.left, ...gameState.playerField.right);
      gameState.oppDiscard.push(...gameState.oppField.left, ...gameState.oppField.right);
      gameState.playerField.left = []; gameState.playerField.right = [];
      gameState.oppField.left = []; gameState.oppField.right = [];
      
      const draw = Math.min(1, gameState.playerDeck.length);
      if (draw > 0) gameState.playerHand.push(...gameState.playerDeck.splice(0, draw));
      
      const oppDraw = Math.min(1, gameState.oppDeck.length);
      if (oppDraw > 0) gameState.oppHand.push(...gameState.oppDeck.splice(0, oppDraw));
      
      gameState.playerPass = false; gameState.oppPass = false;
      gameState.round++;
      
      setTimeout(() => {
        if (gameState.round > 3 || (gameState.playerDeck.length === 0 && gameState.oppDeck.length === 0)) {
          endGame();
        } else {
          showToast(`🎮 Раунд ${gameState.round} начался!`);
          document.getElementById('turnIndicator').textContent = 'Ваш ход!';
          document.getElementById('turnIndicator').classList.remove('enemy');
          renderAll();
        }
      }, 2000);
    }
    
    function endGame() {
      gameState.gameOver = true;
      let msg = '', result = '';
      if (gameState.playerScore > gameState.oppScore) { msg = '🏆 ПОБЕДА!'; result = 'win'; showToast('+10 очков рейтинга'); }
      else if (gameState.playerScore < gameState.oppScore) { msg = '💀 ПОРАЖЕНИЕ!'; result = 'loss'; showToast('-5 очков рейтинга'); }
      else { msg = '🤝 НИЧЬЯ!'; result = 'draw'; }
      
      let rating = parseInt(localStorage.getItem('playerRating') || '0');
      if (result === 'win') rating += 10;
      else if (result === 'loss') rating = Math.max(0, rating - 5);
      localStorage.setItem('playerRating', String(rating));
      
      alert(`${msg}\n\nВаш счёт: ${gameState.playerScore}\nСчёт противника: ${gameState.oppScore}\n\nРейтинг: ${rating}`);
      setTimeout(() => { window.location.href = 'index.html'; }, 500);
    }
    
    function useLeaderAbility() {
      if (gameState.leaderUsed || gameState.gameOver || gameState.currentPlayer !== 'player') {
        showToast('Способность уже использована!');
        return;
      }
      const faction = gameState.faction;
      const leaderIdx = parseInt(localStorage.getItem('playerLeader') || '0');
      const leader = FACTIONS[faction]?.leaders?.[leaderIdx];
      if (!leader?.ability) { showToast('Способность не найдена'); return; }
      
      const abil = leader.ability;
      if (abil.type === 'damage') {
        const enemies = [...gameState.oppField.left, ...gameState.oppField.right];
        if (enemies[0]) {
          enemies[0].health -= abil.value;
          showToast(`💥 ${enemies[0].name} получил урон!`);
        }
      } else if (abil.type === 'heal') {
        [...gameState.playerField.left, ...gameState.playerField.right].forEach(ally => {
          ally.health += 5;
        });
        showToast('❤️ Все карты исцелены!');
      } else if (abil.type === 'copy' || abil.type === 'counter') {
        gameState.playerField.left.forEach(c => { c.power += 2; c.armor += 1; });
        gameState.playerField.right.forEach(c => { c.power += 2; c.armor += 1; });
        showToast('💪 Все карты усилены!');
      }
      
      gameState.leaderUsed = true;
      renderAll();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function showCardDetail(who, type, card = null) {
      const modal = document.getElementById('detailModal');
      const title = document.getElementById('detailTitle');
      const content = document.getElementById('detailContent');
      
      if (type === 'leader') {
        const faction = who === 'player' ? gameState.faction : 'mages';
        const leaderIdx = who === 'player' ? parseInt(localStorage.getItem('playerLeader') || '0') : 0;
        const leader = FACTIONS[faction]?.leaders?.[leaderIdx];
        title.textContent = `${who==='player'?'Ваш':'Противника'} лидер`;
        content.innerHTML = `
          <div class="card-detail">
            <div class="card-detail-title">👑 ${leader?.name || 'Неизвестно'}</div>
            <div class="card-detail-effect">
              <strong>Способность:</strong><br>
              ${leader?.ability?.description || 'Уникальная способность'}
            </div>
          </div>
        `;
      } else if (type === 'card' && card) {
        const eff = card.effect ? (card.effect.description || 'Нет эффекта') : 'Нет эффекта';
        const colors = { white: '#fff', gray: '#95a5a6', purple: '#a233ff', gold: '#f1c40f', special: '#e74c3c' };
        title.textContent = card.name;
        content.innerHTML = `
          <div class="card-detail">
            <div class="card-detail-title" style="color:${colors[card.type]}">${card.name}</div>
            <div style="text-align:center;margin:10px 0;font-size:14px;color:#888;">${card.type.toUpperCase()} • 💫 ${card.influence}</div>
            <div class="card-detail-stats">
              <div class="card-detail-stat"><div class="card-detail-stat-value">⚔️${card.power}</div><div class="card-detail-stat-label">Сила</div></div>
              <div class="card-detail-stat"><div class="card-detail-stat-value">🛡️${card.armor}</div><div class="card-detail-stat-label">Броня</div></div>
              <div class="card-detail-stat"><div class="card-detail-stat-value">❤️${card.health}</div><div class="card-detail-stat-label">Здоровье</div></div>
            </div>
            <div class="card-detail-effect">
              <strong>📜 Эффект:</strong><br>
              ${eff}
            </div>
          </div>
        `;
      }
      
      modal.classList.add('active');
    }
    
    function showDeck(who) {
      const deck = who === 'player' ? gameState.playerDeck : gameState.oppDeck;
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = `${who==='player'?'Ваша':'Противника'} колода`;
      document.getElementById('detailContent').innerHTML = `
        <div style="text-align:center;padding:30px;font-size:24px;">
          📚 Карт в колоде:<br><strong style="color:#3498db;font-size:36px;">${deck.length}</strong>
        </div>
      `;
      modal.classList.add('active');
    }
    
    function showDiscard(who) {
      const discard = who === 'player' ? gameState.playerDiscard : gameState.oppDiscard;
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = `${who==='player'?'Ваш':'Противника'} отбой`;
      let html = `<div style="text-align:center;padding:15px;font-size:18px;">🗑️ Карт в отбое: <strong>${discard.length}</strong></div>`;
      if (discard.length > 0) {
        html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">';
        discard.slice(-9).forEach(card => {
          html += `<div style="background:#2c3e50;border-radius:6px;padding:8px;text-align:center;font-size:11px;"><div style="font-weight:600;font-size:10px;">${card.name}</div><div>⚔️${card.power}</div></div>`;
        });
        html += '</div>';
      }
      document.getElementById('detailContent').innerHTML = html;
      modal.classList.add('active');
    }
    
    function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }
    function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
    function getCardById(id) { for (const fk in FACTIONS) { const card = FACTIONS[fk].cards.find(c => c.id === id); if (card) return { ...card }; } return null; }
  </script>
</body>
