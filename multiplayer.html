<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онлайн</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
    .box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; margin: 10px auto; max-width: 420px; }
    .btn { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-green { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .btn-blue { background: linear-gradient(135deg, #3498db, #2980b9); }
    .btn-red { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; background: #555; }
    input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 2px solid #555; background: #2c3e50; color: white; font-size: 24px; text-align: center; letter-spacing: 6px; text-transform: uppercase; font-weight: bold; }
    input:focus { border-color: #3498db; outline: none; }
    .hidden { display: none; }
    .code-display { font-size: 36px; letter-spacing: 10px; margin: 20px 0; font-weight: bold; color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.5); }
    .spinner { margin: 30px auto; width: 50px; height: 50px; border: 5px solid rgba(46,204,113,0.2); border-top: 5px solid #2ecc71; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .friend-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.08); padding: 12px 15px; margin: 8px 0; border-radius: 10px; }
    .friend-id { font-weight: 600; }
    .friend-btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
    .btn-invite { background: #3498db; color: white; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 25px; font-size: 14px; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .status { font-size: 13px; color: #888; margin: 10px 0; }
  </style>
</head>
<body>
  <!-- Главное меню -->
  <div class="box" id="menuScreen">
    <h1>🌐 Онлайн Игра</h1>
    <p class="status">Выберите режим</p>
    
    <button class="btn btn-green" id="btnMatch" onclick="findMatch()">🔍 Подбор игроков</button>
    <button class="btn btn-blue" id="btnRoom" onclick="createRoom()">🏠 Создать комнату</button>
    <button class="btn btn-blue" onclick="showJoin()">🚪 Войти по коду</button>
    <button class="btn btn-blue" onclick="showFriends()">👥 Друзья</button>
    <button class="btn btn-red" onclick="location.href='index.html'">❌ Назад</button>
  </div>

  <!-- Поиск -->
  <div class="box hidden" id="searchScreen">
    <h1>🔍 Поиск соперника</h1>
    <div class="spinner"></div>
    <p class="status" id="searchStatus">Подбираем достойного противника...</p>
    <p class="status" id="queuePos" style="color:#3498db;"></p>
    <button class="btn btn-red" onclick="cancelMatch()">✕ Отменить</button>
  </div>

  <!-- Создание комнаты -->
  <div class="box hidden" id="roomScreen">
    <h1>🏠 Комната создана</h1>
    <p class="status">Отправьте этот код другу:</p>
    <div class="code-display" id="roomCode">----</div>
    <button class="btn btn-green" onclick="copyCode()">📋 Скопировать код</button>
    <button class="btn btn-blue" onclick="inviteFromRoom()">📩 Пригласить друга</button>
    <button class="btn btn-red" onclick="leaveRoom()">✕ Выйти</button>
  </div>

  <!-- Вход по коду -->
  <div class="box hidden" id="joinScreen">
    <h1>🚪 Вход в комнату</h1>
    <input type="text" id="codeInput" placeholder="ABCD" maxlength="4" autocomplete="off">
    <button class="btn btn-green" onclick="joinRoom()">Войти</button>
    <button class="btn btn-red" onclick="showMenu()">← Назад</button>
  </div>

  <!-- Друзья -->
  <div class="box hidden" id="friendsScreen">
    <h1>👥 Друзья</h1>
    <input type="text" id="friendInput" placeholder="ID друга" style="font-size:16px; letter-spacing:normal;">
    <button class="btn btn-green" onclick="addFriend()">➕ Добавить</button>
    <div id="friendsList" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
    <button class="btn btn-red" onclick="showMenu()">← Назад</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const socket = io('http://193.148.59.127:3000');
    const tg = window.Telegram.WebApp;
    tg.expand(); tg.ready();
    
    let myId = tg.initDataUnsafe?.user?.id?.toString() || 'guest_' + Math.random();
    let myName = tg.initDataUnsafe?.user?.first_name || 'Игрок';
    let myDeck = JSON.parse(localStorage.getItem('selectedDeck') || 'null');
    let currentRoomCode = null;
    let friends = [];

    // Инициализация
    socket.on('connect', () => {
      socket.emit('register', { userId: myId, username: myName });
      checkDeck();
      loadFriends();
    });

    function checkDeck() {
      const hasDeck = myDeck && Array.isArray(myDeck) && myDeck.length > 0;
      document.getElementById('btnMatch').disabled = !hasDeck;
      document.getElementById('btnRoom').disabled = !hasDeck;
      if(!hasDeck) {
        showToast('⚠️ Сначала выберите колоду в "Онлайн игре"');
      }
    }

    function loadFriends() {
      socket.emit('get_friends');
    }

    socket.on('friends_updated', (data) => {
      friends = data.friends || [];
      renderFriends();
    });

    socket.on('friend_request', (data) => {
      if(confirm(`📨 ${data.from} хочет добавить вас в друзья!\n\nПринять?`)) {
        // Авто-принятие для демо
        friends.push(data.uid);
        localStorage.setItem('friends_' + myId, JSON.stringify(friends));
        showToast('✅ Дружба принята!');
      }
    });

    socket.on('invite_received', (data) => {
      if(confirm(`🎮 ${data.from} приглашает вас в комнату!\n\nКод: ${data.roomCode}\n\nПринять?`)) {
        if(myDeck) {
          socket.emit('accept_invite', {
            roomCode: data.roomCode,
            deck: myDeck,
            myId: myId
          });
        } else {
          showToast('⚠️ Сначала выберите колоду!');
          setTimeout(() => location.href = 'online-game.html', 1000);
        }
      }
    });

    socket.on('invite_sent', () => showToast('📩 Приглашение отправлено!'));
    socket.on('error_msg', (msg) => showToast('❌ ' + msg));

    // === ПОДБОР ===
    function findMatch() {
      if(!myDeck) { showToast('⚠️ Выберите колоду!'); return; }
      showScreen('searchScreen');
      socket.emit('find_match', { deck: myDeck });
    }

    socket.on('matchmaking_status', (data) => {
      if(data.status === 'searching') {
        document.getElementById('queuePos').textContent = 
          data.pos > 1 ? `Ваша позиция: ${data.pos}` : '';
      } else if(data.status === 'cancelled') {
        showMenu();
      }
    });

    socket.on('match_found', (data) => {
      localStorage.setItem('roomId', data.roomId);
      localStorage.setItem('roomCode', data.roomCode);
      showToast('🎮 Соперник найден!');
      setTimeout(() => location.href = 'battle-online.html', 1500);
    });

    function cancelMatch() {
      socket.emit('cancel_search');
      showMenu();
    }

    // === КОМНАТА ===
    function createRoom() {
      if(!myDeck) { showToast('⚠️ Выберите колоду!'); return; }
      socket.emit('create_room', { deck: myDeck });
    }

    socket.on('room_created', (data) => {
      currentRoomCode = data.roomCode;
      document.getElementById('roomCode').textContent = currentRoomCode;
      showScreen('roomScreen');
    });

    function copyCode() {
      navigator.clipboard.writeText(currentRoomCode);
      showToast('📋 Код скопирован!');
      if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }

    function inviteFromRoom() {
      const botUser = 'CardBattleTestBot'; // ЗАМЕНИ НА СВОЕГО БОТА
      const text = `🎮 Приглашаю в Карточную Битву!\n\nКомната: ${currentRoomCode}\n\nОткрой: https://t.me/${botUser}`;
      
      if(tg.shareURL) {
        tg.shareURL(text);
      } else {
        navigator.clipboard.writeText(text);
        showToast('📋 Приглашение скопировано!');
      }
    }

    function leaveRoom() {
      currentRoomCode = null;
      showMenu();
    }

    // === ВХОД ===
    function showJoin() { showScreen('joinScreen'); document.getElementById('codeInput').focus(); }
    
    function joinRoom() {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      if(code.length !== 4) { showToast('⚠️ Введите 4-значный код'); return; }
      if(!myDeck) { showToast('⚠️ Выберите колоду!'); return; }
      
      socket.emit('join_room', { roomCode: code, deck: myDeck });
    }

    socket.on('game_start', () => {
      showToast('🎮 Игра началась!');
      setTimeout(() => location.href = 'battle-online.html', 1000);
    });

    // === ДРУЗЬЯ ===
    function showFriends() { showScreen('friendsScreen'); }
    
    function addFriend() {
      const fid = document.getElementById('friendInput').value.trim();
      if(fid && fid !== myId && !friends.includes(fid)) {
        socket.emit('add_friend', { friendId: fid });
        document.getElementById('friendInput').value = '';
        showToast('✅ Запрос отправлен!');
      }
    }

    function renderFriends() {
      const list = document.getElementById('friendsList');
      if(friends.length === 0) {
        list.innerHTML = '<div style="color:#888; padding:10px;">Нет друзей</div>';
        return;
      }
      list.innerHTML = friends.map(fid => `
        <div class="friend-item">
          <span class="friend-id">🆔 ${fid}</span>
          <button class="friend-btn btn-invite" onclick="inviteFriend('${fid}')">📩</button>
        </div>
      `).join('');
    }

    function inviteFriend(fid) {
      if(!currentRoomCode) {
        showToast('⚠️ Сначала создайте комнату!');
        return;
      }
      socket.emit('invite_friend', {
        friendUserId: fid,
        roomCode: currentRoomCode,
        myDeck: myDeck
      });
    }

    // === УТИЛИТЫ ===
    function showScreen(id) {
      document.querySelectorAll('.box').forEach(b => b.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }
    function showMenu() { showScreen('menuScreen'); checkDeck(); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Авто-фокус на поле ввода кода
    document.getElementById('codeInput').addEventListener('input', function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
    });
  </script>
</body>
</html>
