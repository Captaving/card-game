<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мультиплеер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .menu-box {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    h1 { font-size: 26px; margin-bottom: 10px; }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
    .btn {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
    .btn-secondary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }
    .searching-box {
      background: rgba(46, 204, 113, 0.1);
      border: 2px solid #2ecc71;
      border-radius: 15px;
      padding: 40px 20px;
      margin: 20px 0;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(46, 204, 113, 0.3);
      border-top: 4px solid #2ecc71;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .room-code {
      background: rgba(52, 152, 219, 0.2);
      border: 2px solid #3498db;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      font-family: monospace;
    }
    .input-code {
      width: 100%;
      padding: 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 24px;
      text-align: center;
      margin: 15px 0;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .status { margin: 15px 0; color: #888; font-size: 14px; }
    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- Главное меню -->
  <div class="menu-box" id="mainMenu">
    <h1>🌐 Онлайн Игра</h1>
    <p class="subtitle">Выберите режим</p>
    
    <button class="btn btn-primary" onclick="startMatchmaking()">🔍 Подбор игроков</button>
    <button class="btn btn-secondary" onclick="showCreateRoom()">🏠 Создать комнату</button>
    <button class="btn btn-secondary" onclick="showJoinRoom()">🚪 Войти по коду</button>
    <button class="btn btn-back" onclick="goBack()">← Назад</button>
  </div>
  
  <!-- Поиск матча -->
  <div class="menu-box hidden" id="searchingMenu">
    <h1>🔍 Поиск соперника</h1>
    <div class="searching-box">
      <div class="spinner"></div>
      <p class="status">Подбираем достойного противника...</p>
    </div>
    <button class="btn btn-back" onclick="cancelSearch()">✕ Отменить поиск</button>
  </div>
  
  <!-- Создание комнаты -->
  <div class="menu-box hidden" id="createRoomMenu">
    <h1>🏠 Создание комнаты</h1>
    <p class="status">Отправьте код другу:</p>
    <div class="room-code" id="roomCode">----</div>
    <button class="btn btn-primary" onclick="copyCode()">📋 Скопировать код</button>
    <button class="btn btn-secondary" onclick="waitForOpponent()">⏳ Ждать соперника</button>
    <button class="btn btn-back" onclick="showMainMenu()">← Назад</button>
  </div>
  
  <!-- Ожидание соперника -->
  <div class="menu-box hidden" id="waitingMenu">
    <h1>⏳ Ожидание</h1>
    <div class="searching-box">
      <div class="spinner"></div>
      <p class="status">Ожидание подключения соперника...</p>
    </div>
    <div class="room-code" id="waitRoomCode">----</div>
    <button class="btn btn-back" onclick="leaveRoom()">✕ Отмена</button>
  </div>
  
  <!-- Вход в комнату -->
  <div class="menu-box hidden" id="joinRoomMenu">
    <h1>🚪 Вход в комнату</h1>
    <input type="text" class="input-code" id="joinCodeInput" placeholder="XXXX" maxlength="4">
    <button class="btn btn-primary" onclick="joinRoom()">Войти</button>
    <button class="btn btn-back" onclick="showMainMenu()">← Назад</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const SERVER_URL = 'http://193.148.59.127:3000';
    const socket = io(SERVER_URL, { transports: ['websocket', 'polling'], reconnection: true });
    
    let roomId = null;
    let selectedDeck = null;
    let userId = tg.initDataUnsafe?.user?.id?.toString() || 'guest';
    let username = tg.initDataUnsafe?.user?.first_name || 'Guest';
    
    // Загрузка колоды
    document.addEventListener('DOMContentLoaded', () => {
      const deckData = localStorage.getItem('selectedDeck');
      if (deckData) {
        selectedDeck = JSON.parse(deckData);
      }
      
      // Регистрация на сервере
      socket.emit('register', { userId, username });
    });
    
    // Socket events
    socket.on('connect', () => {
      console.log('✅ Connected to server');
      showToast('🟢 Подключено к серверу');
    });
    
    socket.on('match_found', (data) => {
      console.log('🎮 Match found!', data);
      roomId = data.roomId;
      localStorage.setItem('roomId', roomId);
      showToast('🎮 Соперник найден!');
      setTimeout(() => {
        window.location.href = 'battle-online.html';
      }, 1500);
    });
    
    socket.on('matchmaking_status', (data) => {
      console.log('📡 Status:', data);
      if (data.status === 'searching') {
        showToast('🔍 Поиск соперника...');
      } else if (data.status === 'cancelled') {
        showToast('❌ Поиск отменён');
      }
    });
    
    socket.on('invite_received', (data) => {
      console.log('📨 Invite received:', data);
      if (confirm(`🎮 ${data.fromUser} приглашает вас!\n\nПринять?`)) {
        acceptInvite(data);
      }
    });
    
    socket.on('room_created', (data) => {
      roomId = data.roomId;
      document.getElementById('roomCode').textContent = roomId;
      document.getElementById('waitRoomCode').textContent = roomId;
      document.getElementById('createRoomMenu').classList.add('hidden');
      document.getElementById('waitingMenu').classList.remove('hidden');
    });
    
    socket.on('game_start', () => {
      showToast('🎮 Игра началась!');
      localStorage.setItem('roomId', roomId);
      setTimeout(() => {
        window.location.href = 'battle-online.html';
      }, 1000);
    });
    
    socket.on('error_msg', (msg) => {
      showToast('❌ ' + msg);
    });
    
    socket.on('disconnect', () => {
      showToast('🔴 Потеряно соединение');
    });
    
    // Функции
    function startMatchmaking() {
      if (!selectedDeck) {
        showToast('⚠️ Сначала выберите колоду!');
        setTimeout(() => { window.location.href = 'online-game.html'; }, 1000);
        return;
      }
      
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('searchingMenu').classList.remove('hidden');
      
      socket.emit('find_match', {
        deck: selectedDeck,
        userId: userId
      });
      
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function cancelSearch() {
      socket.emit('cancel_search');
      showMainMenu();
    }
    
    function showCreateRoom() {
      if (!selectedDeck) {
        showToast('⚠️ Сначала выберите колоду!');
        setTimeout(() => { window.location.href = 'online-game.html'; }, 1000);
        return;
      }
      
      socket.emit('create_room', {
        deck: selectedDeck,
        userId: userId
      });
      
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('createRoomMenu').classList.remove('hidden');
    }
    
    function copyCode() {
      navigator.clipboard.writeText(roomId);
      showToast('📋 Код скопирован!');
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    
    function waitForOpponent() {
      document.getElementById('createRoomMenu').classList.add('hidden');
      document.getElementById('waitingMenu').classList.remove('hidden');
    }
    
    function showJoinRoom() {
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('joinRoomMenu').classList.remove('hidden');
      document.getElementById('joinCodeInput').focus();
    }
    
    function joinRoom() {
      const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
      if (!code || code.length !== 4) {
        showToast('⚠️ Введите 4-значный код!');
        return;
      }
      
      if (!selectedDeck) {
        showToast('⚠️ Сначала выберите колоду!');
        setTimeout(() => { window.location.href = 'online-game.html'; }, 1000);
        return;
      }
      
      socket.emit('join_room', {
        roomId: code,
        deck: selectedDeck,
        userId: userId
      });
    }
    
    function acceptInvite(data) {
      socket.emit('accept_invite', {
        hostSocketId: data.fromId,
        myDeck: selectedDeck,
        myId: userId,
        hostDeck: data.myDeck,
        hostId: data.fromId
      });
    }
    
    function leaveRoom() {
      socket.emit('leave_room', { roomId });
      showMainMenu();
    }
    
    function showMainMenu() {
      document.getElementById('mainMenu').classList.remove('hidden');
      document.getElementById('searchingMenu').classList.add('hidden');
      document.getElementById('createRoomMenu').classList.add('hidden');
      document.getElementById('waitingMenu').classList.add('hidden');
      document.getElementById('joinRoomMenu').classList.add('hidden');
    }
    
    function goBack() {
      window.location.href = 'online-game.html';
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
