<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Онлайн Бой</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-search { background: #3498db; }
        .btn-friend { background: #2ecc71; }
        .btn-cancel { background: #e74c3c; display: none; }
        .status-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ready-btn { background: #f1c40f; color: black; width: 100%; padding: 15px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; display: none; }
        .timer { font-size: 24px; font-weight: bold; color: #e74c3c; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Онлайн Бой</h1>
        
        <div id="menu-screen">
            <button class="btn btn-search" onclick="startSearch()">🔍 Подбор игрока</button>
            <button class="btn btn-friend" onclick="inviteFriend()">👥 Пригласить друга</button>
            <button class="btn" style="background:#555; margin-top:20px;" onclick="window.location.href='index.html'">⬅ Назад</button>
        </div>

        <div id="search-screen" style="display:none;">
            <div class="status-box">
                <div class="loader" id="loader" style="display:block;"></div>
                <div id="status-text">Поиск соперника...</div>
                <div id="opponent-found" style="display:none; color:#2ecc71; font-weight:bold; margin-top:10px;">
                    Соперник найден!<br>Ожидание готовности...
                </div>
            </div>
            <button id="ready-btn" class="ready-btn" onclick="toggleReady()">✅ ГОТОВ</button>
            <button class="btn btn-cancel" id="cancel-btn" style="display:block; margin-top:10px;" onclick="cancelSearch()">❌ Отмена</button>
            <div id="timer-display" class="timer">10</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ВАЖНО: Укажите IP вашего сервера
        const SERVER_IP = '193.148.59.127'; 
        const socket = io(`http://${SERVER_IP}:3000`);
        
        let roomId = null;
        let isReady = false;
        let countdownInterval = null;

        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id : 'guest_' + Math.random();
        const username = user ? (user.username || user.first_name) : 'Player';

        function startSearch() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status-text').innerText = 'Поиск соперника...';
            
            socket.emit('find_match', { userId, username });
        }

        function inviteFriend() {
            const invLink = `https://t.me/share/url?url=${encodeURIComponent('http://t.me/YourBotName?start=play')}&text=Сыграем в карты!`;
            tg.openTelegramLink(invLink);
            // В реальном проекте нужно передавать ID друга через start_param бота
            alert('Отправьте ссылку другу! (Нужна доработка бота для точного приглашения)');
            startSearch(); // Для теста сразу ищем
        }

        function cancelSearch() {
            socket.emit('cancel_search', { userId });
            resetUI();
        }

        function toggleReady() {
            isReady = !isReady;
            const btn = document.getElementById('ready-btn');
            btn.innerText = isReady ? '✅ ГОТОВ' : '⏳ ЖДУ СОПЕРНИКА';
            btn.style.background = isReady ? '#2ecc71' : '#f1c40f';
            
            socket.emit('player_ready', { roomId, userId, ready: isReady });
        }

        function resetUI() {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('loader').style.display = 'none';
            document.getElementById('ready-btn').style.display = 'none';
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            clearInterval(countdownInterval);
        }

        // --- СОБЫТИЯ ОТ СЕРВЕРА ---

        socket.on('match_found', (data) => {
            roomId = data.roomId;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').style.display = 'none';
            document.getElementById('opponent-found').style.display = 'block';
            document.getElementById('ready-btn').style.display = 'block';
            document.getElementById('cancel-btn').style.display = 'none'; // Нельзя отменить после нахождения
        });

        socket.on('both_ready', () => {
            document.getElementById('ready-btn').style.display = 'none';
            document.getElementById('opponent-found').innerHTML = 'Игра начинается через...';
            document.getElementById('timer-display').style.display = 'block';
            
            let timeLeft = 10;
            const timerEl = document.getElementById('timer-display');
            timerEl.innerText = timeLeft;
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    // Переход к игре
                    startGameRedirect();
                }
            }, 1000);
        });

        function startGameRedirect() {
            // Сохраняем ID комнаты для игры
            localStorage.setItem('onlineRoomId', roomId);
            localStorage.setItem('gameMode', 'online');
            // Перенаправляем на экран игры (нужно создать game.html или адаптировать существующий)
            window.location.href = 'game.html'; 
        }

        socket.on('error', (msg) => {
            alert('Ошибка: ' + msg);
            resetUI();
        });
    </script>
</body>
</html>
