<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Lily Wars — Карточная игра</title>
    <link rel="icon" type="image/png" href="images/Favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Timer -->
    <div id="turn-timer" class="turn-timer" style="display: none;">⏱️ <span id="timer-value">30</span>s</div>

    <!-- MAIN MENU -->
    <div id="screen-main" class="screen active">
        <h1> Lily Wars</h1>
        <p style="font-size: 1.2em; color: #b39ddb; margin-bottom: 30px;">Тактическая карточная игра с 4 фракциями</p>
        
        <h3 style="color: #9b72cf; margin: 30px 0 20px;">ФРАКЦИИ</h3>
        <div id="main-faction-logos" class="faction-select"></div>
        
        <div style="margin-top: 40px;">
            <button id="btn-online"> Играть онлайн</button>
            <button id="btn-my-decks"> Мои колоды</button>
            <button id="btn-bot"> Играть с ботом</button>
            <button id="btn-new-deck"> Создать колоду</button>
        </div>
    </div>

    <!-- DECK BUILDER -->
    <div id="screen-deck-builder" class="screen">
        <h2> Редактор колод</h2>
        
        <div id="faction-select-container">
            <h3 style="text-align:center; margin:20px 0;">Выберите фракцию:</h3>
            <div id="builder-factions" class="faction-select"></div>
        </div>

        <div id="deck-builder-content" style="display:none;">
            <div class="deck-stats">
                <span>Карт: <strong id="card-count">0</strong>/25</span>
                <span>Влияние: <strong id="influence-count">0</strong>/170</span>
            </div>

            <h3 style="text-align:center; margin:20px 0 10px;">ДОСТУПНЫЕ КАРТЫ <small style="color:#aaa; font-size:0.7em;">(нажмите чтобы добавить, удержите — описание)</small></h3>
            <div id="available-cards"></div>

            <h3 style="text-align:center; margin:20px 0 10px;">ВАША КОЛОДА</h3>
            <div id="deck-cards"></div>

            <div style="text-align:center; margin-top:20px;">
                <button id="btn-save-deck"> Сохранить колоду</button>
                <button id="btn-back-to-menu">← Назад в меню</button>
            </div>
        </div>
    </div>

    <!-- MY DECKS -->
    <div id="screen-my-decks" class="screen">
        <h2> Мои колоды</h2>
        <div id="decks-list" style="margin: 30px auto; max-width: 800px;"></div>
        <button id="btn-back-from-decks">← Назад в меню</button>
    </div>

    <!-- GAME BOARD -->
    <div id="screen-game" class="screen">
        <!-- Mobile Header -->
        <div class="game-header-mobile" style="display: none;">
            <div style="color: #d4af37; font-size: 1.2em; font-weight: bold;">Раунд <span id="mobile-round">1</span>/3</div>
            <div style="display: flex; justify-content: space-around; margin-top: 5px; font-size: 0.9em;">
                <span>🗡️ Вы: <strong style="color:#4caf50;" id="mobile-player-swords">0</strong></span>
                <span>🗡️ Бот: <strong style="color:#ef5350;" id="mobile-bot-swords">0</strong></span>
            </div>
            <div style="margin-top: 3px; font-size: 0.85em; color: #aaa;">
                Очки: <strong style="color:#80cbc4;" id="mobile-player-points">0</strong>-<strong style="color:#ef9a9a;" id="mobile-bot-points">0</strong>
            </div>
        </div>

        <div id="game-board" class="game-board-mobile"></div>

        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <button class="mobile-btn" id="mobile-btn-hand">🃏 Карты</button>
            <button class="mobile-btn" id="mobile-btn-leader">👑 Умение</button>
            <button class="mobile-btn" id="mobile-btn-pass">🏳️ Пасс</button>
            <button class="mobile-btn" id="mobile-btn-surrender">⚔️ Сдаться</button>
        </div>

        <!-- Hand Popup Button -->
        <button class="hand-popup-btn" id="hand-popup-btn">📋</button>

        <!-- Hand Popup -->
        <div class="hand-popup" id="hand-popup">
            <h4 style="color: #d4af37; margin-bottom: 10px; text-align: center;">Ваша рука</h4>
            <div id="mobile-hand-cards" style="display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/deckbuilder.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
