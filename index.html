<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily Wars</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3.4em;
            color: #c084fc;
            text-shadow: 0 0 15px #c084fc, 0 0 30px #a855f7;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.25em;
            margin-bottom: 25px;
            opacity: 0.85;
        }
        .faction-row {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .faction-item {
            text-align: center;
            cursor: pointer;
        }
        .faction-item img {
            width: 68px;
            height: 68px;
            object-fit: contain;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }
        button {
            background: white;
            color: #1e2937;
            border: none;
            padding: 16px 0;
            width: 300px;
            border-radius: 14px;
            font-size: 1.1em;
            font-weight: 600;
            margin: 8px 0;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        button:hover {
            background: #f3e8ff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #1e2937;
            padding: 30px 40px;
            border-radius: 16px;
            max-width: 400px;
            border: 2px solid #c084fc;
        }
    </style>
</head>
<body>

    <h1>Lily Wars</h1>
    <p>Коллекционная карточная игра</p>

    <!-- Только иконки фракций (без текста) -->
    <div class="faction-row">
        <div class="faction-item" onclick="showFactionLore('Рыцари Лилии')">
            <img src="assets/factions/knights.png" alt="Рыцари Лилии">
        </div>
        <div class="faction-item" onclick="showFactionLore('Прислужники Чёрной Лилии')">
            <img src="assets/factions/black_lily.png" alt="Прислужники Чёрной Лилии">
        </div>
        <div class="faction-item" onclick="showFactionLore('Дриады Нидолион')">
            <img src="assets/factions/dryads.png" alt="Дриады Нидолион">
        </div>
        <div class="faction-item" onclick="showFactionLore('Орден Чародеев')">
            <img src="assets/factions/mages.png" alt="Орден Чародеев">
        </div>
    </div>

    <!-- Кнопки -->
    <button onclick="showDeckBuilder()">✨ Создать новую колоду</button>
    <button onclick="showMyDecks()">🃏 Мои колоды</button>
    <button onclick="startBotGame()">🤖 Играть с ботом</button>
    <button onclick="playOnline()">⚔️ Играть онлайн</button>

    <!-- Модалка с лором фракции -->
    <div id="faction-modal" class="modal" onclick="hideFactionModal()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <h3 id="modal-faction-name" style="color: #c084fc; margin-top: 0;"></h3>
            <p id="modal-lore-text" style="font-size: 1.05em; line-height: 1.5;">
                Лор данной фракции ещё в процессе написания.
            </p>
            <button onclick="hideFactionModal()" 
                    style="margin-top: 15px; background: #c084fc; color: #0f172a; border: none; padding: 10px 28px; border-radius: 10px; font-weight: 600; cursor: pointer;">
                Закрыть
            </button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/deckbuilder.js"></script>
    <script src="js/game.js"></script>
    <script src="js/bot.js"></script>

    <script>
        function showFactionModal(factionName) {
            document.getElementById('modal-faction-name').innerText = factionName;
            document.getElementById('faction-modal').style.display = 'flex';
        }

        function hideFactionModal() {
            document.getElementById('faction-modal').style.display = 'none';
        }

        function showFactionLore(factionName) {
            showFactionModal(factionName);
        }

        function playOnline() {
            alert('Онлайн-режим в разработке. Скоро будет подключение к серверу.');
        }
    </script>
</body>
</html>
