<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Lily Wars — Карточная игра</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- MAIN MENU -->
    <div id="screen-main" class="screen active">
        <h1>Lily Wars</h1>
        <p style="margin-bottom:20px; color:#c5b3ff; font-size:1.15em;">Тактическая карточная игра с 4 уникальными фракциями</p>
        
        <!-- FACTION LOGOS + LORE on Main Screen -->
        <div style="margin: 25px 0 35px;">
            <h3 style="margin-bottom:15px; color:#b39ddb;">Выберите фракцию, чтобы узнать лор</h3>
            <div id="main-faction-logos" class="faction-select" style="justify-content:center; gap:25px; flex-wrap:wrap;"></div>
        </div>
        
        <button id="btn-online">⚔️ Играть онлайн</button><br>
        <button id="btn-my-decks">🃏 Мои колоды</button><br>
        <button id="btn-bot">🤖 Играть с ботом</button><br>
        <button id="btn-new-deck">🛠️ Создать колоду</button>
    </div>

    <!-- DECK BUILDER -->
    <div id="screen-deck-builder" class="screen">
        <h2>Редактор колод</h2>
        
        <div id="faction-select" class="faction-select"></div>
        
        <div style="max-width:1100px; margin:20px auto;">
            <h3 style="text-align:left; margin-left:10px;">Доступные карты (нажмите, чтобы добавить)</h3>
            <div id="available-cards"></div>
            
            <div style="margin:25px 0 10px;">
                <h3 style="text-align:left; margin-left:10px;">Ваша колода</h3>
                <div class="deck-stats">
                    <span>Карт: <strong id="deck-count">0/25</strong></span>
                    <span>Влияние: <strong id="influence-count">0/170</strong></span>
                </div>
                <div id="deck-cards"></div>
            </div>
        </div>
        
        <div style="text-align:center; margin-top:20px;">
            <button id="btn-save-deck" style="background:#2e7d32; border-color:#66bb6a;">💾 Сохранить колоду</button>
            <button id="btn-back-to-menu">← Назад в меню</button>
        </div>
    </div>

    <!-- MY DECKS -->
    <div id="screen-my-decks" class="screen">
        <h2>Мои колоды</h2>
        <div id="decks-list" style="max-width:520px; margin:0 auto;"></div>
        <button id="btn-back-from-decks" style="margin-top:20px;">← Назад в меню</button>
    </div>

    <!-- GAME vs BOT -->
    <div id="screen-game" class="screen">
        <div id="game-board" class="game-container"></div>
    </div>

    <!-- COPY SELECTION MODAL -->
    <div id="copy-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-card-name"></h3>
            <p style="margin-bottom:10px; color:#b39ddb;">Сколько копий добавить?</p>
            <div id="copy-options" class="copy-options"></div>
            <button onclick="closeModal()" style="margin-top:15px; background:#555; border-color:#888; padding:10px 30px;">Отмена</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/deckbuilder.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
