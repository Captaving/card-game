<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily Wars</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        
        .screen {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .screen.active {
            display: block;
        }

        h1 {
            font-size: 3.4em;
            color: #c084fc;
            text-shadow: 0 0 15px #c084fc, 0 0 30px #a855f7;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.25em;
            margin-bottom: 30px;
            opacity: 0.85;
        }

        .faction-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .faction-item {
            text-align: center;
            cursor: pointer;
        }

        .faction-item img {
            width: 60px;
            height: 60px;
            margin-bottom: 6px;
        }

        .faction-item span {
            font-size: 0.82em;
            opacity: 0.9;
        }

        button {
            background: white;
            color: #1e2937;
            border: none;
            padding: 16px 0;
            width: 300px;
            border-radius: 14px;
            font-size: 1.1em;
            font-weight: 600;
            margin: 8px 0;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        button:hover {
            background: #f3e8ff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #1e2937;
            padding: 30px 40px;
            border-radius: 16px;
            max-width: 400px;
            border: 2px solid #c084fc;
        }
    </style>
</head>
<body>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="screen-main" class="screen active">
        <h1>Lily Wars</h1>
        <p>Коллекционная карточная игра</p>

        <!-- Фракции -->
        <div class="faction-row">
            <div class="faction-item" onclick="showLore('Рыцари Лилии')">
                <img src="assets/factions/knights.png" alt="Рыцари">
                <span>Рыцари<br>Лилии</span>
            </div>
            <div class="faction-item" onclick="showLore('Прислужники Чёрной Лилии')">
                <img src="assets/factions/black_lily.png" alt="Чёрная Лилия">
                <span>Прислужники<br>Чёрной Лилии</span>
            </div>
            <div class="faction-item" onclick="showLore('Дриады Нидолион')">
                <img src="assets/factions/dryads.png" alt="Дриады">
                <span>Дриады<br>Нидолион</span>
            </div>
            <div class="faction-item" onclick="showLore('Орден Чародеев')">
                <img src="assets/factions/mages.png" alt="Чародеи">
                <span>Орден<br>Чародеев</span>
            </div>
        </div>

        <!-- Кнопки -->
        <button onclick="goToDecks()">🃏 Мои колоды</button>
        <button onclick="goToBot()">🤖 Играть с ботом</button>
        <button onclick="goToBuilder()">✨ Создать новую колоду</button>
    </div>

    <!-- Экран Мои колоды -->
    <div id="screen-decks" class="screen">
        <h1>🃏 Мои колоды</h1>
        <p>Здесь будут твои колоды</p>
        <button onclick="showMainMenu()">← Назад</button>
    </div>

    <!-- Экран Игра с ботом -->
    <div id="screen-bot" class="screen">
        <h1>🤖 Играть с ботом</h1>
        <p>Игровой экран в разработке</p>
        <button onclick="showMainMenu()">← Назад</button>
    </div>

    <!-- Экран Конструктор -->
    <div id="screen-builder" class="screen">
        <h1>✨ Конструктор колоды</h1>
        <p>Конструктор в разработке</p>
        <button onclick="showMainMenu()">← Назад</button>
    </div>

    <!-- Всплывающее окно -->
    <div id="lore-modal" class="modal" onclick="hideLore()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <h3 id="lore-title" style="color:#c084fc"></h3>
            <p>Скоро тут будет Лор данной фракции.</p>
            <button onclick="hideLore()" style="margin-top:15px; background:#c084fc; color:#0f172a; border:none; padding:10px 25px; border-radius:10px; font-weight:600;">Закрыть</button>
        </div>
    </div>

    <script>
        function showMainMenu() {
            hideAll();
            document.getElementById('screen-main').classList.add('active');
        }

        function goToDecks() {
            hideAll();
            document.getElementById('screen-decks').classList.add('active');
        }

        function goToBot() {
            hideAll();
            document.getElementById('screen-bot').classList.add('active');
        }

        function goToBuilder() {
            hideAll();
            document.getElementById('screen-builder').classList.add('active');
        }

        function hideAll() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        }

        function showLore(faction) {
            document.getElementById('lore-title').innerText = faction;
            document.getElementById('lore-modal').style.display = 'flex';
        }

        function hideLore() {
            document.getElementById('lore-modal').style.display = 'none';
        }
    </script>
</body>
</html>
