<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily Wars</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3.4em;
            color: #c084fc;
            text-shadow: 0 0 15px #c084fc, 0 0 30px #a855f7;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.25em;
            margin-bottom: 30px;
            opacity: 0.85;
        }
        .faction-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .faction-item {
            text-align: center;
            cursor: pointer;
        }
        .faction-item img {
            width: 60px;
            height: 60px;
            margin-bottom: 6px;
        }
        .faction-item span {
            font-size: 0.82em;
            opacity: 0.9;
        }
        button {
            background: white;
            color: #1e2937;
            border: none;
            padding: 16px 0;
            width: 300px;
            border-radius: 14px;
            font-size: 1.1em;
            font-weight: 600;
            margin: 8px 0;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        button:hover {
            background: #f3e8ff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #1e2937;
            padding: 30px 40px;
            border-radius: 16px;
            max-width: 400px;
            border: 2px solid #c084fc;
        }
    </style>
</head>
<body>

    <h1>Lily Wars</h1>
    <p>Коллекционная карточная игра</p>

    <!-- Фракции -->
    <div class="faction-row">
        <div class="faction-item" onclick="showLore('Рыцари Лилии')">
            <img src="assets/factions/knights.png" alt="Рыцари">
            <span>Рыцари<br>Лилии</span>
        </div>
        <div class="faction-item" onclick="showLore('Прислужники Чёрной Лилии')">
            <img src="assets/factions/black_lily.png" alt="Чёрная Лилия">
            <span>Прислужники<br>Чёрной Лилии</span>
        </div>
        <div class="faction-item" onclick="showLore('Дриады Нидолион')">
            <img src="assets/factions/dryads.png" alt="Дриады">
            <span>Дриады<br>Нидолион</span>
        </div>
        <div class="faction-item" onclick="showLore('Орден Чародеев')">
            <img src="assets/factions/mages.png" alt="Чародеи">
            <span>Орден<br>Чародеев</span>
        </div>
    </div>

    <!-- Кнопки -->
    <button onclick="playOnline()">⚔️ Играть онлайн</button>
    <button onclick="showMyDecks()">🃏 Мои колоды</button>
    <button onclick="startBotGame()">🤖 Играть с ботом</button>
    <button onclick="showDeckBuilder()">✨ Создать новую колоду</button>

    <!-- Всплывающее окно -->
    <div id="lore-modal" class="modal" onclick="hideLore()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <h3 id="lore-title" style="color:#c084fc"></h3>
            <p>Скоро тут будет Лор данной фракции.</p>
            <button onclick="hideLore()" style="margin-top:15px; background:#c084fc; color:#0f172a; border:none; padding:10px 25px; border-radius:10px; font-weight:600;">Закрыть</button>
        </div>
    </div>

    <script>
        function showLore(faction) {
            document.getElementById('lore-title').innerText = faction;
            document.getElementById('lore-modal').style.display = 'flex';
        }

        function hideLore() {
            document.getElementById('lore-modal').style.display = 'none';
        }

        function playOnline() {
            alert('Онлайн-режим в разработке. Скоро будет подключение к серверу.');
        }

        function showMyDecks() {
            alert('Мои колоды (в разработке)');
        }

        function startBotGame() {
            alert('Игра с ботом (в разработке)');
        }

        function showDeckBuilder() {
            alert('Конструктор колоды (в разработке)');
        }
    </script>
</body>
</html>
