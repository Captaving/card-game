<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Card Battle TG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; transition: background 0.3s, color 0.3s; }
        .container { padding: 20px; text-align: center; display: none; flex-direction: column; gap: 15px; height: 100vh; box-sizing: border-box; justify-content: center; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; margin: 0 auto; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
        .btn-secondary { background: linear-gradient(135deg, #95a5a6, #7f8c8d); box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3); }
        .btn-warning { background: linear-gradient(135deg, #e67e22, #d35400); box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        .user-info { margin-top: 20px; font-size: 14px; opacity: 0.7; }
        
        /* Экран загрузки */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка карт...</div>
    </div>

    <!-- Основное меню (скрыто по умолчанию) -->
    <div class="container" id="main-menu">
        <h1>⚔️ Битва Карт</h1>
        
        <div class="menu-buttons">
            <button onclick="startGame()" class="btn-primary">🎮 Быстрая игра</button>
            <button onclick="window.location.href='deckbuilder.html'" class="btn-secondary">🛠 Конструктор колод</button>
            <button onclick="window.location.href='saved-decks.html'" class="btn-secondary">📂 Сохраненные колоды</button>
            <button onclick="tg.showAlert('Мультиплеер в разработке!')" class="btn-warning">🌐 Онлайн бой</button>
        </div>

        <div id="user-info" class="user-info"></div>
    </div>

    <!-- Сначала загружаем конфиг, потом скрипт логики -->
    <script src="config.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Применение темы Telegram
        const theme = tg.themeParams;
        if(theme.bg_color) document.body.style.backgroundColor = theme.bg_color;
        if(theme.text_color) document.body.style.color = theme.text_color;

        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerHTML = `
                <p>Игрок: ${user.first_name} ${user.last_name || ''}</p>
                <p>@${user.username || 'no_username'}</p>
            `;
        }

        // Функция инициализации, которая вызывается ПОСЛЕ загрузки config.js
        function initApp() {
            const loadingScreen = document.getElementById('loading-screen');
            const mainMenu = document.getElementById('main-menu');
            const loadingText = document.getElementById('loading-text');

            // Проверка: существует ли объект FACTIONS и есть ли в нем фракции
            if (typeof FACTIONS !== 'undefined' && Object.keys(FACTIONS).length > 0) {
                console.log('Карты загружены успешно:', Object.keys(FACTIONS));
                loadingScreen.style.display = 'none';
                mainMenu.style.display = 'flex';
            } else {
                console.error('FACTIONS не найден или пуст');
                loadingText.innerHTML = '❌ Ошибка загрузки карт!<br><small>Проверьте консоль и файл config.js</small>';
                loadingText.style.color = '#e74c3c';
            }
        }

        // Запускаем проверку сразу после того, как скрипт ниже выполнится
        // Но так как script src="config.js" стоит выше, данные уже должны быть
        // Мы используем setTimeout для надежности, чтобы дать браузеру время на парсинг
        setTimeout(initApp, 100);

        function startGame() {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'game.html';
        }
    </script>
</body>
</html>
