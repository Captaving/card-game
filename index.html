<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>  Lily Wars — Карточная игра</title>
    <link rel="icon" type="image/png" href="images/Favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ТАЙМЕР -->
    <div id="turn-timer" class="turn-timer">⏱️ <span id="timer-val">30</span>s</div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="screen-main" class="screen active">
        <h1 style="text-align:center; margin-top:40px; font-size:2.5em; color:#fff; text-shadow: 0 0 20px rgba(255,100,0,0.8);">  Lily Wars</h1>
        <p style="text-align:center; color:#b39ddb; margin-bottom:20px;">Тактическая карточная игра</p>
        
        <h3 style="text-align:center; color:#9b72cf; margin:20px 0;">ФРАКЦИИ</h3>
        <div id="main-faction-logos" class="faction-select"></div>
        
        <div style="text-align:center; margin-top:30px;">
            <button id="btn-online">  Играть онлайн</button>
            <button id="btn-my-decks"> Мои колоды</button>
            <button id="btn-bot">  Играть с ботом</button>
            <button id="btn-new-deck">  Создать колоду</button>
        </div>
    </div>

    <!-- РЕДАКТОР КОЛОД -->
    <div id="screen-deck-builder" class="screen">
        <h2 style="text-align:center; color:#f5e6c8; margin:20px 0;">  Редактор колод</h2>
        
        <div id="faction-select-container">
            <div id="faction-select" class="faction-select"></div>
        </div>

        <div id="deck-builder-content" style="display:none;">
            <div class="deck-stats">
                <span>Карт: <strong id="deck-count">0</strong>/25</span>
                <span>Влияние: <strong id="influence-count">0</strong>/170</span>
            </div>

            <h3 style="text-align:center; margin:15px 0; color:#f5e6c8;">ДОСТУПНЫЕ КАРТЫ</h3>
            <div id="available-cards"></div>

            <h3 style="text-align:center; margin:15px 0; color:#f5e6c8;">ВАША КОЛОДА</h3>
            <div id="deck-cards"></div>

            <div style="text-align:center; margin-top:20px;">
                <button id="btn-save-deck">  Сохранить колоду</button>
                <button id="btn-back-to-menu">← Назад в меню</button>
            </div>
        </div>
    </div>

    <!-- МОИ КОЛОДЫ -->
    <div id="screen-my-decks" class="screen">
        <h2 style="text-align:center; color:#f5e6c8; margin:20px 0;">  Мои колоды</h2>
        <div id="decks-list" style="margin:20px auto; max-width:600px;"></div>
        <div style="text-align:center;">
            <button id="btn-back-from-decks">← Назад в меню</button>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="screen-game" class="screen">
        
        <!-- МОБИЛЬНАЯ ШАПКА -->
        <div class="mobile-header mobile-only">
            <div class="round-info">Раунд <span id="m-round">1</span>/3</div>
            <div class="score-info">
                <span>🗡️ Вы: <strong id="m-p-swords" style="color:#4caf50;">0</strong></span>
                <span>Очки: <strong id="m-p-score" style="color:#80cbc4;">0</strong>-<strong id="m-b-score" style="color:#ef9a9a;">0</strong></span>
                <span>🗡️ Бот: <strong id="m-b-swords" style="color:#ef5350;">0</strong></span>
            </div>
        </div>

        <div id="game-board"></div>

        <!-- МОБИЛЬНЫЕ КНОПКИ -->
        <button class="hand-popup-btn mobile-only" id="hand-popup-btn">🃏</button>
        
        <div class="hand-popup mobile-only" id="hand-popup">
            <h4 style="color:#d4af37; text-align:center; margin-bottom:10px;">Ваша рука</h4>
            <div id="mobile-hand-cards" class="cards"></div>
        </div>

        <div class="mobile-controls mobile-only">
            <button class="mobile-btn" id="m-btn-leader"> Умение</button>
            <button class="mobile-btn" id="m-btn-pass"> Пасс</button>
            <button class="mobile-btn" id="m-btn-end"> Ход</button>
            <button class="mobile-btn" id="m-btn-surrender" style="border-color:rgba(255,0,0,0.5);">🏳 Сдаться</button>
        </div>
    </div>

    <!-- МОДАЛКА КОПИЙ -->
    <div id="copy-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-card-name" style="color:#ffccff; margin-bottom:15px;"></h3>
            <p style="color:#aaa; font-size:0.9em;">Сколько копий добавить?</p>
            <div id="copy-options" class="copy-options"></div>
            <button onclick="closeModal()" style="min-width:auto; padding:8px 20px;">Отмена</button>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/deckbuilder.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
