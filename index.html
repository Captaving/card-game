<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карточная Битва</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      padding: 20px 0;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #3498db, #926eae);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header p {
      color: #888;
      font-size: 14px;
    }
    
    .faction-btn {
      width: 100%;
      max-width: 400px;
      padding: 16px 20px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      background: rgba(44, 62, 80, 0.6);
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.1s, box-shadow 0.2s;
      backdrop-filter: blur(10px);
    }
    
    .faction-btn:active { transform: scale(0.98); }
    
    .faction-btn.knights { border-left: 4px solid #3498db; background: linear-gradient(90deg, rgba(52,152,219,0.15), rgba(44, 62, 80, 0.6)); }
    .faction-btn.mages { border-left: 4px solid #926eae; background: linear-gradient(90deg, rgba(146,110,174,0.15), rgba(44, 62, 80, 0.6)); }
    .faction-btn.cultists { border-left: 4px solid #555; background: linear-gradient(90deg, rgba(85,85,85,0.3), rgba(44, 62, 80, 0.6)); }
    .faction-btn.dryads { border-left: 4px solid #2ecc71; background: linear-gradient(90deg, rgba(46,204,113,0.15), rgba(44, 62, 80, 0.6)); }
    
    .deck-btn {
      width: 100%;
      max-width: 400px;
      padding: 16px 20px;
      margin: 25px 0 15px;
      border: 2px solid #3498db;
      border-radius: 12px;
      background: rgba(52, 152, 219, 0.1);
      color: #3498db;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .deck-btn:active { transform: scale(0.98); background: rgba(52, 152, 219, 0.2); }
    
    .card-preview {
      width: 100%;
      max-width: 300px;
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(44, 62, 80, 0.5);
      border: 2px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    
    .card-type {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 10px;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    
    .card-name { font-weight: 700; margin: 10px 0; font-size: 17px; }
    
    .card-stats { display: flex; gap: 15px; margin: 10px 0; font-size: 14px; }
    .card-stats span { display: flex; align-items: center; gap: 5px; }
    
    .card-influence { color: #f1c40f; margin-top: 12px; font-size: 13px; font-weight: 600; }
    .card-effect { font-size: 12px; color: #888; margin-top: 10px; line-height: 1.4; min-height: 32px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚔️ Карточная Битва</h1>
    <p>Выберите фракцию для начала игры</p>
  </div>

  <button class="faction-btn knights" onclick="selectFaction('knights')">
    <span>🔵</span> Рыцари Цветка Лилии
  </button>
  
  <button class="faction-btn mages" onclick="selectFaction('mages')">
    <span>🟣</span> Орден Чародеев
  </button>
  
  <button class="faction-btn cultists" onclick="selectFaction('cultists')">
    <span>⚫</span> Прислужники Черной Лилии
  </button>
  
  <button class="faction-btn dryads" onclick="selectFaction('dryads')">
    <span>🟢</span> Дриады леса Нидолион
  </button>

  <button class="deck-btn" onclick="goToDeckBuilder()">
    <span>🃏</span> Собрать колоду
  </button>

  <div class="card-preview" id="preview">
    <div class="card-type white">БЕЛЫЙ</div>
    <div class="card-name">Пехотинец</div>
    <div class="card-stats">
      <span>⚔️ 2</span>
      <span>🛡️ 1</span>
      <span>❤️ 2</span>
    </div>
    <div class="card-influence">Влияние: 2</div>
    <div class="card-effect">Эффект: Нет</div>
  </div>

  <script>
    // Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Выбор фракции
    function selectFaction(faction) {
      localStorage.setItem('selectedFaction', faction);
      
      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
      
      // Сразу переходим в конструктор
      goToDeckBuilder();
    }

    // Переход в конструктор колоды
    function goToDeckBuilder() {
      window.location.href = 'deckbuilder.html';
    }

    // Демонстрация случайных карт
    const demoCards = [
      { name: 'Пехотинец', type: 'white', power: 2, armor: 1, health: 2, influence: 2, effect: 'Нет' },
      { name: 'Рыцарь Ордена', type: 'gray', power: 5, armor: 4, health: 4, influence: 4, effect: '' },
      { name: 'Воин Света', type: 'purple', power: 1, armor: 1, health: 6, influence: 5, effect: '+2 к силе союзнику' },
      { name: 'Король Аугуст', type: 'gold', power: 6, armor: 6, health: 8, influence: 20, effect: 'Двойная активация' },
      { name: 'Бомба', type: 'special', power: 0, armor: 0, health: 0, influence: 5, effect: '4 урона врагу' }
    ];

    function showRandomCard() {
      const card = demoCards[Math.floor(Math.random() * demoCards.length)];
      const preview = document.getElementById('preview');
      
      preview.querySelector('.card-type').className = `card-type ${card.type}`;
      preview.querySelector('.card-type').textContent = card.type.toUpperCase();
      preview.querySelector('.card-name').textContent = card.name;
      preview.querySelector('.card-stats').innerHTML = `
        <span>⚔️ ${card.power}</span>
        <span>🛡️ ${card.armor}</span>
        <span>❤️ ${card.health}</span>
      `;
      preview.querySelector('.card-influence').textContent = `Влияние: ${card.influence}`;
      preview.querySelector('.card-effect').textContent = `Эффект: ${card.effect || 'Нет'}`;
    }

    // Меняем карту каждые 3 секунды
    setInterval(showRandomCard, 3000);
    showRandomCard();
  </script>
</body>
</html>
