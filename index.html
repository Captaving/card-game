<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карточная Игра</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 20px 0;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    .header p {
      color: #aaa;
      font-size: 14px;
    }
    .faction-btn {
      width: 100%;
      max-width: 400px;
      padding: 15px 20px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      background: #2c3e50;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .faction-btn:active { transform: scale(0.98); }
    .faction-btn.knights { border-left: 4px solid #3498db; background: linear-gradient(90deg, rgba(52,152,219,0.1), #2c3e50); }
    .faction-btn.mages { border-left: 4px solid #926eae; background: linear-gradient(90deg, rgba(146,110,174,0.1), #2c3e50); }
    .faction-btn.cultists { border-left: 4px solid #2c3e50; background: linear-gradient(90deg, rgba(44,62,80,0.3), #2c3e50); }
    .faction-btn.dryads { border-left: 4px solid #2ecc71; background: linear-gradient(90deg, rgba(46,204,113,0.1), #2c3e50); }
    
    .deck-btn {
      width: 100%;
      max-width: 400px;
      padding: 15px 20px;
      margin: 20px 0 10px;
      border: 2px solid #3498db;
      border-radius: 12px;
      background: transparent;
      color: #3498db;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .card-preview {
      width: 100%;
      max-width: 300px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 10px;
      background: #2c3e50;
      border: 3px solid #3498db;
    }
    .card-type {
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      margin-bottom: 10px;
      text-align: center;
    }
    .card-type.white { background: #fff; color: #333; }
    .card-type.gray { background: #95a5a6; color: #fff; }
    .card-type.purple { background: #a233ff; color: #fff; }
    .card-type.gold { background: #f1c40f; color: #333; }
    .card-type.special { background: #e74c3c; color: #fff; }
    
    .card-name { font-weight: 600; margin: 10px 0; font-size: 16px; }
    .card-stats { display: flex; gap: 15px; margin: 10px 0; font-size: 14px; }
    .card-stats span { display: flex; align-items: center; gap: 4px; }
    .card-influence { color: #f1c40f; margin-top: 10px; font-size: 14px; }
    .card-effect { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚔️ Карточная Битва</h1>
    <p>Выберите фракцию для начала игры</p>
  </div>

  <button class="faction-btn knights" onclick="selectFaction('knights')">
    <span>🔵</span> Рыцари Цветка Лилии
  </button>
  <button class="faction-btn mages" onclick="selectFaction('mages')">
    <span>🟣</span> Орден Чародеев
  </button>
  <button class="faction-btn cultists" onclick="selectFaction('cultists')">
    <span>⚫</span> Прислужники Черной Лилии
  </button>
  <button class="faction-btn dryads" onclick="selectFaction('dryads')">
    <span>🟢</span> Дриады леса Нидолион
  </button>

  <button class="deck-btn" onclick="goToDeckBuilder()">
    🃏 Собрать колоду
  </button>

  <div class="card-preview" id="preview">
    <div class="card-type white">БЕЛЫЙ</div>
    <div class="card-name">Пехотинец</div>
    <div class="card-stats">
      <span>⚔️ 2</span>
      <span>🛡️ 1</span>
      <span>❤️ 2</span>
    </div>
    <div class="card-influence">Влияние: 2</div>
    <div class="card-effect">Эффект: Нет</div>
  </div>

  <script>
    // Telegram Web App init
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function selectFaction(faction) {
      // Сохраняем выбранную фракцию
      localStorage.setItem('selectedFaction', faction);
      
      // Вибрация через Telegram
      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
      
      // Переход в конструктор колоды
      goToDeckBuilder();
    }

    function goToDeckBuilder() {
      // В реальной версии: window.location.href = 'deckbuilder.html';
      alert('🔧 Конструктор колоды будет доступен в следующей версии!\n\nПока можно выбрать фракцию выше.');
    }

    // Демонстрация случайной карты при загрузке
    const demoCards = [
      { name: 'Пехотинец', type: 'white', power: 2, armor: 1, health: 2, influence: 2, effect: 'Нет' },
      { name: 'Рыцарь Ордена', type: 'gray', power: 5, armor: 4, health: 4, influence: 4, effect: '' },
      { name: 'Воин Света', type: 'purple', power: 1, armor: 1, health: 6, influence: 5, effect: '+2 к силе союзнику' },
      { name: 'Король Аугуст', type: 'gold', power: 6, armor: 6, health: 8, influence: 20, effect: 'Двойная активация' },
      { name: 'Бомба', type: 'special', power: 0, armor: 0, health: 0, influence: 5, effect: '4 урона врагу' }
    ];

    function showRandomCard() {
      const card = demoCards[Math.floor(Math.random() * demoCards.length)];
      const preview = document.getElementById('preview');
      preview.querySelector('.card-type').className = `card-type ${card.type}`;
      preview.querySelector('.card-type').textContent = card.type.toUpperCase();
      preview.querySelector('.card-name').textContent = card.name;
      preview.querySelector('.card-stats').innerHTML = `
        <span>⚔️ ${card.power}</span>
        <span>🛡️ ${card.armor}</span>
        <span>❤️ ${card.health}</span>
      `;
      preview.querySelector('.card-influence').textContent = `Влияние: ${card.influence}`;
      preview.querySelector('.card-effect').textContent = `Эффект: ${card.effect || 'Нет'}`;
    }

    // Меняем карту каждые 3 секунды для демо
    setInterval(showRandomCard, 3000);
    showRandomCard();
  </script>
</body>
</html>
