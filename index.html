<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Lily Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="toast" class="toast"></div>
    <div id="card-tooltip" class="card-tooltip"></div>

    <!-- MAIN MENU -->
    <div id="screen-main" class="screen active">
        <div class="main-logo">⚜ LILY WARS</div>
        <div class="main-subtitle">Карточная битва</div>
        <div class="main-buttons">
            <button class="btn btn-primary" id="btn-online">⚔️ Игра онлайн</button>
            <button class="btn btn-secondary" id="btn-my-decks">🃏 Мои колоды</button>
            <button class="btn btn-secondary" id="btn-bot">🤖 Игра с ботом</button>
        </div>
    </div>

    <!-- DECK BUILDER -->
    <div id="screen-deck-builder" class="screen">
        <h2>Сборка колоды</h2>
        <div id="faction-select" class="faction-select"></div>
        <div id="leader-select" class="leader-select"></div>
        <div class="deck-area">
            <div class="available-cards" id="available-cards"></div>
            <div class="current-deck" id="current-deck">
                <div class="deck-info">
                    <span id="deck-count">0/25</span>
                    <span id="influence-count">0/170</span>
                </div>
                <div id="deck-cards" class="deck-cards"></div>
            </div>
        </div>
        <div class="deck-actions">
            <button id="btn-save-deck" class="btn btn-primary">💾 Сохранить колоду</button>
            <button id="btn-back-to-menu" class="btn">Назад</button>
        </div>
    </div>

    <!-- MY DECKS -->
    <div id="screen-my-decks" class="screen">
        <h2>Мои колоды</h2>
        <div id="decks-list"></div>
        <button id="btn-new-deck" class="btn btn-primary">+ Новая колода</button>
        <button id="btn-back-from-decks" class="btn">Назад</button>
    </div>

    <!-- GAME SCREEN (simple for now) -->
    <div id="screen-game" class="screen">
        <div id="game-ui">
            <h2>Битва началась!</h2>
            <button id="btn-end-game">Завершить игру</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/deckbuilder.js"></script>
    <script src="js/game.js"></script>
    <script src="js/bot.js"></script>
</body>
</html>
