<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Card Battle TG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .container { padding: 20px; text-align: center; display: flex; flex-direction: column; gap: 15px; height: 100vh; box-sizing: border-box; justify-content: center; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; margin: 0 auto; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
        .btn-secondary { background: linear-gradient(135deg, #95a5a6, #7f8c8d); box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3); }
        .btn-warning { background: linear-gradient(135deg, #e67e22, #d35400); box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        .user-info { margin-top: 20px; font-size: 14px; opacity: 0.7; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Загрузка игры...</div>

    <div class="container" style="display:none;" id="main-menu">
        <h1>⚔️ Битва Карт</h1>
        
        <div class="menu-buttons">
            <button onclick="startGame()" class="btn-primary">🎮 Быстрая игра</button>
            <button onclick="window.location.href='deckbuilder.html'" class="btn-secondary">🛠 Конструктор колод</button>
            <button onclick="window.location.href='saved-decks.html'" class="btn-secondary">📂 Сохраненные колоды</button>
            <button onclick="alert('Мультиплеер в разработке!')" class="btn-warning">🌐 Онлайн бой</button>
        </div>

        <div id="user-info" class="user-info"></div>
    </div>

    <script src="config.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Применение темы Telegram
        const theme = tg.themeParams;
        document.body.style.backgroundColor = theme.bg_color || '#1a1a1a';
        document.body.style.color = theme.text_color || '#ffffff';

        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerHTML = `
                <p>Игрок: ${user.first_name} ${user.last_name || ''}</p>
                <p>@${user.username || 'no_username'}</p>
            `;
        }

        // Проверка загрузки конфига и скрытие лоадера
        window.onload = () => {
            if (typeof FACTIONS !== 'undefined' && Object.keys(FACTIONS).length > 0) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-menu').style.display = 'flex';
            } else {
                document.getElementById('loading').innerHTML = 'Ошибка загрузки карт!<br>Проверьте config.js';
            }
        };

        function startGame() {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'game.html';
        }
    </script>
</body>
</html>
