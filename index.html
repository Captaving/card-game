<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточная Битва</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #3498db, #926eae);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #888; margin-bottom: 40px; font-size: 16px; }
    .menu-btn {
      width: 100%;
      max-width: 350px;
      padding: 18px 30px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.1s;
    }
    .menu-btn:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
    .btn-warning { background: linear-gradient(135deg, #f39c12, #d68910); color: white; }
    .btn-info { background: linear-gradient(135deg, #926eae, #8e44ad); color: white; }
    .faction-select {
      display: none;
      margin-top: 30px;
      text-align: center;
    }
    .faction-select h3 { margin-bottom: 20px; }
    .faction-btn {
      width: 100%;
      max-width: 350px;
      padding: 15px 25px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: rgba(44, 62, 80, 0.6);
      color: white;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .faction-btn.knights { border-left: 4px solid #3498db; }
    .faction-btn.mages { border-left: 4px solid #926eae; }
    .faction-btn.cultists { border-left: 4px solid #555; }
    .faction-btn.dryads { border-left: 4px solid #2ecc71; }
    .faction-btn:active { transform: scale(0.98); }
    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      padding: 12px 25px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>⚔️ Карточная Битва</h1>
  <p class="subtitle">Собирай колоду и сражайся!</p>
  
  <div id="mainMenu">
    <button class="menu-btn btn-primary" onclick="goToGame()">🎮 Играть</button>
    <button class="menu-btn btn-warning" onclick="goToDeckBuilder()">🃏 Собрать колоду</button>
    <button class="menu-btn btn-info" onclick="showLeaderboard()">🏆 Рейтинг</button>
  </div>
  
  <div class="faction-select" id="factionSelect">
    <h3>Выберите фракцию:</h3>
    <button class="faction-btn knights" onclick="selectFaction('knights')">🔵 Рыцари Цветка Лилии</button>
    <button class="faction-btn mages" onclick="selectFaction('mages')">🟣 Орден Чародеев</button>
    <button class="faction-btn cultists" onclick="selectFaction('cultists')">⚫ Прислужники Черной Лилии</button>
    <button class="faction-btn dryads" onclick="selectFaction('dryads')">🟢 Дриады леса Нидолион</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    function goToGame() {
      const faction = localStorage.getItem('selectedFaction');
      if (!faction) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('factionSelect').style.display = 'block';
        return;
      }
      window.location.href = 'game.html';
    }
    
    function goToDeckBuilder() {
      const faction = localStorage.getItem('selectedFaction');
      if (!faction) {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('factionSelect').style.display = 'block';
        return;
      }
      window.location.href = 'deckbuilder.html';
    }
    
    function selectFaction(faction) {
      localStorage.setItem('selectedFaction', faction);
      showToast(`Фракция выбрана: ${FACTIONS[faction].name}`);
      setTimeout(() => {
        document.getElementById('factionSelect').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'block';
      }, 1000);
    }
    
    function showLeaderboard() {
      showToast('🏆 Таблица лидеров будет доступна скоро!');
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
